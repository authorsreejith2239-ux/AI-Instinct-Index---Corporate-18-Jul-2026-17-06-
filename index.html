        /* =====================================================================
           ORGANISATIONAL NODES & LICENCE PROVISIONING ENGINE (v13)
           - Nodes: unlimited-depth hierarchy (Enterprise → … → Team → …)
           - Licences: attached to exactly one node; unique tokenised survey link
           - All create/edit/delete operations are invoked ONLY from the Super
             Admin panel (renderSuperAdminView). The Diagnostic Console has no
             provisioning controls.
           ===================================================================== */
        _saveNodes() { localStorage.setItem('ai_instinct_org_nodes', JSON.stringify(this.state.orgNodes)); },
        _saveLicences() { localStorage.setItem('ai_instinct_licences', JSON.stringify(this.state.licences)); },
        _genId(prefix) {
            let s = '';
            try {
                const buf = new Uint8Array(6); crypto.getRandomValues(buf);
                s = Array.from(buf).map(b => b.toString(16).padStart(2,'0')).join('').toUpperCase();
            } catch(e) { s = Math.random().toString(36).substr(2,12).toUpperCase(); }
            return prefix + '-' + s;
        },
        genLicenceToken() {
            try {
                const buf = new Uint8Array(10); crypto.getRandomValues(buf);
                return Array.from(buf).map(b => b.toString(16).padStart(2,'0')).join('');
            } catch(e) { return (Math.random().toString(36).substr(2) + Math.random().toString(36).substr(2)).substr(0,20); }
        },

        // ---- Node model ----
        getNode(id) { return this.state.orgNodes.find(n => n.id === id) || null; },
        nodeChildren(id) { return this.state.orgNodes.filter(n => n.parentId === id); },
        // All descendant ids of a node, excluding itself (cycle-safe)
        nodeDescendants(id) {
            const out = []; const seen = {};
            const walk = (pid) => {
                this.nodeChildren(pid).forEach(c => {
                    if (seen[c.id]) return;
                    seen[c.id] = true; out.push(c.id); walk(c.id);
                });
            };
            walk(id);
            return out;
        },
        nodeSubtree(id) { return [id, ...this.nodeDescendants(id)]; },
        // Root → node ancestry chain (cycle-safe)
        nodePath(id) {
            const path = []; const seen = {};
            let n = this.getNode(id);
            while (n && !seen[n.id]) { seen[n.id] = true; path.unshift(n); n = n.parentId ? this.getNode(n.parentId) : null; }
            return path;
        },
        nodePathLabel(id) { return this.nodePath(id).map(n => n.name).join(' › '); },
        nodeDepth(id) { return Math.max(0, this.nodePath(id).length - 1); },
        // Roll-up: completed assessments in this node's entire subtree.
        // Every completed assessment therefore contributes automatically to all its parent nodes.
        nodeCompletedCount(id) {
            const subtree = this.nodeSubtree(id);
            return this.state.responses.filter(r => r.user && subtree.includes(r.user.nodeId)).length;
        },
        nodeLicenceCount(id) { return this.state.licences.filter(l => l.nodeId === id).length; },

        /* ---- v18_F8 provisioning guards -------------------------------------
           Provisioning is a WRITE to the system of record. It is refused unless
           this browser is holding a live, non-stale central session. Refusing is
           the correct behaviour: a licence or node written only to localStorage
           is invisible to every other device and produces orphans. ------------ */
        centralIsWritable() {
            const c = this.state.central || {};
            return !!(c.loaded && !c.stale);
        },
        requireCentral(action) {
            if (this.centralIsWritable()) return true;
            const c = this.state.central || {};
            alert('Cannot ' + (action || 'make this change') + '.\n\n' +
                  'The central datastore is ' + (c.stale ? 'STALE (last sync failed: ' + (c.error || 'unreachable') + ')' : 'NOT CONNECTED') + '.\n\n' +
                  'Provisioning writes go to the Google Sheet system of record, not to this browser. ' +
                  'Press "Sync from central" and try again once the banner reads CENTRAL \u2014 AUTHORITATIVE.');
            return false;
        },
        // True only when this node ID is known to exist centrally. Local-only nodes
        // are not valid provisioning targets — that is how orphan licences are born.
        nodeIsCentral(id) {
            return !!id && (this.state.centralNodeIds || []).indexOf(id) !== -1;
        },
        centralNodeOptions(selectedId) {
            return this.state.orgNodes
                .filter(n => n.active !== false && this.nodeIsCentral(n.id))
                .map(n => '<option value="' + n.id + '"' + (n.id === selectedId ? ' selected' : '') + '>' + this.nodePathLabel(n.id) + '</option>')
                .join('');
        },

        // v18_F8 FIX 1 — node creation writes to Organizations_Nodes.
        // The node is staged locally only so nodePath()/Company_ID can resolve for
        // the outbound row; if the server refuses, the staged node is removed and
        // nothing is left behind. The UI confirms only after the server acknowledges.
        async addOrgNodeCentral(name, type, parentId) {
            if (!this.requireCentral('create an organisational node')) return null;
            const node = this.addOrgNode(name, type, parentId);
            if (!node) return null;
            const ok = await this.centralSaveNode(node);
            if (!ok) { this.deleteOrgNodeLocal(node.id); this.render(); return null; }
            if ((this.state.centralNodeIds || []).indexOf(node.id) === -1) this.state.centralNodeIds.push(node.id);
            this.render();
            return node;
        },
        deleteOrgNodeLocal(id) {
            const i = this.state.orgNodes.findIndex(n => n.id === id);
            if (i !== -1) { this.state.orgNodes.splice(i, 1); this._saveNodes(); }
        },
        addOrgNode(name, type, parentId) {
            const node = {
                id: this._genId('ND'),
                name: String(name || '').trim(),
                type: NODE_TYPES.includes(type) ? type : 'Other',
                parentId: parentId || null,
                active: true,
                createdAt: new Date().toISOString()
            };
            if (!node.name) return null;
            if (node.parentId && !this.getNode(node.parentId)) node.parentId = null;
            this.state.orgNodes.push(node);
            this._saveNodes();
            return node;
        },
        addOrgNodeFromForm() {
            const name = (document.getElementById('ln-name')?.value || '').trim();
            const type = document.getElementById('ln-type')?.value || 'Other';
            const parentId = document.getElementById('ln-parent')?.value || '';
            if (!name) { alert('Please enter a node name.'); return; }
            if (parentId && !this.nodeIsCentral(parentId)) {
                alert('The selected parent node is not present in the central datastore.\n\nSync from central first, or create the parent node again so it is written centrally. A child of a local-only node would be orphaned.');
                return;
            }
            // v18_F8 FIX 1 — route through the central path, not the local-only one.
            this.addOrgNodeCentral(name, type, parentId || null).then(node => {
                if (node) {
                    const f = document.getElementById('ln-name'); if (f) f.value = '';
                }
            });
        },
        // v18_F8 FIX 3 — a rename edited only the local cache. The Sheet kept the old
        // name, so every other device and every export disagreed with this screen.
        // The edit is now sent centrally and reverted here if the server refuses.
        async updateOrgNodeName(id, value) {
            const n = this.getNode(id);
            const next = String(value || '').trim();
            if (!n || !next || next === n.name) { this.render(); return false; }
            if (!this.requireCentral('rename this node')) { this.render(); return false; }
            const prev = n.name;
            n.name = next;
            const ok = await this.centralSaveNode(n);
            if (!ok) { n.name = prev; this.render(); return false; }
            this._saveNodes();
            this.render();
            return true;
        },
        // v18_F8 FIX 4 — the Active/Inactive toggle was local-only, so a node retired
        // on this browser stayed selectable everywhere else. Same central-first rule.
        async toggleOrgNodeActive(id) {
            const n = this.getNode(id);
            if (!n) return false;
            if (!this.requireCentral('change this node\'s active state')) return false;
            const prev = n.active;
            n.active = !n.active;
            const ok = await this.centralSaveNode(n);
            if (!ok) { n.active = prev; this.render(); return false; }
            this._saveNodes();
            this.render();
            return true;
        },
        deleteOrgNode(id) {
            if (this.nodeChildren(id).length) { alert('This node has child nodes. Delete or re-home the children first.'); return; }
            if (this.nodeLicenceCount(id)) { alert('This node has licences attached. Delete those licences first.'); return; }
            if (this.state.responses.some(r => r.user && r.user.nodeId === id)) { alert('Completed assessments are attached to this node. It cannot be deleted; deactivate it instead.'); return; }
            if (!confirm('Delete this organisational node?')) return;
            this.state.orgNodes = this.state.orgNodes.filter(n => n.id !== id);
            this._saveNodes();
            this.render();
        },

        // ---- Licence model ----
        buildLicenceUrl(l) {
            const base = window.location.href.split('?')[0].split('#')[0];
            return base + '?lic=' + l.token;
        },
        // Seats consumed = unique respondent emails on this licence (a retake by the
        // same respondent never consumes a second seat — no duplicate survey records).
        licenceUsedEmails(l) {
            const set = {};
            this.state.responses.forEach(r => {
                if (r.user && r.user.licenceId === l.id && r.user.email) set[r.user.email.toLowerCase().trim()] = true;
            });
            return Object.keys(set);
        },
        licenceUsage(l) { return this.licenceUsedEmails(l).length; },
        licenceDaysToExpiry(l) {
            if (!l.validUntil) return null;
            const end = new Date(l.validUntil); end.setHours(23,59,59,999);
            return Math.ceil((end.getTime() - Date.now()) / 86400000);
        },
        licenceEffectiveStatus(l) {
            if (l.status === 'Suspended') return 'Suspended';
            const days = this.licenceDaysToExpiry(l);
            if (days !== null && days < 0) return 'Expired';
            if (l.validFrom && Date.now() < new Date(l.validFrom).setHours(0,0,0,0)) return 'Not Started';
            if (this.licenceUsage(l) >= l.seats) return 'Exhausted';
            return 'Active';
        },
        // Gate used at participant registration. Same email may re-enter (retake) without
        // consuming an extra seat; new respondents are blocked once seats are exhausted.
        canUseLicence(l, email) {
            const status = this.licenceEffectiveStatus(l);
            const emailKey = String(email || '').toLowerCase().trim();
            const alreadyCounted = emailKey && this.licenceUsedEmails(l).includes(emailKey);
            if (status === 'Suspended') return { ok:false, reason:'This assessment licence has been suspended. Please contact your administrator.' };
            if (status === 'Expired') return { ok:false, reason:'This assessment licence expired on ' + fmtDate(l.validUntil) + '. Please contact your administrator.' };
            if (status === 'Not Started') return { ok:false, reason:'This assessment licence is not yet active. It becomes valid on ' + fmtDate(l.validFrom) + '.' };
            if (status === 'Exhausted' && !alreadyCounted) return { ok:false, reason:'All licensed seats for this assessment link have been used. Please contact your administrator.' };
            return { ok:true, reason:'' };
        },
        // Derive the organisational context written onto each response from the node ancestry.
        deriveOrgContext(nodeId) {
            const path = this.nodePath(nodeId);
            const nearest = (types) => {
                for (let i = path.length - 1; i >= 0; i--) { if (types.includes(path[i].type)) return path[i].name; }
                return '';
            };
            return {
                company: path.length ? path[0].name : '',
                orgGeography: nearest(['Geography','Region']),
                orgBusinessUnit: nearest(['Business Unit']),
                orgDepartment: nearest(['Department']),
                orgTeam: nearest(['Team']),
                nodePathLabel: path.map(n => n.name).join(' › ')
            };
        },
        // ---- Assigned administrator emails (compulsory, 1–5 per licence) ----
        parseAdminEmails(raw) {
            return Array.from(new Set(String(raw || '')
                .split(/[,;\s]+/)
                .map(x => x.trim().toLowerCase())
                .filter(Boolean)));
        },
        _isEmail(x) { return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(String(x || '')); },
        // Returns { ok, emails, reason }
        validateAdminEmails(raw) {
            const emails = this.parseAdminEmails(raw);
            if (emails.length === 0) return { ok: false, emails, reason: 'At least one assigned administrator email is required.' };
            if (emails.length > 5) return { ok: false, emails, reason: 'A maximum of 5 assigned administrator emails is allowed (you entered ' + emails.length + ').' };
            const bad = emails.filter(e => !this._isEmail(e));
            if (bad.length) return { ok: false, emails, reason: 'Invalid email address(es): ' + bad.join(', ') };
            return { ok: true, emails, reason: '' };
        },
        // Read a licence's administrator emails, tolerating pre-v15 records that only
        // carried the free-text adminViewer field (emails are extracted from it).
        licenceAdminEmails(l) {
            if (!l) return [];
            if (Array.isArray(l.adminEmails) && l.adminEmails.length) return l.adminEmails;
            return this.parseAdminEmails(l.adminViewer || '').filter(e => this._isEmail(e));
        },
        addLicenceFromForm() {
            const nodeId = document.getElementById('lc-node')?.value || '';
            const type = document.getElementById('lc-type')?.value || 'Team';
            const seats = parseInt(document.getElementById('lc-seats')?.value, 10);
            const validFrom = document.getElementById('lc-from')?.value || '';
            const validUntil = document.getElementById('lc-until')?.value || '';
            const adminRaw = (document.getElementById('lc-admin')?.value || '').trim();
            const notes = (document.getElementById('lc-notes')?.value || '').trim();
            if (!nodeId || !this.getNode(nodeId)) { alert('Please select the organisational node this licence belongs to.'); return; }
            /* v18_F8 FIX 5 — PROVISIONING BLOCK.
               Two refusals, both of which were missing and both of which produced the
               four orphaned licences found on 21 Jul: (a) writing while the central
               session is stale, and (b) attaching a licence to a node ID that does not
               resolve to a live record in Organizations_Nodes. */
            if (!this.requireCentral('provision a licence')) return;
            if (!this.nodeIsCentral(nodeId)) {
                alert('This node does not exist in the central datastore.\n\nA licence attached to it would be orphaned — it would appear here but resolve to nothing on any other device, and the Sheet would hold a Node_ID pointing at no record.\n\nSync from central, or create the node again so it is written centrally, then provision.');
                return;
            }
            const nodeRec = this.getNode(nodeId);
            if (nodeRec && nodeRec.active === false) { alert('This node is Inactive. Reactivate it before provisioning a licence against it.'); return; }
            if (!seats || seats < 1) { alert('Please enter a valid seat count (minimum 1).'); return; }
            if (validFrom && validUntil && new Date(validUntil) < new Date(validFrom)) { alert('"Valid Until" cannot be earlier than "Valid From".'); return; }
            const av = this.validateAdminEmails(adminRaw);
            if (!av.ok) { alert(av.reason); return; }
            // Ops Console access requires the administrator's email domain to match the
            // company's registered domain — warn at provisioning time if any would not.
            const company = (this.nodePath(nodeId)[0] || {}).name || '';
            const regDomain = this.getOrgDomain(company);
            if (regDomain) {
                const mismatched = av.emails.filter(e => e.split('@')[1] !== regDomain);
                if (mismatched.length) {
                    const proceed = confirm('Warning: ' + mismatched.join(', ') + ' does not match the registered email domain of "' + company + '" (@' + regDomain + ').\n\nWith the current access rules, these administrators will NOT be able to access the Operations Console for this company.\n\nProvision anyway?');
                    if (!proceed) return;
                }
            }
            const lic = {
                id: this._genId('LIC'),
                token: this.genLicenceToken(),
                nodeId, type: LICENCE_TYPES.includes(type) ? type : 'Team',
                seats, validFrom, validUntil,
                status: 'Active',
                adminEmails: av.emails,
                adminViewer: av.emails.join('; '),
                notes,
                createdAt: new Date().toISOString()
            };
            // v18: the central datastore is authoritative — persist there FIRST.
            this.centralSaveLicence(lic).then(ok => {
                if (!ok) return;                       // nothing cached if the server refused
                this.state.licences.push(lic);
                this._saveLicences();
                this.render();
            });
        },
        updateLicenceFromRow(i) {
            const l = this.state.licences[i];
            if (!l) return;
            const seats = parseInt(document.getElementById('lc-seats-' + i)?.value, 10);
            const until = document.getElementById('lc-until-' + i)?.value || '';
            const status = document.getElementById('lc-status-' + i)?.value || 'Active';
            const notes = (document.getElementById('lc-notes-' + i)?.value || '').trim();
            const adminRaw = (document.getElementById('lc-admin-' + i)?.value || '').trim();
            if (!seats || seats < 1) { alert('Seat count must be at least 1.'); return; }
            const av = this.validateAdminEmails(adminRaw);
            if (!av.ok) { alert(av.reason); return; }
            l.seats = seats; l.validUntil = until; l.status = (status === 'Suspended') ? 'Suspended' : 'Active'; l.notes = notes;
            l.adminEmails = av.emails; l.adminViewer = av.emails.join('; ');
            this.centralSaveLicence(l).then(ok => {
                if (!ok) { this.centralLoad(); return; }   // reload authoritative state on refusal
                this._saveLicences();
                this.render();
            });
        },
        async deleteLicence(i) {
            const lic0 = this.state.licences[i];
            if (lic0) {
                const ok = await this.centralDeleteLicence(lic0.id, 'Deactivated by Super Admin');
                if (!ok) return;
            }
            return this._deleteLicenceLocal(i);
        },
        _deleteLicenceLocal(i) {
            const l = this.state.licences[i];

        /* =====================================================================
           v18_F10 — SERVER AUTHORITY

           doors into the record console and only ONE of them obtains a server

             opsVerifyViewer()    -> "Local verification" -> NO SESSION AT ALL      X

           session can vanish mid-shift through no fault of the operator.

           re-establish the session automatically where that is possible, and say
           plainly what to do where it is not. =============================== */
        async ensureServerSession(actionLabel) {
            if (AIII_API.session) return true;
            // Super Admin credentials are held on this device, so the session can be
            // rebuilt silently. This also recovers from a cache eviction.
            if (this.state.isSuperAdmin) {
                const r = await AIII_API.call('auth.superLogin', { key: getSaPass1() + '-' + getSaPass2() });
                if (r && r.ok && r.session) { AIII_API.setSession(r.session, 'SUPER', null); return true; }
                alert('Cannot ' + (actionLabel || 'complete this action') + '.\n\n' +
                      'You are signed in as Super Admin on this screen, but the server did not accept those credentials, so no session exists.\n\n' +
                      (this._backendGuidance(r) || 'Check that your Super Admin passwords match the SA_KEY script property, then sign out and back in.'));
                return false;
            }
            // A company administrator signed in through the offline fallback holds no
            // server authority and cannot be re-authenticated without a fresh code.
            alert('Cannot ' + (actionLabel || 'complete this action') + '.\n\n' +
                  'This browser holds no server session, so the request would be refused.\n\n' +
                  'You are in the record console through LOCAL verification (the offline fallback). That view is read-only by design \u2014 it can show this device\'s records but cannot authorise anything on the server.\n\n' +
                  'To authorise a retake: sign out of the console and re-enter using \u201cEmail me a sign-in code\u201d, or use Super Admin credentials.');
            return false;

        // Every privileged call goes through here. One silent retry after a session
        // is rebuilt, because an evicted session should cost the operator nothing.
        async callAuthorised(action, payload, actionLabel) {
            if (!(await this.ensureServerSession(actionLabel))) return null;
            let r = await AIII_API.call(action, payload || {});
            if (r && r.ok === false && /unauthorized/i.test(String(r.error || ''))) {
                AIII_API.setSession('', '', null);                       // it is dead; stop trusting it
                if (!(await this.ensureServerSession(actionLabel))) return null;
                r = await AIII_API.call(action, payload || {});          // one retry only
            }
            if (r && r.ok === false) {
                const g = this._backendGuidance(r);
                alert('Could not ' + (actionLabel || 'complete this action') + '.\n\n' + (r.error || 'The server refused the request.') + (g ? '\n\n' + g : ''));

            }

        /* ================= v18 PARTICIPANT TOKEN RESOLUTION (state machine) ================= */
        readUrlToken() {
            try {
                const q = new URLSearchParams(window.location.search);
                const x = q.get('xinv'); if (x) return { token: x, kind: 'xinv' };

        resolveUrlToken() { return this.resolveTokenFromUrl(); },
        async resolveTokenFromUrl() {

            const r = await AIII_API.call('flow.resolve', { token: t.token });
            if (r && r.ok) {
                this.state.tokenContext = r; this.state.tokenError = '';
                if (r.kind === 'LICENCE' && r.licenceId) {
                    const lic = this.state.licences.find(l => l.id === r.licenceId);
                    if (lic) this.state.activeLicence = lic;
                }
            } else if (r && r.offline) {
                // Backend unreachable: fall back to the local licence cache (corporate links only).
                this.state.tokenContext = null;
                this.state.tokenError = '';
                if (t.kind === 'lic') this.applyLicenceFromUrl(t.token);
            } else {
                this.state.tokenContext = null;
                this.state.tokenError = (r && r.error) || 'This link could not be verified.';
            }
            return this.state.tokenContext;
        },
        // Server-side eligibility, evaluated at the moment of registration.
        // With a token: the full state machine (link validity + email rules).
        // Without a token: the plain one-attempt-per-email rule.
        /* =====================================================================
           v18_F9 ITEM 4 — EMAIL ELIGIBILITY AT THE POINT OF ENTRY
           Previously a respondent completed the whole enrolment form and only
           then learned the address had already been used. That is a bad
           experience and, worse, it teaches people to try a second address.
           The address is now checked as soon as it is entered.

           This is an ADVISORY read. It deliberately calls flow.eligibility and
           never flow.resolve, because resolve mutates token state; a pre-check
           must not have side effects. The authoritative gate on submit is
           unchanged, so a pass here can still be refused there.
           ===================================================================== */
        async precheckEmail(email) {
            const res = await this.resolveEligibility(email, { timeout: 12000 });
            this._cacheEligibility(email, res);           // Begin will reuse this answer
            if (res.offline) return { status: 'unknown', message: 'Could not verify right now \u2014 this will be checked again when you start.' };
            if (res.ok) return { status: 'ok', message: 'This email address is available.' };
            return { status: 'taken', message: res.error || 'This email address is not eligible to start a new assessment.' };
        },
        composeEmail(raw) {
            const v = String(raw || '').trim();
            const lock = this.state.regDomainLock || '';
            if (lock) return (!v || v.includes('@') || /\s/.test(v)) ? '' : v + '@' + lock;
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v) ? v : '';
        },
        // Writes straight to the status node. Never calls render() — rebuilding the
        // form mid-typing would steal focus and drop the caret.
        _setEmailStatus(status, message) {
            const el = typeof document !== 'undefined' ? document.getElementById('email-status') : null;
            if (!el) return;
            const tone = { checking: 'text-slate-400', ok: 'text-teal-400', taken: 'text-rose-400', unknown: 'text-amber-400' }[status] || 'text-slate-400';
            const icon = { checking: 'fa-circle-notch fa-spin', ok: 'fa-circle-check', taken: 'fa-circle-xmark', unknown: 'fa-triangle-exclamation' }[status] || '';
            el.className = 'text-[10px] ml-1 mt-1 min-h-[1rem] ' + tone;
            el.innerHTML = message ? ('<i class="fa-solid ' + icon + ' mr-1"></i>' + message) : '';
        },
        runEmailPrecheck(raw) {
            const email = this.composeEmail(raw);
            if (this._emailPrecheckTimer) clearTimeout(this._emailPrecheckTimer);
            if (!email) { this.state.emailPrecheck = null; this._setEmailStatus('', ''); return; }
            if (this.state.emailPrecheck && this.state.emailPrecheck.email === email && this.state.emailPrecheck.status !== 'checking') {
                this._setEmailStatus(this.state.emailPrecheck.status, this.state.emailPrecheck.message);
                return;
            }
            this.state.emailPrecheck = { email, status: 'checking', message: 'Checking this email address\u2026' };
            this._setEmailStatus('checking', 'Checking this email address\u2026');
            this._emailPrecheckTimer = setTimeout(async () => {
                const r = await this.precheckEmail(email);
                // Ignore a result that arrived after the respondent changed the address.
                if (!this.state.emailPrecheck || this.state.emailPrecheck.email !== email) return;
                this.state.emailPrecheck = { email, status: r.status, message: r.message };
                this._setEmailStatus(r.status, r.message);
            }, 550);
        },

        /* =====================================================================
           v18_F10 — WHY "BEGIN" FELT SLOW, AND WHY THE FIX IS SAFE

           Pressing Begin made a fresh Apps Script round trip to ask a question the
           app had already asked while the address was being typed. Apps Script is
           slow to wake (commonly 2-3 seconds), the button gave no feedback, and the
           form looked frozen. Two calls, one answer, no indication anything was
           happening.

           The authoritative answer is now computed ONCE, cached against the exact
           address, and reused if it is less than two minutes old. A correction to
           my earlier reasoning: I avoided flow.resolve in the pre-check on the
           belief that it mutated token state. Reading flowResolve() in the Apps
           Script shows it is a pure read, so the token path can be warmed too.

           This weakens nothing. flowSubmit() on the server independently re-checks
           eligibility on every submission and refuses a duplicate outright, so the
           browser-side check is a courtesy to the respondent, not the control.
           ===================================================================== */
        ELIGIBILITY_FRESH_MS: 120000,

        // The authoritative question, asked exactly once per address.
        async resolveEligibility(email, opts) {
            if (this.state.activeToken) {
                const r = await AIII_API.call('flow.resolve', { token: this.state.activeToken, email }, opts);
                if (r && r.offline) return { ok: true, offline: true };   // server re-checks on submit
                if (!r || !r.ok) return { ok: false, error: (r && r.error) || 'This link is no longer valid.' };
                return { ok: true, tokenContext: r };
            }
            const lic = this.state.activeLicence || null;
            const e = await AIII_API.call('flow.eligibility', { email, licenceId: lic ? lic.id : '' }, opts);
            if (e && e.offline) return { ok: true, offline: true };       // server re-checks on submit
            if (!e || !e.ok) return { ok: false, error: (e && e.error) || 'This email address is not eligible to start a new assessment.' };
            return { ok: true };
        },
        _cacheEligibility(email, res) {
            this.state.eligibilityCache = { email, res, at: Date.now() };
        },
        _cachedEligibility(email) {
            const c = this.state.eligibilityCache;
            if (!c || c.email !== email) return null;
            if ((Date.now() - c.at) > this.ELIGIBILITY_FRESH_MS) return null;
            return c.res;
        },
        async checkAttemptEligibility(email) {
            const cached = this._cachedEligibility(email);
            if (cached) {
                if (cached.tokenContext) this.state.tokenContext = cached.tokenContext;
                return cached;                                            // instant
            }
            // Bounded wait. If the backend is asleep or unreachable the respondent is
            // admitted and the SERVER refuses at submission if it must — far better
            // than a form that hangs with no explanation.
            const res = await this.resolveEligibility(email, { timeout: 8000 });
            this._cacheEligibility(email, res);
            if (res.tokenContext) this.state.tokenContext = res.tokenContext;
            return res;
        },

        /* ================= v18 REVOKE & REISSUE (scoped, server enforced) ================= */

                     : ((r.send && r.send.sent) ? '✓ Emailed automatically. Original attempt ' + r.revokedAttemptId + ' retained and marked REVOKED; no extra seat consumed.'

        /* ================= v18 CONFIRMED, DUPLICATE-SAFE SUBMISSION ================= */
        _newSurveyId() { return 'SV-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 10); },
        _savePending() { localStorage.setItem('aiii_pending_uploads', JSON.stringify(this.state.pendingUploads)); },
        queuePending(payload) {
            if (!this.state.pendingUploads.some(p => p.surveyId === payload.surveyId)) {
                this.state.pendingUploads.push(payload); this._savePending();
            }
        },
        // Idempotent submit: same Survey_ID never creates a second row, however many retries.
        async submitConfirmed(payload, attempts) {
            const max = attempts || 3;
            for (let i = 0; i < max; i++) {
                const r = await AIII_API.call('flow.submit', payload, { timeout: 25000 });
                if (r && r.ok) return r;
                if (r && !r.offline) return r;              // server said no — do not hammer
                await new Promise(res => setTimeout(res, 800 * Math.pow(2, i)));  // bounded backoff
            }
            return { ok: false, offline: true };
        },
        async retryPendingUploads() {
            if (!this.state.pendingUploads.length) return;
            const still = [];
            for (const p of this.state.pendingUploads) {
                const r = await this.submitConfirmed(p, 1);
                if (!(r && r.ok)) still.push(p);
            }
            const cleared = this.state.pendingUploads.length - still.length;
            this.state.pendingUploads = still; this._savePending();
            if (cleared > 0 && this.state.view === 'admin') this.render();
        },

            if (!token) return null;
            const lic = this.state.licences.find(l => l.token === token);
            if (!lic) { this.state.activeLicence = null; return null; }
            this.state.activeLicence = lic;
            return lic;
        },

        autoSyncPermitted() {

            if (f.country) rows = rows.filter(r => r.country === f.country);
            if (f.search) { const q = f.search.toLowerCase(); rows = rows.filter(r => r.name.toLowerCase().includes(q) || r.email.includes(q)); }
            if (f.from) { const t = new Date(f.from).setHours(0,0,0,0); rows = rows.filter(r => { const x = Date.parse(r.completedAt); return !isNaN(x) && x >= t; }); }
            if (f.to) { const t = new Date(f.to).setHours(23,59,59,999); rows = rows.filter(r => { const x = Date.parse(r.completedAt); return !isNaN(x) && x <= t; }); }

        opsStats(rows) {
            const scored = rows.filter(r => !isNaN(r.overall));
            const todayKey = fmtDate(new Date());
            const today = rows.filter(r => fmtDate(new Date(r.completedAt)) === todayKey).length;
            const avg = scored.length ? scored.reduce((a, r) => a + r.overall, 0) / scored.length : null;
            const timed = rows.filter(r => r.timeSec > 0);
            const avgMin = timed.length ? (timed.reduce((a, r) => a + r.timeSec, 0) / timed.length) / 60 : null;
            const orgs = Array.from(new Set(rows.map(r => r.organization).filter(Boolean))).sort();
            const countries = Array.from(new Set(rows.map(r => r.country).filter(Boolean))).sort();
            const qualityPass = rows.length ? Math.round(rows.filter(r => !r.flagged).length / rows.length * 100) : null;
            const bands = { strong: 0, moderate: 0, emerging: 0 };
            scored.forEach(r => {
                if (r.overall >= this.OPS_BANDS.strong) bands.strong++;
                else if (r.overall >= this.OPS_BANDS.moderate) bands.moderate++;
                else bands.emerging++;
            });
            const dimAvgs = [];
            for (let k = 0; k < 11; k++) {
                const vals = rows.map(r => r.dims[k]).filter(x => x !== null);
                dimAvgs.push(vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : null);
            }
            const clusterAvgs = clustersData.map(c => {
                const vals = c.dIdx.map(di => dimAvgs[di]).filter(x => x !== null && x !== undefined && !isNaN(x));
                return vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length) : null;
            });
            const seats = this.opsSeatScope();
            const rate = seats ? Math.min(100, Math.round(rows.length / seats * 100)) : null;
            // Daily average for spike detection (span of observed days)
            const times = rows.map(r => Date.parse(r.completedAt)).filter(x => !isNaN(x));
            const spanDays = times.length ? Math.max(1, Math.ceil((Math.max(...times) - Math.min(...times)) / 864e5)) : 1;
            const dailyAvg = rows.length / spanDays;
            return { completed: rows.length, today, avg, avgMin, orgs, countries, qualityPass, bands, dimAvgs, clusterAvgs, seats, rate, dailyAvg };
        },
        // Local (this-device) records visible to the current ops viewer.

            const regDomain = this.getOrgDomain(company);

                // The list arrives after the form is already on screen. Inject the new

                if (this.state.view === 'reg') {
                    const sel = document.getElementById('org-select');
                    if (sel) {
                        const keep = sel.value;

                            if (op.value && op.value !== '__other__') op.remove();

        /* =====================================================================
           v18_F9 ITEM 1 — IDLE SESSION TIMEOUT (Admin / Super Admin)
           An unattended admin console is the single easiest way for a licensed
           client's data to be seen by someone who should not see it. After
           IDLE_LOGOUT_MS with no human input the session is terminated: local
           privilege flags are cleared, ops polling stops, and the SERVER session
           token is discarded so a reopened tab cannot resume it.
           A warning appears IDLE_WARN_MS before the cut so nobody loses work.
           ===================================================================== */
        _idleActivity() {
            this._lastActivityMs = Date.now();
            if (this.state.idleWarning) { this.state.idleWarning = false; this.render(); }
        },
        idleSecondsRemaining() {
            if (!this._lastActivityMs) return IDLE_LOGOUT_MS / 1000;
            return Math.max(0, Math.round((IDLE_LOGOUT_MS - (Date.now() - this._lastActivityMs)) / 1000));
        },
        // Terminate every trace of an admin session, locally AND on the server.
        endAdminSession() {
            this.stopOpsPolling();
            this.stopIdleWatch();
            this.state.opsViewer = null; this.state.opsData = null; this.state.opsError = '';
            this.state.isAdmin = false; this.state.isSuperAdmin = false;
            this.state.adminView = 'responses';
            this.state.idleWarning = false;
            // The six-hour server session must die with the local one. Discarding the
            // token locally is not enough on its own \u2014 backend v2.1 exposes auth.logout,
            // which invalidates it in the server cache so a recovered token is useless.
            try {
                if (AIII_API.session) AIII_API.call('auth.logout', {});   // fire-and-forget
            } catch (e) {}
            try { AIII_API.setSession('', '', null); } catch (e) {} 
        },
        startIdleWatch() {
            if (this._idleTimer) return;
            this._lastActivityMs = Date.now();
            this.state.idleWarning = false;
            if (!this._idleBound && typeof document !== 'undefined') {
                this._idleBound = () => this._idleActivity();
                ['mousemove', 'mousedown', 'keydown', 'touchstart', 'scroll', 'wheel', 'click']
                    .forEach(ev => document.addEventListener(ev, this._idleBound, { passive: true }));
            }
            this._idleTimer = setInterval(() => {
                if (!(this.state.isAdmin || this.state.isSuperAdmin)) { this.stopIdleWatch(); return; }
                const idleMs = Date.now() - (this._lastActivityMs || Date.now());
                if (idleMs >= IDLE_LOGOUT_MS) {
                    this.endAdminSession();
                    this.navigate('admin');
                    alert('Signed out after ' + Math.round(IDLE_LOGOUT_MS / 60000) + ' minutes of inactivity.\n\nThis protects client data on an unattended screen. Please sign in again.');
                } else if (idleMs >= (IDLE_LOGOUT_MS - IDLE_WARN_MS) && !this.state.idleWarning) {
                    this.state.idleWarning = true;
                    this.render();
                } else if (this.state.idleWarning) {
                    this.render();   // tick the visible countdown
                }
            }, 5000);
        },
        stopIdleWatch() {
            if (this._idleTimer) { clearInterval(this._idleTimer); this._idleTimer = null; }
        },

        submitSuperAdminLogin() {
            const p1 = (document.getElementById('sa-pass-1')?.value || '').trim();
            const p2 = (document.getElementById('sa-pass-2')?.value || '').trim();
            if (p1 !== getSaPass1() || p2 !== getSaPass2()) {
                const err = document.getElementById('sa-login-error');
                if (err) err.style.display = 'block';
                const f1 = document.getElementById('sa-pass-1');
                const f2 = document.getElementById('sa-pass-2');
                if (f1) f1.value = '';
                if (f2) f2.value = '';
                if (f1) f1.focus();
                return;
            }
            const next = this._saLoginNext;
            this._saLoginNext = null;
            this.closeSuperAdminLoginModal();
            this.state.isSuperAdmin = true;
            this.startIdleWatch();   // v18_F9 ITEM 1
            // v18: exchange the pass-pair for a short-lived SERVER session. Privileged
            // actions are authorised by Apps Script, never by this browser alone.
            AIII_API.call('auth.superLogin', { key: p1 + '-' + p2 }).then(r => {
                if (r && r.ok && r.session) {
                    AIII_API.setSession(r.session, 'SUPER', null);
                    this.centralLoad(true).then(() => Promise.all([this.invRefresh(true), this.loadReconciliation(true)]).then(() => this.render()));
                    this.state.serverAuthed = true;
                } else {

                        error: (r && r.offline) ? 'backend unreachable' : ((r && r.error) || 'central session refused') };
                    this.render();
                }
            });
            if (next) { next(); return; }
            this.state.adminView = 'superadmin';
            this.render();

        recordAns(v) {
            if (this.state.isTransitioning) {
                console.warn('⚠️ Blocked: Already transitioning');
                return;
            }
            
            const currentQuestionIndex = this.state.currentIdx;
            const totalQuestions = allQuestions.length;
            const lastQuestionIndex = totalQuestions - 1;
            const isLastQuestion = (currentQuestionIndex === lastQuestionIndex);
            
            if (!this.state.answerTimes) this.state.answerTimes = new Array(totalQuestions).fill(null);
            this.state.answerTimes[currentQuestionIndex] = Date.now();
            this.state.answers[currentQuestionIndex] = v;
            
            // Visual selection: light up exactly one control — a 1-5 button, or the
            // Not Sure button — using the same 'selected' treatment for both.
            [1,2,3,4,5].forEach(i => {
                const b = document.getElementById(`btn-${i}`);
                if (b) b.classList.remove('selected');
            });
            const nsBtn = document.getElementById('not-sure-btn');
            if (nsBtn) nsBtn.classList.remove('selected');
            if (v === -1) {
                if (nsBtn) nsBtn.classList.add('selected');
            } else {
                const btn = document.getElementById(`btn-${v}`);
                if (btn) btn.classList.add('selected');
            }
            
            this.state.isTransitioning = true;
            
            if (isLastQuestion) {
                const allAnswered = this.state.answers.every(ans => ans !== null);
                
                if (!allAnswered) {
                    const firstUnanswered = this.state.answers.findIndex(ans => ans === null);
                    alert(`Please answer all questions before submitting. Question ${firstUnanswered + 1} is unanswered.`);
                    this.state.isTransitioning = false;
                    return;
                }
                
                const inner = document.getElementById('survey-inner');
                if (inner) inner.classList.add('fade-out');
                
                setTimeout(() => {
                    this.state.isTransitioning = false;
                    this.navigate('feedback');
                }, 250);
                
            } else {
                const inner = document.getElementById('survey-inner');
                if (inner) inner.classList.add('fade-out');
                
                setTimeout(() => {
                    this.state.currentIdx++;
                    this.render();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    setTimeout(() => {
                        const newInner = document.getElementById('survey-inner');
                        if (newInner) newInner.classList.remove('fade-out');
                        this.state.isTransitioning = false;
                    }, 50);
                }, 250);
            }
        },

        prev() { 
            if (this.state.currentIdx > 0 && !this.state.isTransitioning) {
                let prevIdx = this.state.currentIdx - 1;
                while (prevIdx >= 0 && this.state.answers[prevIdx] === null) {
                    prevIdx--;
                }
                
                if (prevIdx >= 0) {
                    this.state.isTransitioning = true;
                    const inner = document.getElementById('survey-inner');
                    if (inner) inner.classList.add('fade-out');
                    
                    setTimeout(() => {

        /* =====================================================================
           v18_F10 — RETAKE

           WHAT WAS WRONG. retake() reset this browser's state and navigated to the
           enrolment form. It never told the server anything. The server still held
           a COMPLETED_VALID attempt against that email, so the respondent typed
           their address and was refused: "An assessment has already been completed
           for this email address." The button appeared to work and could not.

           A retake is a server event, not a screen event. It now performs the same
           authorised revoke-and-reissue as the amber arrow, and hands back a fresh
           single-use link to copy or email.
           ===================================================================== */
        async retake(idx) {
            const rec = this.state.responses[idx];
            if (!rec) return;
            const email = (rec.user && rec.user.email) || '';
            const name = (rec.user && rec.user.name) || '';
            const surveyId = rec.surveyId || rec.id || '';

            // Legacy records predate server-side attempt control and have nothing to revoke.
            if (!rec.surveyId) {
                alert('This record was created before server-side attempt control and has no Survey ID, so the server holds nothing to withdraw.\n\n' +
                      'If ' + (email || 'this person') + ' is refused when they try again, issue them a fresh invitation from Super Admin \u2192 Individual Experience Invitations instead.');
                return;
            }
            if (!confirm('AUTHORISE A RETAKE\n\n' + (name ? name + '\n' : '') + email +
                '\nSurvey ID: ' + surveyId +
                '\n\nThe existing result is retained for audit and marked REVOKED, so it stops counting toward valid completions. A fresh single-use link is issued to the SAME email address and NO additional seat is consumed.\n\nProceed?')) return;

            const send = confirm('Email the fresh link to ' + (email || 'the employee') + ' now?\n\nOK = send automatically, Cancel = show me the link to share.');
            const r = await this.callAuthorised('admin.revokeReissue',
                { surveyId, reason: 'Authorised retake \u2014 requested by administrator', send },
                'authorise a retake for ' + (email || 'this record'));
            if (!r) return;
            if (!r.link) { alert('The server authorised the retake but returned no link. Refresh the console and check the Attempt_Control tab before trying again.'); return; }

            this.showLinkPanel({
                title: 'Retake Authorised', link: r.link, email: r.email || email, name: name,
                subject: 'Your fresh AI Instinct Index assessment link',
                body: 'A fresh assessment attempt has been authorised for you.\n\nYour new private link (single use):\n' + r.link +
                      '\n\nYour previous attempt has been withdrawn by your administrator. This replacement does not affect your organisation\u2019s seat count.\n\nAI Instinct Index team',
                note: (r.appUrlSet === false)
                    ? '\u26a0 THIS LINK WILL NOT OPEN. The APP_URL script property is not set in Apps Script, so the server could only build a partial address. Set it (Apps Script \u2192 Project Settings \u2192 Script properties \u2192 APP_URL = the full address of your published app), then re-issue. The revocation itself succeeded.'
                    : ((r.send && r.send.sent)
                        ? '\u2713 Emailed to ' + (r.email || email) + '. The previous attempt is retained and marked REVOKED; no extra seat was consumed.'
                        : '\u26a0 Not emailed (' + ((r.send && r.send.reason) || 'unavailable') + ') \u2014 copy the link above and send it yourself. The previous attempt is retained and marked REVOKED; no extra seat was consumed.')
            });
            this.state.eligibilityCache = null;   // that address is now eligible again
            if (this.state.adminView === 'ops') await this.opsRefresh();
            else this.render();
        },

        // === CANONICAL DATA SCHEMA ===
        // Single source of truth for every captured field. Used by BOTH the Google Sheet
        // upload AND both CSV export buttons, so backend columns always match exactly.
        /* =====================================================================
           v18_F9 ITEM 3 — LOCAL CLOCK AND INFERRED GEOGRAPHY
           These columns are ADDED alongside the existing UTC ones; no UTC value
           is replaced. UTC is what makes a Singapore response and an India
           response orderable on one timeline, and the normative benchmark
           depends on that. Local time answers a different question ("what hour
           of their working day was this?") and both are worth having.

           "Inferred" is meant literally. The region below is derived from the
           device's IANA timezone, not from GPS or an IP lookup. A traveller, a
           VPN, or a misconfigured laptop will all report the wrong place. Treat
           it as a weak signal for cohort description, never as a fact about
           where a person was sitting.
           ===================================================================== */
        _tzOffsetString(d) {
            const mins = -d.getTimezoneOffset();
            const sign = mins < 0 ? '-' : '+';
            const a = Math.abs(mins);
            return 'GMT' + sign + String(Math.floor(a / 60)).padStart(2, '0') + ':' + String(a % 60).padStart(2, '0');
        },
        // "2026-07-22 14:32:05 GMT+08:00" — the trailing offset also stops Google
        // Sheets re-interpreting the cell as a date in the SHEET's timezone.
        toLocalStamp(iso) {
            if (!iso) return '';
            const d = new Date(iso);
            if (isNaN(d.getTime())) return '';
            const p = n => String(n).padStart(2, '0');
            return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate()) + ' ' +
                   p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds()) + ' ' + this._tzOffsetString(d);
        },
        // Timezone-derived context. Captured at the moment it is called.
        clientContext() {
            let tz = '', locale = '';
            try { const r = Intl.DateTimeFormat().resolvedOptions(); tz = r.timeZone || ''; locale = r.locale || ''; } catch (e) {}
            if (!locale) { try { locale = navigator.language || ''; } catch (e) {} }
            const parts = String(tz).split('/');
            const area = parts.length > 1 ? parts[0] : '';
            const place = parts.length > 1 ? parts[parts.length - 1].replace(/_/g, ' ') : '';
            const now = new Date();
            return {

            const cl = this.clusterScoresFor(record);

                flatData[`${cDef.id}_n_answered`]     = c.nAnswered !== undefined ? c.nAnswered : 0;
                flatData[`${cDef.id}_n_expected`]     = c.nExpected !== undefined ? c.nExpected : 0;

            for (let i = 0; i < dimensionsData.length; i++) {
                const c2 = clusterOfDimIdx(i);

            flatData['qc_excluded_from_score'] = true;

            flatData['Mapping_Version']      = record.mappingVersion || MAPPING_VERSION;

        // v18: acknowledged, idempotent submission. The same Survey_ID can be retried
        // any number of times and will never create a second row.
        async submitToGoogleSheet(record) {
            if (!record || !record.answers || !record.user) return;
            const flatData = this.buildFlatData(record);
            Object.keys(flatData).forEach(k => { if (flatData[k] === undefined) flatData[k] = ''; });
            const surveyId = record.surveyId || (record.surveyId = this._newSurveyId());
            const ctx = this.state.tokenContext || {};
            flatData['Survey_ID'] = surveyId;
            flatData['Attempt_ID'] = ctx.attemptId || '';
            flatData['Cohort'] = (ctx.kind === 'EXPERIENCE') ? 'EXPERIENCE_INVITE' : 'CORPORATE';
            flatData['Instrument_Version'] = INSTRUMENT_VERSION;
            flatData['Scoring_Version'] = SCORING_VERSION;
            flatData['Schema_Version'] = 'v19';
            const payload = { surveyId, attemptId: ctx.attemptId || '', token: this.state.activeToken || '',
                              cohort: flatData['Cohort'], record: flatData };
            this.state.submitState = 'submitting';
            this.queuePending(payload);                       // durable BEFORE the network call
            const r = await this.submitConfirmed(payload);
            if (r && r.ok) {
                this.state.pendingUploads = this.state.pendingUploads.filter(p => p.surveyId !== surveyId);
                this._savePending();
                this.state.submitState = 'confirmed';
                record.serverAck = { assessmentId: r.assessmentId, attemptId: r.attemptId, status: r.status, duplicate: !!r.duplicate };
            } else {
                this.state.submitState = 'pending';           // honest: saved here, upload pending
            }
            return r;
        },
        _submitToGoogleSheetLegacy(record) {
            if (!record || !record.answers || !record.user) return Promise.resolve();
            const flatData = this.buildFlatData(record);
            // Parity guarantee with the CSV exports: JSON.stringify silently DROPS keys whose
            // value is undefined, which would create missing/misaligned columns in the Sheet.
            // Normalise any undefined to '' so every submission carries the full column set.
            Object.keys(flatData).forEach(k => { if (flatData[k] === undefined) flatData[k] = ''; });
            const payload = JSON.stringify(flatData);

            return fetch(CONFIG.GOOGLE_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                cache: "no-cache",
                headers: { 
                    "Content-Type": "text/plain;charset=utf-8"
                },
                body: payload
            })
            .then(response => {
                console.log("✅ Comprehensive data sent to Google Sheet successfully!");
                return response;
            })
            .catch(err => {
                console.error("❌ Google Sheet Sync Error:", err);
                throw err;
            });

        shrink(n, observedPct, K=3, prior=60) {
            if (!n || n <= 0) return prior;
            return ((n * observedPct) + (K * prior)) / (n + K);
        },

        computeCronbachAlphaForDimension(dIdx, responsesArray) {
            if (!responsesArray || !responsesArray.length) return null;
            const qIdxs = allQuestions.map((q,i) => q.dIdx === dIdx ? i : -1).filter(i => i !== -1);
            const k = qIdxs.length;
            if (k < 2) return null;
            const rows = [];
            for (let r of responsesArray) {
                const row = [];
                let hasAny = false;
                for (let qi of qIdxs) {
                    const v = (r.answers && typeof r.answers[qi] !== 'undefined') ? r.answers[qi] : null;
                    if (v === -1 || v === null || typeof v === 'undefined') {
                        row.push(NaN);
                    } else {
                        row.push(Number(v));
                        hasAny = true;
                    }
                }
                if (hasAny) rows.push(row);
            }
            if (rows.length < 2) return null;
            const itemVars = [];
            const itemMeans = [];
            for (let j=0;j<k;j++) {
                const col = rows.map(r => r[j]).filter(x => !isNaN(x));
                if (col.length < 2) return null;
                const mean = col.reduce((a,b) => a+b,0)/col.length;
                const varr = col.reduce((a,b) => a + Math.pow(b-mean,2),0)/(col.length-1);
                itemVars.push(varr);
                itemMeans.push(mean);
            }
            const totals = rows.map(r => {
                let sum = 0;
                let count = 0;
                for (let j=0;j<k;j++) {
                    if (!isNaN(r[j])) { sum += r[j]; count++; }
                }
                if (count < k) {
                    const overallMeans = itemMeans;
                    for (let j=0;j<k;j++) {
                        if (isNaN(r[j])) sum += overallMeans[j];
                    }
                }
                return sum;
            });
            const meanTotal = totals.reduce((a,b)=>a+b,0)/totals.length;
            const totalVar = totals.reduce((a,b)=>a + Math.pow(b-meanTotal,2),0)/(totals.length-1);
            const sumItemVars = itemVars.reduce((a,b)=>a+b,0);
            const alpha = (k / (k-1)) * (1 - (sumItemVars / totalVar));
            return alpha;
        },

        computeQualityFlags() {
            const flags = { tooFast:false, straightline:false, lowAnsweredDims: [] };
            try {
                const times = this.state.answerTimes || [];
                const answeredIdxs = [];
                for (let i=0;i<allQuestions.length;i++){
                    const v = this.state.answers[i];
                    if (typeof v !== 'undefined' && v !== null && v !== -1) answeredIdxs.push(i);
                }
                const deltas = [];
                let prev = null;
                for (let idx of answeredIdxs){
                    const t = this.state.answerTimes && this.state.answerTimes[idx] ? this.state.answerTimes[idx] : null;
                    if (t && prev) {
                        deltas.push(t - prev);
                    }
                    if (t) prev = t;
                }
                const toSeconds = arr => arr.map(x => x/1000);
                const median = arr => {
                    if (!arr.length) return null;
                    const a = arr.slice().sort((a,b)=>a-b);
                    const m = Math.floor(a.length/2);
                    return a.length%2 ? a[m] : (a[m-1]+a[m])/2;
                };
                const deltasSec = toSeconds(deltas);
                const med = median(deltasSec);
                if (med !== null && med < 1.5) flags.tooFast = true;
                const timeVals = (this.state.answerTimes || []).filter(x => x);
                if (timeVals.length >= 2) {
                    const totalSec = (Math.max(...timeVals) - Math.min(...timeVals))/1000;
                    if (totalSec < 120) flags.tooFast = true;
                    if (totalSec < (answeredIdxs.length * 1.5)) flags.tooFast = true;
                }
                // === STRAIGHT-LINING (Response Pattern Quality) ===
                // FIXED: previously computed over answered items only, which (a) stitched
                // non-adjacent answers into false streaks across "Not sure" gaps, and
                // (b) could never flag repeated "Not sure" responding. The pattern is now
                // judged over the PRESENTED question sequence, with -1 treated as a
                // response value in its own right. An unanswered position breaks a run.
                const seq = [];
                for (let i = 0; i < allQuestions.length; i++) {
                    const v = this.state.answers[i];
                    seq.push((typeof v !== 'undefined' && v !== null) ? Number(v) : null);
                }
                let maxConsecutive = 0, currentConsecutive = 0;
                for (let i = 0; i < seq.length; i++) {
                    if (seq[i] === null) { currentConsecutive = 0; continue; }
                    currentConsecutive = (i > 0 && seq[i] === seq[i-1]) ? currentConsecutive + 1 : 1;
                    maxConsecutive = Math.max(maxConsecutive, currentConsecutive);
                }
                if (maxConsecutive >= 10) flags.straightline = true;

                // Dominance rule: even without a 10-run, one identical response covering
                // 85% or more of all given responses is a straight-line pattern
                // (e.g. 4,4,4,4,4,4,4,4,5, repeating). Requires at least 20 responses.
                const given = seq.filter(v => v !== null);
                let dominantShare = 0;
                if (given.length >= 20) {
                    const counts = {};
                    given.forEach(v => { counts[v] = (counts[v] || 0) + 1; });
                    dominantShare = Math.max(...Object.values(counts)) / given.length;
                    if (dominantShare >= 0.85) flags.straightline = true;
                }
                // Expose the underlying metrics for backend analysis and auditability
                flags.maxIdenticalRun = maxConsecutive;
                flags.dominantAnswerPct = Math.round(dominantShare * 100);
                for (let dIdx=0; dIdx<dimensionsData.length; dIdx++){
                    const qIdxs = allQuestions.map((q,i) => q.dIdx === dIdx ? i : -1).filter(i => i !== -1);
                    const answered = qIdxs.filter(i => typeof this.state.answers[i] !== 'undefined' && this.state.answers[i] !== null && this.state.answers[i] !== -1).length;
                    const minAnswered = Math.max(1, Math.min(3, Math.ceil(qIdxs.length/2)));
                    if (answered < minAnswered) flags.lowAnsweredDims.push(dIdx);
                }
            } catch(e) {
                console.error('quality flag error', e);
            }
            return flags;
        },
    


        /* =================================================================
           CLUSTER ROLL-UPS
           -----------------------------------------------------------------
           DESCRIPTIVE SUMMARIES, NOT VALIDATED HIGHER-ORDER FACTOR SCORES.
           No CFA, omega-hierarchical or invariance evidence supports a
           second-order structure at this stage. These roll-ups aggregate
           their member dimensions using the same completeness weighting as
           the readiness score so the parts reconcile with the whole; they
           carry no independent psychometric claim and are labelled as such
           everywhere they surface. Quality-control items belong to no
           cluster and cannot enter any subtotal.
           ================================================================= */
        CLUSTER_SCORES_ARE_DESCRIPTIVE: true,

        computeClusterScores(scores) {
            if (!Array.isArray(scores)) return [];
            return clustersData.map(c => {
                let num = 0, rawNum = 0, den = 0, nAnswered = 0, nExpected = 0, anyValid = false;
                c.dIdx.forEach(di => {
                    const sc = scores[di];
                    if (!sc || isQCDim(sc) || di === QC_DIDX) return;
                    const expected = sc.expectedCount || 0;
                    const answered = sc.nAnswered || 0;
                    const w = (typeof sc.weight === 'number' && !isNaN(sc.weight)) ? sc.weight : (expected ? answered / expected : 0);
                    nAnswered += answered; nExpected += expected; den += w;
                    if (w > 0 && typeof sc.rawObserved === 'number' && !isNaN(sc.rawObserved)) rawNum += sc.rawObserved * w;
                    if (w > 0 && sc.score !== null && typeof sc.score === 'number' && !isNaN(sc.score)) { num += sc.score * w; anyValid = true; }
                });
                return {
                    id: c.id, roman: c.roman, name: c.name, short: c.short, desc: c.desc, exec: c.exec,
                    dIdx: c.dIdx.slice(),
                    score: (den > 0 && anyValid) ? Math.round(num / den) : null,
                    rawScore: (den > 0) ? Math.round(rawNum / den) : null,
                    nAnswered: nAnswered, nExpected: nExpected,
                    completionPct: nExpected ? Math.round((nAnswered / nExpected) * 100) : 0,
                    insufficient: !anyValid,
                    descriptive: true
                };
            });
        },
        clusterScoresFor(record) {
            if (!record) return [];
            if (Array.isArray(record.clusters) && record.clusters.length === clustersData.length) return record.clusters;
            return this.computeClusterScores(record.scores || []);
        },

        /* =================================================================
           LEGACY COMPATIBILITY
           Records captured before the canonical reorder stored answers in the
           old item sequence and scores in the old dimension sequence. They are
           remapped into canonical positions on load. The original readiness
           score is preserved verbatim as legacyOverall — it is NOT overwritten
           silently — and the record is stamped with the mapping it was born
           under so it stays interpretable forever.
           ================================================================= */
        migrateLegacyRecords() {
            let changed = 0;
            const remapArray = (arr) => {
                if (!Array.isArray(arr) || arr.length !== 46) return arr;
                const out = new Array(46).fill(null);
                for (let i = 0; i < 46; i++) out[LEGACY_ITEM_TO_CANONICAL[i]] = arr[i];
                return out;
            };
            const migrateOne = (r) => {
                if (!r || r.mappingVersion === MAPPING_VERSION) return false;
                r.legacyMappingVersion = r.mappingVersion || LEGACY_MAPPING_VERSION;
                r.legacyOverall = (typeof r.overall === 'number') ? r.overall : null;
                r.legacyAnswers = Array.isArray(r.answers) ? r.answers.slice() : null;
                r.answers = remapArray(r.answers);
                r.answerTimes = remapArray(r.answerTimes);
                if (Array.isArray(r.scores) && r.scores.length === 12) {
                    const ns = new Array(12).fill(null);
                    for (let d = 0; d < 12; d++) ns[LEGACY_DIM_TO_CANONICAL[d]] = r.scores[d];
                    r.scores = ns.map((sc, i) => sc ? Object.assign({}, sc, {
                        name: dimensionsData[i].name, id: dimensionsData[i].id, cluster: dimensionsData[i].cluster
                    }) : sc);
                }
                if (Array.isArray(r.alphas) && r.alphas.length === 12) {
                    const na = new Array(12).fill(null);
                    for (let d = 0; d < 12; d++) na[LEGACY_DIM_TO_CANONICAL[d]] = r.alphas[d];
                    r.alphas = na;
                }
                // Readiness score recomputed under the canonical rule (44 items,
                // quality-control excluded) so every record in the console is
                // comparable. The pre-migration value survives as legacyOverall.
                if (Array.isArray(r.scores)) {
                    let num = 0, den = 0, ok = false;
                    r.scores.forEach((sc, i) => {
                        if (!sc || i === QC_DIDX) return;
                        const w = (typeof sc.weight === 'number') ? sc.weight
                                : (sc.expectedCount ? (sc.nAnswered || 0) / sc.expectedCount : 0);
                        den += w;
                        if (w > 0 && typeof sc.score === 'number') { num += sc.score * w; ok = true; }
                    });
                    if (den > 0 && ok) r.overall = Math.round(num / den);
                    r.clusters = this.computeClusterScores(r.scores);
                }
                r.mappingVersion = MAPPING_VERSION;
                r.scoringVersion = SCORING_VERSION;
                r.migratedAt = new Date().toISOString();
                return true;
            };
            (this.state.responses || []).forEach(r => { if (migrateOne(r)) changed++; });
            (this.state.trash || []).forEach(r => { if (migrateOne(r)) changed++; });
            if (changed) {
                try {
                    localStorage.setItem('ai_instinct_v8', JSON.stringify(this.state.responses));
                    localStorage.setItem('ai_instinct_trash', JSON.stringify(this.state.trash || []));
                } catch (e) { console.error('legacy migration persist failed', e); }
                console.info('AIII: migrated ' + changed + ' record(s) to ' + MAPPING_VERSION);
                if (this.render) this.render();

        },

        processResults() {
            const totalQuestions = allQuestions.length;
            const answeredAt = (i) => {
                const v = (typeof this.state.answers[i] !== 'undefined') ? this.state.answers[i] : null;
                return (v === -1 || v === null || typeof v === 'undefined') ? 0 : 1;
            };
            const totalAnsweredAll = allQuestions.map((_, i) => answeredAt(i)).reduce((a, b) => a + b, 0);
            // Coverage is judged against the 44 SCORED items. The two
            // response-validity items neither raise nor lower completeness.
            const scoredIdxs = allQuestions.map((q, i) => q.qc ? -1 : i).filter(i => i !== -1);
            const scoredAnswered = scoredIdxs.map(answeredAt).reduce((a, b) => a + b, 0);
            const answeredProportion = scoredIdxs.length ? (scoredAnswered / scoredIdxs.length) : 0;

            const shrinkThreshold = 4;

            const scores = dimensionsData.map((d, dIdx) => {
                const qIdxs = allQuestions.map((q,i) => q.dIdx === dIdx ? i : -1).filter(i => i !== -1);
                const expectedCount = qIdxs.length;
                const vals = qIdxs.map(i => {
                    const v = (typeof this.state.answers[i] !== 'undefined') ? this.state.answers[i] : null;
                    if (v === -1 || v === null || typeof v === 'undefined') return null;
                    const question = allQuestions[i];
                    return question.reverse ? (6 - Number(v)) : Number(v);
                }).filter(x => x !== null && !isNaN(x));
                const nAnswered = vals.length;
                const minAnswered = Math.max(1, Math.min(3, Math.ceil(qIdxs.length/2)));
                let observedPct = 0;
                let insufficient = false;
                if (nAnswered >= minAnswered) {
                    const sum = vals.reduce((a,b)=>a+b,0);
                    observedPct = Math.round((sum / (nAnswered * 5)) * 100);
                } else {
                    insufficient = true;
                    observedPct = nAnswered ? Math.round((vals.reduce((a,b)=>a+b,0) / (Math.max(1,nAnswered) * 5)) * 100) : 0;
                }
                const baseK = (typeof d.shrinkK !== 'undefined') ? d.shrinkK : 3;
                const prior = (typeof d.prior !== 'undefined') ? d.prior : 60;

                let alpha = null;
                try {
                    if (typeof d.alpha !== 'undefined' && d.alpha !== null) alpha = d.alpha;
                    // FIXED: previously read localStorage key 'responses', which is never written.
                    // The live response store is this.state.responses (persisted as 'ai_instinct_v8').
                    const resp = (this.state.responses && this.state.responses.length) ? this.state.responses : null;
                    if (resp && resp.length >= 2) {
                        const computed = this.computeCronbachAlphaForDimension(dIdx, resp);
                        if (computed !== null) alpha = computed;
                    }
                } catch(e){ console.error('alpha load error', e); }

                let K_adj = baseK;
                if (alpha !== null && !isNaN(alpha)) {
                    if (alpha < 0) alpha = 0;
                    if (alpha > 1) alpha = 1;
                    K_adj = baseK * (1 - alpha);
                }

                let adjusted;
                if (nAnswered >= shrinkThreshold) {
                    adjusted = observedPct;
                } else {
                    adjusted = Math.round(this.shrink(nAnswered, observedPct, K_adj, prior));
                }

                const score = insufficient ? null : adjusted;
                const weight = expectedCount ? (nAnswered / expectedCount) : 0;
                return { ...d, score, rawObserved: observedPct, adjusted, nAnswered, insufficient, expectedCount, weight, alpha };
            });

            /* The readiness score is a function of the 44 scored items only.
               D12 carries the two response-validity items; it is measured,
               stored and reported, but it is structurally barred from the
               numerator AND the denominator of every aggregate. */
            const inScore = (s, i) => (i !== QC_DIDX) && !isQCDim(s);
            const weightedNumerator = scores.reduce((acc, s, i) => {
                if (!inScore(s, i)) return acc;
                if (s.score !== null && typeof s.score !== 'undefined') return acc + (s.score * s.weight);
                return acc;
            }, 0);
            const rawWeightedNumerator = scores.reduce((acc, s, i) => {
                if (!inScore(s, i)) return acc;
                if (s.weight > 0 && typeof s.rawObserved !== 'undefined' && s.rawObserved !== null) return acc + (s.rawObserved * s.weight);
                return acc;
            }, 0);
            const weightDenominator = scores.reduce((acc, s, i) => inScore(s, i) ? acc + s.weight : acc, 0);
            let weightedOverall = (weightDenominator > 0) ? Math.round(weightedNumerator / weightDenominator) : null;
            let weightedRawOverall = (weightDenominator > 0) ? Math.round(rawWeightedNumerator / weightDenominator) : null;

            const quality = this.computeQualityFlags();
            quality.insufficientOverall = false;
            if (answeredProportion < 0.5) {
                quality.insufficientOverall = true;
                if (weightedOverall !== null) {
                    weightedOverall = Math.round(weightedOverall * answeredProportion);
                }
                if (weightedRawOverall !== null) {
                    weightedRawOverall = Math.round(weightedRawOverall * answeredProportion);
                }
            }

            const anyValid = scores.some((s, i) => (i !== QC_DIDX) && s.score !== null && typeof s.score !== 'undefined');
            const overall = anyValid ? weightedOverall : null;
            const rawOverall = anyValid ? weightedRawOverall : null;

            let alphas = null;
            try {
                // FIXED: same storage-key correction as above — use the live response store.
                const resp = (this.state.responses && this.state.responses.length) ? this.state.responses : null;
                if (resp && resp.length >= 2) {
                    alphas = dimensionsData.map((d, dIdx) => {
                        const a = this.computeCronbachAlphaForDimension(dIdx, resp);
                        return (a === null) ? null : Number(a.toFixed(3));
                    });
                }
            } catch(e) { console.error(e); }

            const clusters = this.computeClusterScores(scores);
            const qcRaw = [this.state.answers[44], this.state.answers[45]];
            const qcCoded = qcRaw.map(v => (typeof v === 'number' && v >= 1 && v <= 5) ? (6 - v) : null);

            return { scores, overall, rawOverall, quality, alphas, totalAnsweredAll, answeredProportion,
                     scoredAnswered, scoredExpected: scoredIdxs.length,
                     clusters,
                     qualityControl: { raw: qcRaw, reverseCoded: qcCoded },
                     instrumentVersion: INSTRUMENT_VERSION,
                     mappingVersion: MAPPING_VERSION,
                     scoringVersion: SCORING_VERSION };
        }


,

        getTrendData(email) {
            const e = email.toLowerCase().trim();
            const sorted = this.state.responses
                .filter(r => r.user.email.toLowerCase().trim() === e)
                .sort((a,b) => {
                    const dA = new Date(a.timestamp).getTime() || 0;
                    const dB = new Date(b.timestamp).getTime() || 0;
                    return dA - dB;
                });
            
            return sorted.map((r, i) => ({

            }));

        getClass(s) { if (s >= 75) return "Strong"; if (s >= 50) return "Moderate"; return "Emerging"; },

        getSuggestions(dimIndex, score, dimName) {
            let pool = [];
            if (score >= 75) pool = SUGGESTIONS_POOL.STRONG;
            else if (score >= 50) pool = SUGGESTIONS_POOL.MODERATE;
            else pool = SUGGESTIONS_POOL.EMERGING;
            const len = pool.length;
            const indices = [ dimIndex % len, (dimIndex + 1) % len, (dimIndex + 2) % len ];
            return indices.map(i => pool[i].replace(/\[DIMENSION\]/g, dimName));
        },

                    doc.setFillColor(...colors.violet);
