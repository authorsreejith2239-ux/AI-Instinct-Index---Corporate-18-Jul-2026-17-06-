        // === CANONICAL DATA SCHEMA ===
        // Single source of truth for every captured field. Used by BOTH the Google Sheet
        // upload AND both CSV export buttons, so backend columns always match exactly.
        buildFlatData(record) {
            const times = record.answerTimes || [];
            const validTimes = times.filter(t => typeof t === 'number' && t > 0);
            
            const startedMs = record.startedAtMs || (validTimes.length ? Math.min(...validTimes) : null);
            const lastMs = validTimes.length ? Math.max(...validTimes) : null;
            
            // Total time = registration submit -> completion (wall clock). Fallback: first->last answer.
            const totalTimeMs = (startedMs && lastMs && lastMs > startedMs) ? (lastMs - startedMs) : 0;
            const totalTimeSeconds = Math.round(totalTimeMs / 1000);
            const totalTimeMinutes = Math.round(totalTimeSeconds / 60 * 10) / 10;
            
            const answeredCount = record.totalAnsweredAll || (record.answers || []).filter(a => a !== null && a !== -1).length;
            const avgTimePerQuestion = (answeredCount > 0 && totalTimeSeconds > 0)
                ? Math.round(totalTimeSeconds / answeredCount * 10) / 10
                : 0;
            
            const emailDomain = record.user.email ? record.user.email.split('@')[1] : 'unknown';
            const organization = record.user.organization || emailDomain;
            
            const flatData = {
                // === METADATA ===
                protocol_id: record.id || 'UNKNOWN',
                instrument_version: record.instrumentVersion || '11D46Q-v4-or-earlier',
                assessment_started_at: record.startedAtIso || '',
                assessment_completed_at: record.completedAtIso || '',
                manager_email: record.user.managerEmail || '',   // Column E in the Google Sheet and CSVs
                timestamp: record.timestamp || new Date().toISOString(),
                name: record.user.name || '',
                email: record.user.email || '',
                organization: organization,
                email_domain: emailDomain,
                country: record.user.country || '',
                device: record.device || 'unknown',
                
                // === RESPONDENT PROFILE (v4 additions) ===
                role_type: record.user.roleType || '',
                role_level: record.user.roleLevel || '',
                department: record.user.department || '',
                age_band: record.user.ageBand || '',
                tenure_band: record.user.tenureBand || '',
                ai_experience: record.user.aiExperience || '',
                gender: record.user.gender || '',
                consent_given: record.user.consent === true,
                consent_timestamp: record.user.consentTimestamp || '',
                org_size: (record.orgProfile && record.orgProfile.size) || '',
                org_industry: (record.orgProfile && record.orgProfile.industry) || '',
                open_feedback: record.feedback || '',
                
                // === OVERALL METRICS ===
                overall_score: record.overall || 0,
                total_questions: allQuestions.length,
                questions_answered: answeredCount,
                completion_percentage: Math.round(((record.answeredProportion || 0)) * 100),
                total_time_seconds: totalTimeSeconds,
                total_time_minutes: totalTimeMinutes,
                assessment_duration_seconds: totalTimeSeconds,
                avg_time_per_question_seconds: avgTimePerQuestion,
                
                // === QUALITY FLAGS ===
                flag_too_fast: record.quality?.tooFast || false,
                flag_straightline: record.quality?.straightline || false,
                quality_max_identical_run: record.quality?.maxIdenticalRun ?? '',
                quality_dominant_answer_pct: record.quality?.dominantAnswerPct ?? '',
                flag_insufficient: record.quality?.insufficientOverall || false,
                attention_check_Q45: record.answers ? record.answers[44] : null,
                attention_check_Q46: record.answers ? record.answers[45] : null
            };

            // === DIMENSION SCORES (deterministic: always one block per dimension) ===
            for (let idx = 0; idx < dimensionsData.length; idx++) {
                {
                    const s = (record.scores && record.scores[idx]) || {};
                    const dimNum = idx + 1;
                    flatData[`D${dimNum}_name`] = s.name || '';
                    flatData[`D${dimNum}_raw_observed`] = s.rawObserved !== undefined ? s.rawObserved : 'NA';
                    flatData[`D${dimNum}_adjusted`] = s.adjusted !== undefined ? s.adjusted : 'NA';
                    flatData[`D${dimNum}_final`] = s.score !== undefined ? s.score : 'NA';
                    flatData[`D${dimNum}_n_answered`] = s.nAnswered !== undefined ? s.nAnswered : 0;
                    flatData[`D${dimNum}_n_expected`] = s.expectedCount !== undefined ? s.expectedCount : 0;
                    flatData[`D${dimNum}_completion_pct`] = s.nAnswered && s.expectedCount ? Math.round((s.nAnswered / s.expectedCount) * 100) : 0;
                    flatData[`D${dimNum}_insufficient`] = s.insufficient || false;
                }
            }

            // === CRONBACH'S ALPHA (deterministic: always Alpha_D1..D12) ===
            for (let idx = 0; idx < dimensionsData.length; idx++) {
                const alpha = record.alphas && record.alphas[idx];
                flatData[`Alpha_D${idx + 1}`] = (alpha !== null && alpha !== undefined) ? Number(alpha.toFixed(4)) : 'NA';
            }

            // === INDIVIDUAL QUESTION RESPONSES (Q1-Q46) ===
            // 1-5 = Likert answer; -1 = "Not sure / Prefer not to answer" (captured verbatim);
            // 'NA' = the item was never answered at all.
            if (record.answers && Array.isArray(record.answers)) {
                record.answers.forEach((ans, idx) => {
                    flatData[`Q${idx + 1}`] = (ans !== null && ans !== undefined) ? ans : 'NA';
                });
            }

            // === TIME PER QUESTION (T1-T46 in seconds) ===
            const totalQuestions = allQuestions.length;
            for (let i = 0; i < totalQuestions; i++) {
                if (i === 0) {
                    // FIXED: was epoch/1000 (meaningless). Now: seconds from assessment start to first answer.
                    flatData[`T${i+1}`] = (times[0] && startedMs && times[0] > startedMs) ? Math.round((times[0] - startedMs) / 1000) : '';
                } else {
                    const curr = times[i];
                    const prev = times[i-1];
                    flatData[`T${i+1}`] = (curr && prev) ? Math.round((curr - prev) / 1000) : 0;
                }
            }

            // === ORGANISATIONAL NODE / LICENCE (v13) ===
            // Deterministic additive columns, appended AFTER the v12 canonical schema so the
            // existing 239-column order is preserved as a strict prefix (Sheet + CSV parity).
            flatData['Node_ID'] = (record.user && record.user.nodeId) || '';
            flatData['Node_Path'] = (record.user && record.user.nodePathLabel) || '';
            flatData['Licence_ID'] = (record.user && record.user.licenceId) || '';
            flatData['Employee_ID'] = (record.user && record.user.employeeId) || '';
            flatData['Org_Geography'] = (record.user && record.user.orgGeography) || '';
            flatData['Org_BusinessUnit'] = (record.user && record.user.orgBusinessUnit) || '';
            flatData['Org_Department'] = (record.user && record.user.orgDepartment) || '';
            flatData['Org_Team'] = (record.user && record.user.orgTeam) || '';

            return flatData;
        },

        // v18: acknowledged, idempotent submission. The same Survey_ID can be retried
        // any number of times and will never create a second row.
        async submitToGoogleSheet(record) {
            if (!record || !record.answers || !record.user) return;
            const flatData = this.buildFlatData(record);
            Object.keys(flatData).forEach(k => { if (flatData[k] === undefined) flatData[k] = ''; });
            const surveyId = record.surveyId || (record.surveyId = this._newSurveyId());
            const ctx = this.state.tokenContext || {};
            flatData['Survey_ID'] = surveyId;
            flatData['Attempt_ID'] = ctx.attemptId || '';
            flatData['Cohort'] = (ctx.kind === 'EXPERIENCE') ? 'EXPERIENCE_INVITE' : 'CORPORATE';
            flatData['Instrument_Version'] = 'v2.0.0';
            flatData['Scoring_Version'] = 'bayes-K3-prior60';
            flatData['Schema_Version'] = 'v18';
            const payload = { surveyId, attemptId: ctx.attemptId || '', token: this.state.activeToken || '',
                              cohort: flatData['Cohort'], record: flatData };
            this.state.submitState = 'submitting';
            this.queuePending(payload);                       // durable BEFORE the network call
            const r = await this.submitConfirmed(payload);
            if (r && r.ok) {
                this.state.pendingUploads = this.state.pendingUploads.filter(p => p.surveyId !== surveyId);
                this._savePending();
                this.state.submitState = 'confirmed';
                record.serverAck = { assessmentId: r.assessmentId, attemptId: r.attemptId, status: r.status, duplicate: !!r.duplicate };
            } else {
                this.state.submitState = 'pending';           // honest: saved here, upload pending
            }
            return r;
        },
        _submitToGoogleSheetLegacy(record) {
            if (!record || !record.answers || !record.user) return Promise.resolve();
            const flatData = this.buildFlatData(record);
            // Parity guarantee with the CSV exports: JSON.stringify silently DROPS keys whose
            // value is undefined, which would create missing/misaligned columns in the Sheet.
            // Normalise any undefined to '' so every submission carries the full column set.
            Object.keys(flatData).forEach(k => { if (flatData[k] === undefined) flatData[k] = ''; });
            const payload = JSON.stringify(flatData);

            return fetch(CONFIG.GOOGLE_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                cache: "no-cache",
                headers: { 
                    "Content-Type": "text/plain;charset=utf-8"
                },
                body: payload
            })
            .then(response => {
                console.log("✅ Comprehensive data sent to Google Sheet successfully!");
                return response;
            })
            .catch(err => {
                console.error("❌ Google Sheet Sync Error:", err);
                throw err;
            });
        },

        
        shrink(n, observedPct, K=3, prior=60) {
            if (!n || n <= 0) return prior;
            return ((n * observedPct) + (K * prior)) / (n + K);
        },

        computeCronbachAlphaForDimension(dIdx, responsesArray) {
            if (!responsesArray || !responsesArray.length) return null;
            const qIdxs = allQuestions.map((q,i) => q.dIdx === dIdx ? i : -1).filter(i => i !== -1);
            const k = qIdxs.length;
            if (k < 2) return null;
            const rows = [];
            for (let r of responsesArray) {
                const row = [];
                let hasAny = false;
                for (let qi of qIdxs) {
                    const v = (r.answers && typeof r.answers[qi] !== 'undefined') ? r.answers[qi] : null;
                    if (v === -1 || v === null || typeof v === 'undefined') {
                        row.push(NaN);
                    } else {
                        row.push(Number(v));
                        hasAny = true;
                    }
                }
                if (hasAny) rows.push(row);
            }
            if (rows.length < 2) return null;
            const itemVars = [];
            const itemMeans = [];
            for (let j=0;j<k;j++) {
                const col = rows.map(r => r[j]).filter(x => !isNaN(x));
                if (col.length < 2) return null;
                const mean = col.reduce((a,b) => a+b,0)/col.length;
                const varr = col.reduce((a,b) => a + Math.pow(b-mean,2),0)/(col.length-1);
                itemVars.push(varr);
                itemMeans.push(mean);
            }
            const totals = rows.map(r => {
                let sum = 0;
                let count = 0;
                for (let j=0;j<k;j++) {
                    if (!isNaN(r[j])) { sum += r[j]; count++; }
                }
                if (count < k) {
                    const overallMeans = itemMeans;
                    for (let j=0;j<k;j++) {
                        if (isNaN(r[j])) sum += overallMeans[j];
                    }
                }
                return sum;
            });
            const meanTotal = totals.reduce((a,b)=>a+b,0)/totals.length;
            const totalVar = totals.reduce((a,b)=>a + Math.pow(b-meanTotal,2),0)/(totals.length-1);
            const sumItemVars = itemVars.reduce((a,b)=>a+b,0);
            const alpha = (k / (k-1)) * (1 - (sumItemVars / totalVar));
            return alpha;
        },

        computeQualityFlags() {
            const flags = { tooFast:false, straightline:false, lowAnsweredDims: [] };
            try {
                const times = this.state.answerTimes || [];
                const answeredIdxs = [];
                for (let i=0;i<allQuestions.length;i++){
                    const v = this.state.answers[i];
                    if (typeof v !== 'undefined' && v !== null && v !== -1) answeredIdxs.push(i);
                }
                const deltas = [];
                let prev = null;
                for (let idx of answeredIdxs){
                    const t = this.state.answerTimes && this.state.answerTimes[idx] ? this.state.answerTimes[idx] : null;
                    if (t && prev) {
                        deltas.push(t - prev);
                    }
                    if (t) prev = t;
                }
                const toSeconds = arr => arr.map(x => x/1000);
                const median = arr => {
                    if (!arr.length) return null;
                    const a = arr.slice().sort((a,b)=>a-b);
                    const m = Math.floor(a.length/2);
                    return a.length%2 ? a[m] : (a[m-1]+a[m])/2;
                };
                const deltasSec = toSeconds(deltas);
                const med = median(deltasSec);
                if (med !== null && med < 1.5) flags.tooFast = true;
                const timeVals = (this.state.answerTimes || []).filter(x => x);
                if (timeVals.length >= 2) {
                    const totalSec = (Math.max(...timeVals) - Math.min(...timeVals))/1000;
                    if (totalSec < 120) flags.tooFast = true;
                    if (totalSec < (answeredIdxs.length * 1.5)) flags.tooFast = true;
                }
                // === STRAIGHT-LINING (Response Pattern Quality) ===
                // FIXED: previously computed over answered items only, which (a) stitched
                // non-adjacent answers into false streaks across "Not sure" gaps, and
                // (b) could never flag repeated "Not sure" responding. The pattern is now
                // judged over the PRESENTED question sequence, with -1 treated as a
                // response value in its own right. An unanswered position breaks a run.
                const seq = [];
                for (let i = 0; i < allQuestions.length; i++) {
                    const v = this.state.answers[i];
                    seq.push((typeof v !== 'undefined' && v !== null) ? Number(v) : null);
                }
                let maxConsecutive = 0, currentConsecutive = 0;
                for (let i = 0; i < seq.length; i++) {
                    if (seq[i] === null) { currentConsecutive = 0; continue; }
                    currentConsecutive = (i > 0 && seq[i] === seq[i-1]) ? currentConsecutive + 1 : 1;
                    maxConsecutive = Math.max(maxConsecutive, currentConsecutive);
                }
                if (maxConsecutive >= 10) flags.straightline = true;

                // Dominance rule: even without a 10-run, one identical response covering
                // 85% or more of all given responses is a straight-line pattern
                // (e.g. 4,4,4,4,4,4,4,4,5, repeating). Requires at least 20 responses.
                const given = seq.filter(v => v !== null);
                let dominantShare = 0;
                if (given.length >= 20) {
                    const counts = {};
                    given.forEach(v => { counts[v] = (counts[v] || 0) + 1; });
                    dominantShare = Math.max(...Object.values(counts)) / given.length;
                    if (dominantShare >= 0.85) flags.straightline = true;
                }
                // Expose the underlying metrics for backend analysis and auditability
                flags.maxIdenticalRun = maxConsecutive;
                flags.dominantAnswerPct = Math.round(dominantShare * 100);
                for (let dIdx=0; dIdx<dimensionsData.length; dIdx++){
                    const qIdxs = allQuestions.map((q,i) => q.dIdx === dIdx ? i : -1).filter(i => i !== -1);
                    const answered = qIdxs.filter(i => typeof this.state.answers[i] !== 'undefined' && this.state.answers[i] !== null && this.state.answers[i] !== -1).length;
                    const minAnswered = Math.max(1, Math.min(3, Math.ceil(qIdxs.length/2)));
                    if (answered < minAnswered) flags.lowAnsweredDims.push(dIdx);
                }
            } catch(e) {
                console.error('quality flag error', e);
            }
            return flags;
        },
    


        processResults() {
            const totalQuestions = allQuestions.length;
            const totalAnsweredAll = allQuestions.map((_,i) => {
                const v = (typeof this.state.answers[i] !== 'undefined') ? this.state.answers[i] : null;
                return (v === -1 || v === null || typeof v === 'undefined') ? 0 : 1;
            }).reduce((a,b)=>a+b,0);
            const answeredProportion = totalQuestions ? (totalAnsweredAll / totalQuestions) : 0;

            const shrinkThreshold = 4;

            const scores = dimensionsData.map((d, dIdx) => {
                const qIdxs = allQuestions.map((q,i) => q.dIdx === dIdx ? i : -1).filter(i => i !== -1);
                const expectedCount = qIdxs.length;
                const vals = qIdxs.map(i => {
                    const v = (typeof this.state.answers[i] !== 'undefined') ? this.state.answers[i] : null;
                    if (v === -1 || v === null || typeof v === 'undefined') return null;
                    const question = allQuestions[i];
                    return question.reverse ? (6 - Number(v)) : Number(v);
                }).filter(x => x !== null && !isNaN(x));
                const nAnswered = vals.length;
                const minAnswered = Math.max(1, Math.min(3, Math.ceil(qIdxs.length/2)));
                let observedPct = 0;
                let insufficient = false;
                if (nAnswered >= minAnswered) {
                    const sum = vals.reduce((a,b)=>a+b,0);
                    observedPct = Math.round((sum / (nAnswered * 5)) * 100);
                } else {
                    insufficient = true;
                    observedPct = nAnswered ? Math.round((vals.reduce((a,b)=>a+b,0) / (Math.max(1,nAnswered) * 5)) * 100) : 0;
                }
                const baseK = (typeof d.shrinkK !== 'undefined') ? d.shrinkK : 3;
                const prior = (typeof d.prior !== 'undefined') ? d.prior : 60;

                let alpha = null;
                try {
                    if (typeof d.alpha !== 'undefined' && d.alpha !== null) alpha = d.alpha;
                    // FIXED: previously read localStorage key 'responses', which is never written.
                    // The live response store is this.state.responses (persisted as 'ai_instinct_v8').
                    const resp = (this.state.responses && this.state.responses.length) ? this.state.responses : null;
                    if (resp && resp.length >= 2) {
                        const computed = this.computeCronbachAlphaForDimension(dIdx, resp);
                        if (computed !== null) alpha = computed;
                    }
                } catch(e){ console.error('alpha load error', e); }

                let K_adj = baseK;
                if (alpha !== null && !isNaN(alpha)) {
                    if (alpha < 0) alpha = 0;
                    if (alpha > 1) alpha = 1;
                    K_adj = baseK * (1 - alpha);
                }

                let adjusted;
                if (nAnswered >= shrinkThreshold) {
                    adjusted = observedPct;
                } else {
                    adjusted = Math.round(this.shrink(nAnswered, observedPct, K_adj, prior));
                }

                const score = insufficient ? null : adjusted;
                const weight = expectedCount ? (nAnswered / expectedCount) : 0;
                return { ...d, score, rawObserved: observedPct, adjusted, nAnswered, insufficient, expectedCount, weight, alpha };
            });

            const weightedNumerator = scores.reduce((acc, s) => {
                if (s.score !== null && typeof s.score !== 'undefined') return acc + (s.score * s.weight);
                return acc;
            }, 0);
            // Raw numerator: use rawObserved for all dimensions (even insufficient), same denominator
            const rawWeightedNumerator = scores.reduce((acc, s) => {
                if (s.weight > 0 && typeof s.rawObserved !== 'undefined' && s.rawObserved !== null) return acc + (s.rawObserved * s.weight);
                return acc;
            }, 0);
            const weightDenominator = scores.reduce((acc, s) => acc + s.weight, 0);
            let weightedOverall = (weightDenominator > 0) ? Math.round(weightedNumerator / weightDenominator) : null;
            let weightedRawOverall = (weightDenominator > 0) ? Math.round(rawWeightedNumerator / weightDenominator) : null;

            const quality = this.computeQualityFlags();
            quality.insufficientOverall = false;
            if (answeredProportion < 0.5) {
                quality.insufficientOverall = true;
                if (weightedOverall !== null) {
                    weightedOverall = Math.round(weightedOverall * answeredProportion);
                }
                if (weightedRawOverall !== null) {
                    weightedRawOverall = Math.round(weightedRawOverall * answeredProportion);
                }
            }

            const anyValid = scores.some(s => s.score !== null && typeof s.score !== 'undefined');
            const overall = anyValid ? weightedOverall : null;
            const rawOverall = anyValid ? weightedRawOverall : null;

            let alphas = null;
            try {
                // FIXED: same storage-key correction as above — use the live response store.
                const resp = (this.state.responses && this.state.responses.length) ? this.state.responses : null;
                if (resp && resp.length >= 2) {
                    alphas = dimensionsData.map((d, dIdx) => {
                        const a = this.computeCronbachAlphaForDimension(dIdx, resp);
                        return (a === null) ? null : Number(a.toFixed(3));
                    });
                }
            } catch(e) { console.error(e); }

            return { scores, overall, rawOverall, quality, alphas, totalAnsweredAll, answeredProportion };
        }


,

                .filter(r => r.user.email.toLowerCase().trim() === e)
                .sort((a,b) => {

                });

            }));

            let pool = [];
            if (score >= 75) pool = SUGGESTIONS_POOL.STRONG;
            else if (score >= 50) pool = SUGGESTIONS_POOL.MODERATE;
            else pool = SUGGESTIONS_POOL.EMERGING;

                    const aCol = aVal === null ? colors.slate400 : (aVal >= 0.70 ? colors.teal500 : (aVal >= 0.50 ? colors.amber : colors.rose500));
                    setFont('normal', 8, colors.slate700);
                    doc.text('D' + (di + 1) + ' ' + dim.name, cx, cyy);
                    setFont('bold', 8.5, aCol);
                    doc.text(aVal === null ? 'NA' : aVal.toFixed(3), cx + relW - 12, cyy, { align: 'right' });
                    doc.setDrawColor(...colors.slate100); doc.setLineWidth(0.3);
                    doc.line(cx, cyy + 1.6, cx + relW - 12, cyy + 1.6);
                });
                y += Math.ceil(ddDims.length / relCols) * 8 + 8;

                setFont('bold', 11, colors.slate900);
                doc.text('RESPONSE QUALITY SCREENING', layout.margin, y);
                accentRule(layout.margin, y + 2.2, 62);
                y += 9;
                const qTooFast = responses.filter(r => r.quality && r.quality.tooFast).length;
                const qStraight = responses.filter(r => r.quality && r.quality.straightline).length;
                const qInsuff = responses.filter(r => r.quality && r.quality.insufficientOverall).length;
                [['Completed faster than the reflective-response threshold (<120s)', qTooFast],
                 ['Straight-line answering detected (\u226510 consecutive identical responses)', qStraight],
                 ['Insufficient completion (<50% of items answered)', qInsuff]].forEach(q => {
                    const qc = q[1] ? colors.amber : colors.teal500;
                    doc.setFillColor(...qc); doc.circle(layout.margin + 2, y - 1, 1.3, 'F');
                    setFont('normal', 8.5, colors.slate700);
                    doc.text(q[0], layout.margin + 6, y);
                    setFont('bold', 9, qc);
                    doc.text(q[1] + ' of ' + teamCount, layout.width - layout.margin, y, { align: 'right' });
                    y += 7;
                });
                y += 4;
                doc.setFillColor(245, 243, 255);
                doc.setDrawColor(...colors.violet); doc.setLineWidth(0.4);
                doc.roundedRect(layout.margin, y, layout.contentW, 16, 2.5, 2.5, 'FD');
                setFont('bold', 8.5, colors.violet);
                doc.text('ANONYMITY PROTECTION', layout.margin + 4, y + 6);
                setFont('normal', 8, colors.slate700);
                doc.text('Group reporting requires a minimum of ' + MIN_REPORT_GROUP + ' respondents; this report covers ' + teamCount + '. Individual answers are never identifiable from the aggregates presented here.', layout.margin + 4, y + 11.5, { maxWidth: layout.contentW - 8 });
                y += 22;

                // === METHODOLOGY & REPORTING CONVENTIONS ===
                doc.addPage();
                addHeader();
                y = 30;
                setFont('bold', 16, colors.slate900);
                doc.text('METHODOLOGY & REPORTING CONVENTIONS', layout.margin, y);
                accentRule(layout.margin, y + 2.6, 132);
                y += 12;

                setFont('normal', 9, colors.slate700);
                const mcIntro = 'To ensure clarity and scientific rigour, the report presents both the observed measure and the statistically adjusted score. The following are presented for each dimension:';
                const mcIntroL = doc.splitTextToSize(mcIntro, layout.contentW);
                doc.text(mcIntroL, layout.margin, y);
                y += mcIntroL.length * 4.6 + 4;
                const mcConv = [
                    ['rawObserved', 'the direct percentage computed from answered items (transparent, intuitive).'],
                    ['adjusted', 'the conservative shrinkage-adjusted percentage (used to stabilise estimates when data are sparse).'],
                    ['nAnswered and expectedCount', 'the count of items answered in the dimension.'],
                    ["Cronbach's alpha", 'when available, showing internal reliability (null if not computable).'],
                ];
                mcConv.forEach(c => {
                    doc.setFillColor(...colors.cyan500); doc.circle(layout.margin + 2, y - 1, 1.2, 'F');
                    setFont('bold', 8.5, colors.slate900);
                    doc.text(c[0] + ' \u2014 ', layout.margin + 6, y);
                    const bw = doc.getTextWidth(c[0] + ' \u2014 ');
                    setFont('normal', 8.5, colors.slate700);
                    const cl = doc.splitTextToSize(c[1], layout.contentW - 10 - bw);
                    doc.text(cl, layout.margin + 6 + bw, y);
                    y += cl.length * 4.4 + 2.5;
                });
                y += 3;
                setFont('bold', 9.5, colors.slate900);
                doc.text('Completeness and flags:', layout.margin, y);
                y += 6;
                const mcFlags = [
                    ['Instrument completeness', 'proportion of all items answered; if <50% the overall score is flagged as insufficient and visibly penalised.'],
                    ['Insufficient dimensions', 'dimensions with too few answered items are marked and their scores may be omitted from the overall aggregation.'],
                    ['Quality flags', 'automatic indicators (tooFast, straightline) appear prominently; flagged responses are recommended for review or exclusion from norms.'],
                ];
                mcFlags.forEach(c => {
                    doc.setFillColor(...colors.violet); doc.circle(layout.margin + 2, y - 1, 1.2, 'F');
                    setFont('bold', 8.5, colors.slate900);
                    doc.text(c[0] + ' \u2014 ', layout.margin + 6, y);
                    const bw = doc.getTextWidth(c[0] + ' \u2014 ');
                    setFont('normal', 8.5, colors.slate700);
                    const cl = doc.splitTextToSize(c[1], layout.contentW - 10 - bw);
                    doc.text(cl, layout.margin + 6 + bw, y);
                    y += cl.length * 4.4 + 2.5;
                });
                y += 3;
                setFont('italic', 8.5, colors.slate500);
                const mcClose = 'These conventions are applied to increase interpretability for participants and confidence for corporate stakeholders while preserving statistical conservatism where data are sparse.';
                const mcCloseL = doc.splitTextToSize(mcClose, layout.contentW);
                doc.text(mcCloseL, layout.margin, y);
                y += mcCloseL.length * 4.4 + 8;

                doc.setFillColor(...colors.slate800);
                doc.roundedRect(layout.margin, y, layout.contentW, 24, 3, 3, 'F');
                setFont('bold', 9.5, colors.cyan500);
                doc.text('Scoring algorithm', layout.margin + 5, y + 7);
                setFont('normal', 8.5, colors.slate100);
                doc.text('Bayesian shrinkage: score = (n \u00d7 raw% + K \u00d7 prior) / (n + K), where K = 3 and prior = 60%. Shrinkage applies only where n < 4; the shrinkage weight adapts to each dimension\u2019s reliability (higher \u03b1 \u2192 less pull).', layout.margin + 5, y + 13, { maxWidth: layout.contentW - 10 });
                y += 30;

                doc.setFillColor(255, 251, 235);
                doc.setDrawColor(251, 191, 36); doc.setLineWidth(0.5);
                doc.roundedRect(layout.margin, y, layout.contentW, 18, 3, 3, 'FD');
                setFont('bold', 9, colors.slate900);
                doc.text('Disclaimer:', layout.margin + 5, y + 7);
                setFont('normal', 8.5, colors.slate700);
                doc.text('This is an organizational/individual diagnostic tool, not a validated clinical or academic instrument.', layout.margin + 5, y + 13, { maxWidth: layout.contentW - 10 });
                y += 25;
                setFont('bold', 9, colors.violet);
                doc.text('For methodology enquiries or workshop facilitation: sreejith@futureowork.com', layout.margin, y);

                // --- PAGE 4: DETAILED ROSTER ---
                doc.addPage();
                addHeader();
                y = 35;
                setFont('bold', 16, colors.slate900);
                doc.text('DETAILED ROSTER', layout.margin, y);
                accentRule(layout.margin, y + 2.6, 58);
                y += 4;
                setFont('normal', 9, colors.slate500);
                doc.text('All participants included in this team aggregate report.', layout.margin, y);
                y += 10;

                // Manual table — no autoTable plugin required
                var rosterColWidths = [48, 68, 28, 22]; // Name, Email, Country, Score
                var rosterHeaders = ['Name', 'Email', 'Country', 'Score'];
                var rosterRowH = 8;
                var rosterTotalW = rosterColWidths.reduce(function(a, b) { return a + b; }, 0);

                // Header row
                doc.setFillColor(...colors.slate900);
                doc.rect(layout.margin, y, rosterTotalW, rosterRowH, 'F');
                var rhX = layout.margin;
                rosterHeaders.forEach(function(hdr, hi) {
                    setFont('bold', 8, colors.white);
                    var align = (hi === 3) ? 'center' : 'left';
                    var textX = (align === 'center') ? (rhX + rosterColWidths[hi] / 2) : (rhX + 2.5);
                    doc.text(hdr, textX, y + 5.5, { align: align });
                    rhX += rosterColWidths[hi];
                });
                y += rosterRowH;

                // Data rows
                responses.forEach(function(r, rowIdx) {
                    var isEven = rowIdx % 2 === 0;
                    doc.setFillColor(isEven ? 255 : 248, isEven ? 255 : 250, isEven ? 255 : 252);
                    doc.rect(layout.margin, y, rosterTotalW, rosterRowH, 'F');

                    // Row border
                    doc.setDrawColor(226, 232, 240);
                    doc.setLineWidth(0.2);
                    doc.rect(layout.margin, y, rosterTotalW, rosterRowH, 'S');

                    var ov = (r.overall !== null && r.overall !== undefined && !isNaN(r.overall)) ? r.overall : 0;
                    var scoreColor = ov >= 75 ? colors.teal500 : (ov >= 50 ? colors.cyan500 : colors.rose500);

                    var rowCells = [
                        { text: (r.user && r.user.name) ? String(r.user.name) : '-', bold: true, color: colors.slate900, align: 'left' },
                        { text: (r.user && r.user.email) ? String(r.user.email) : '-', bold: false, color: colors.slate600 || colors.slate700, align: 'left' },
                        { text: (r.user && r.user.country) ? String(r.user.country) : '-', bold: false, color: colors.slate700, align: 'left' },
                        { text: ov + '%', bold: true, color: scoreColor, align: 'center' }
                    ];
                    var cellX = layout.margin;
                    rowCells.forEach(function(cell, ci) {
                        setFont(cell.bold ? 'bold' : 'normal', 7.5, cell.color);
                        var maxW = rosterColWidths[ci] - 5;
                        var txt = doc.splitTextToSize(cell.text, maxW)[0] || cell.text.substring(0, 28);
                        var tx = (cell.align === 'center') ? (cellX + rosterColWidths[ci] / 2) : (cellX + 2.5);
                        doc.text(txt, tx, y + 5.5, { align: cell.align });
                        cellX += rosterColWidths[ci];
                    });

                    y += rosterRowH;

                    // New page if needed
                    if (y > layout.height - 25) {
                        doc.addPage();
                        addHeader();
                        y = 30;
                        // Re-draw header
                        doc.setFillColor(...colors.slate900);
                        doc.rect(layout.margin, y, rosterTotalW, rosterRowH, 'F');
                        var rhX2 = layout.margin;
                        rosterHeaders.forEach(function(hdr, hi) {
                            setFont('bold', 8, colors.white);
                            var align2 = (hi === 3) ? 'center' : 'left';
                            var textX2 = (align2 === 'center') ? (rhX2 + rosterColWidths[hi] / 2) : (rhX2 + 2.5);
                            doc.text(hdr, textX2, y + 5.5, { align: align2 });
                            rhX2 += rosterColWidths[hi];
                        });
                        y += rosterRowH;
                    }
                });

                // Bottom border on table
                doc.setDrawColor(...colors.slate900);
                doc.setLineWidth(0.5);
                doc.line(layout.margin, y, layout.margin + rosterTotalW, y);

                console.log('6. Adding footer...');
                addFooter();
                
                console.log('7. Saving PDF...');
                const filename = `AI_Team_Report_${organization.replace(/\s+/g,'_')}_${fmtDateFile()}.pdf`;
                self._pdfDeliver(doc, filename);
                console.log('=== Team PDF Generated Successfully ===');
                console.log('Filename:', filename);
        },

        // Both export buttons now emit the SAME canonical dataset as the Google Sheet
        // (identical columns, identical order) via buildFlatData(). Nothing the user
        // inputs can be missing from either backend file.
        _buildCanonicalCSV() { return this._buildCanonicalCSVFrom(this.state.responses); },
        _buildCanonicalCSVFrom(list) {
            if (!list || !list.length) { alert('No responses to export yet.'); return null; }
            const rows = list.map(r => this.buildFlatData(r));
            const headers = Object.keys(rows[0]);
            const fmt = (v) => {
                if (v === null || v === undefined) return '';
                if (typeof v === 'boolean') return v ? 'TRUE' : 'FALSE';
                if (typeof v === 'number') return String(v);
                return `"${String(v).replace(/"/g, '""')}"`;
            };
            let csv = headers.join(',') + '\n';
            rows.forEach(fd => { csv += headers.map(h => fmt(fd[h])).join(',') + '\n'; });
            return csv;
        },

        _downloadCSV(csv, filename) {
            const b = new Blob([csv], { type: 'text/csv' });
            const u = URL.createObjectURL(b);
            const a = document.createElement('a'); a.href = u; a.download = filename; a.click();
        },

        exportMasterCSV() {
            const csv = this._buildCanonicalCSV();
            if (csv) this._downloadCSV(csv, `AI_Instinct_Master_Psychometrics_${fmtDateFile()}.csv`);
        },

        exportCSV() {
            const csv = this._buildCanonicalCSV();
            if (csv) this._downloadCSV(csv, `AI_Master_Data_${fmtDateFile()}.csv`);
        }
    };

    window.onload = () => app.init();
    
try {
(function(){
  function safeInject(){
    try{
      const rows=document.querySelectorAll('tbody tr');
      if(!rows.length) return;
      rows.forEach((tr,i)=>{
        if(tr.querySelector('.miniTrend')) return;
        const td=tr.querySelector('td');
        if(!td) return;
        const c=document.createElement('canvas');
        c.width=140;c.height=40;
        c.className='miniTrend';
        c.style.display='block';
        c.style.marginTop='6px';
        td.appendChild(c);
        try{
          if(window.app && app.getTrendData && app.drawTrend){
            const email=(tr.innerText.match(/\S+@\S+/)||[''])[0];
            const h=app.getTrendData(email||'');
            app.drawTrend(c.id= 'mt'+i,h,false);
          }
        }catch(e){}
      });
    }catch(e){}
  }
  new MutationObserver(()=>safeInject()).observe(document.body,{childList:true,subtree:true});
  window.addEventListener('load',()=>setTimeout(safeInject,300));
})();
}catch(e){}


</script>
