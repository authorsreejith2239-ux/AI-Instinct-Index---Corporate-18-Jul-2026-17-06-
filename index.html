                    y += rl.length * 4.6 + 3;
                });

                // === DIMENSION DEEP DIVE (all 11, with science + team guidance) ===
                doc.addPage();
                addHeader();
                y = 30;
                setFont('bold', 16, colors.slate900);
                doc.text('CLUSTER SUMMARY', layout.margin, y);
                accentRule(layout.margin, y + 2.6, 58);
                y += 9;
                setFont('normal', 8.5, colors.slate500);
                doc.text('Descriptive group summaries. Not validated higher-order factor scores. Response-validity items are excluded.', layout.margin, y + 4);
                y += 14;
                teamClusters.forEach(function (c) {
                    var bh = 24 + c.dIdx.length * 6.5;

                    scoreBar(layout.margin + 5, y + 15, layout.contentW - 36, 2.2, cv, cb[1]);
                    var cmy = y + 24;
                    c.dIdx.forEach(function (di) {
                        var t = teamScores[di] || {};

                        scoreBar(layout.margin + 76, cmy - 1.9, 70, 2.2, (mv === null ? 0 : mv), mb[1]);

                    y += bh + 6;
                });
                doc.addPage(); addHeader(); y = 30;
                setFont('bold', 16, colors.slate900);
                doc.text('DIMENSION DEEP DIVE', layout.margin, y);
                accentRule(layout.margin, y + 2.6, 72);
                y += 6;
                setFont('normal', 8.5, colors.slate500);
                doc.text('Team average, spread across participants, scientific context, and development guidance for each dimension.', layout.margin, y + 4);
                y += 12;

                const ddDims = scoredDims(dimensionsData);
                ddDims.forEach((dim, di) => {
                    const teamAvgDRaw = (teamScores.find(t => sameDim(t.name, dim.name)) || {}).score;
                    const teamAvgD = (typeof teamAvgDRaw === 'number') ? teamAvgDRaw : 0;
                    const per = responses.map(r => (r.scores || []).find(sc => sc.name === dim.name)).filter(sc => sc && typeof sc.score === 'number').map(sc => sc.score);
                    const dMin = per.length ? Math.min(...per) : null;
                    const dMax = per.length ? Math.max(...per) : null;
                    const [dBand, dCol] = bandOf(teamAvgD);
                    const dimIdx = dimensionsData.indexOf(dim);
                    const guide = self.getSuggestions(dimIdx, teamAvgD, dim.name).slice(0, 2);

                    // Measure box height
                    const sciLines = doc.splitTextToSize(dim.scientific || '', (layout.contentW / 2) - 14);
                    const devLines = doc.splitTextToSize(dim.dev || '', (layout.contentW / 2) - 14);
                    const guideLines = guide.map(g => doc.splitTextToSize(g, layout.contentW - 18));
                    const guideH = guideLines.reduce((a, gl) => a + gl.length * 3.9 + 2, 0);
                    const boxH = 24 + Math.max(sciLines.length, devLines.length) * 3.9 + 8 + guideH + 6;

                    if (y + boxH > layout.height - 22) { doc.addPage(); addHeader(); y = 30; }

                    const bx = layout.margin, by = y;
                    doc.setDrawColor(...colors.slate100);
                    doc.roundedRect(bx, by, layout.contentW, boxH, 2.5, 2.5, 'S');
                    doc.setFillColor(...dCol);
                    doc.rect(bx, by, 1.8, boxH, 'F');

                    setFont('bold', 10.5, colors.slate900);
                    var ddCl = clusterOfDimIdx(dimIdx);
                    doc.text('D' + (dimIdx + 1) + ' \u00b7 ' + canonicalDimName(dim.name).toUpperCase() + (ddCl ? '   [' + ddCl.roman + ']' : ''), bx + 5, by + 7);
                    doc.setFillColor(...dCol);
                    doc.roundedRect(layout.width - layout.margin - 21, by + 3, 17, 8, 2, 2, 'F');
                    setFont('bold', 8.5, colors.white);
                    doc.text((typeof teamAvgDRaw === 'number' ? teamAvgD + '%' : 'NA'), layout.width - layout.margin - 12.5, by + 8.3, { align: 'center' });
                    setFont('bold', 7.5, dCol);
                    doc.text(dBand, layout.width - layout.margin - 25, by + 8.3, { align: 'right' });

                    scoreBar(bx + 5, by + 10.5, layout.contentW - 34, 2.2, teamAvgD, dCol);
                    setFont('normal', 7, colors.slate500);
                    doc.text('Team range: ' + (dMin === null ? '\u2014' : dMin + '%\u2013' + dMax + '%') + '  \u00b7  n=' + per.length + (dMax !== null && (dMax - dMin) >= 35 ? '  \u00b7  wide spread \u2014 alignment opportunity' : ''), bx + 5, by + 17);

                    const cy0 = by + 22;
                    setFont('bold', 7.5, colors.violet);
                    doc.text('SCIENTIFIC CONTEXT', bx + 5, cy0);
                    setFont('normal', 7.3, colors.slate700);
                    doc.text(sciLines, bx + 5, cy0 + 4);
                    setFont('bold', 7.5, colors.violet);
                    doc.text('TRANSFORMATION GUIDANCE', layout.width / 2 + 3, cy0);
                    setFont('normal', 7.3, colors.slate700);
                    doc.text(devLines, layout.width / 2 + 3, cy0 + 4);

                    let gy = cy0 + Math.max(sciLines.length, devLines.length) * 3.9 + 7;
                    setFont('bold', 7.5, colors.slate900);
                    doc.text('TEAM DEVELOPMENT FOCUS', bx + 5, gy);
                    gy += 4.5;
                    guideLines.forEach(gl => {
                        doc.setFillColor(...colors.cyan500);
                        doc.circle(bx + 7, gy - 1, 1.1, 'F');
                        setFont('normal', 7.3, colors.slate700);
                        doc.text(gl, bx + 11, gy);
                        gy += gl.length * 3.9 + 2;
                    });

                    y = by + boxH + 6;
                });

                // === RELIABILITY & DATA QUALITY ===
                doc.addPage();
                addHeader();
                y = 30;
                setFont('bold', 16, colors.slate900);
                doc.text('RELIABILITY & DATA QUALITY', layout.margin, y);
                accentRule(layout.margin, y + 2.6, 92);
                y += 12;

                setFont('bold', 11, colors.slate900);
                doc.text("INTERNAL CONSISTENCY \u2014 CRONBACH'S \u03b1 (THIS GROUP)", layout.margin, y);
                y += 5;
                setFont('normal', 8, colors.slate500);
                doc.text('Computed from this group\u2019s answer vectors. Target \u03b1 \u2265 0.70; NA = not computable from available items.', layout.margin, y);
                y += 7;
                const relCols = 2, relW = (layout.contentW - 6) / relCols;
                ddDims.forEach((dim, di) => {
                    const dimIdx = dimensionsData.indexOf(dim);
                    let aVal = null;
                    try { const a = self.computeCronbachAlphaForDimension(dimIdx, responses); aVal = (a === null || isNaN(a)) ? null : Number(a.toFixed(3)); } catch (e) {}
                    const cx = layout.margin + (di % relCols) * (relW + 6);
                    const cyy = y + Math.floor(di / relCols) * 8;
                    const aCol = aVal === null ? colors.slate400 : (aVal >= 0.70 ? colors.teal500 : (aVal >= 0.50 ? colors.amber : colors.rose500));
                    setFont('normal', 8, colors.slate700);
                    doc.text('D' + (di + 1) + ' ' + dim.name, cx, cyy);
                    setFont('bold', 8.5, aCol);
                    doc.text(aVal === null ? 'NA' : aVal.toFixed(3), cx + relW - 12, cyy, { align: 'right' });
                    doc.setDrawColor(...colors.slate100); doc.setLineWidth(0.3);
                    doc.line(cx, cyy + 1.6, cx + relW - 12, cyy + 1.6);
                });
                y += Math.ceil(ddDims.length / relCols) * 8 + 8;

                setFont('bold', 11, colors.slate900);
                doc.text('RESPONSE QUALITY SCREENING', layout.margin, y);
                accentRule(layout.margin, y + 2.2, 62);
                y += 9;
                const qTooFast = responses.filter(r => r.quality && r.quality.tooFast).length;
                const qStraight = responses.filter(r => r.quality && r.quality.straightline).length;
                const qInsuff = responses.filter(r => r.quality && r.quality.insufficientOverall).length;
                [['Completed faster than the reflective-response threshold (<120s)', qTooFast],
                 ['Straight-line answering detected (\u226510 consecutive identical responses)', qStraight],
                 ['Insufficient completion (<50% of items answered)', qInsuff]].forEach(q => {
                    const qc = q[1] ? colors.amber : colors.teal500;
                    doc.setFillColor(...qc); doc.circle(layout.margin + 2, y - 1, 1.3, 'F');
                    setFont('normal', 8.5, colors.slate700);
                    doc.text(q[0], layout.margin + 6, y);
                    setFont('bold', 9, qc);
                    doc.text(q[1] + ' of ' + teamCount, layout.width - layout.margin, y, { align: 'right' });
                    y += 7;
                });
                y += 4;
                doc.setFillColor(245, 243, 255);
                doc.setDrawColor(...colors.violet); doc.setLineWidth(0.4);
                doc.roundedRect(layout.margin, y, layout.contentW, 16, 2.5, 2.5, 'FD');
                setFont('bold', 8.5, colors.violet);
                doc.text('ANONYMITY PROTECTION', layout.margin + 4, y + 6);
                setFont('normal', 8, colors.slate700);
                doc.text('Group reporting requires a minimum of ' + MIN_REPORT_GROUP + ' respondents; this report covers ' + teamCount + '. Individual answers are never identifiable from the aggregates presented here.', layout.margin + 4, y + 11.5, { maxWidth: layout.contentW - 8 });
                y += 22;

                // === METHODOLOGY & REPORTING CONVENTIONS ===
                doc.addPage();
                addHeader();
                y = 30;
                setFont('bold', 16, colors.slate900);
                doc.text('METHODOLOGY & REPORTING CONVENTIONS', layout.margin, y);
                accentRule(layout.margin, y + 2.6, 132);
                y += 12;

                setFont('normal', 9, colors.slate700);
                const mcIntro = 'To ensure clarity and scientific rigour, the report presents both the observed measure and the statistically adjusted score. The following are presented for each dimension:';
                const mcIntroL = doc.splitTextToSize(mcIntro, layout.contentW);
                doc.text(mcIntroL, layout.margin, y);
                y += mcIntroL.length * 4.6 + 4;
                const mcConv = [
                    ['rawObserved', 'the direct percentage computed from answered items (transparent, intuitive).'],
                    ['adjusted', 'the conservative shrinkage-adjusted percentage (used to stabilise estimates when data are sparse).'],
                    ['nAnswered and expectedCount', 'the count of items answered in the dimension.'],
                    ["Cronbach's alpha", 'when available, showing internal reliability (null if not computable).'],
                ];
                mcConv.forEach(c => {
                    doc.setFillColor(...colors.cyan500); doc.circle(layout.margin + 2, y - 1, 1.2, 'F');
                    setFont('bold', 8.5, colors.slate900);
                    doc.text(c[0] + ' \u2014 ', layout.margin + 6, y);
                    const bw = doc.getTextWidth(c[0] + ' \u2014 ');
                    setFont('normal', 8.5, colors.slate700);
                    const cl = doc.splitTextToSize(c[1], layout.contentW - 10 - bw);
                    doc.text(cl, layout.margin + 6 + bw, y);
                    y += cl.length * 4.4 + 2.5;
                });
                y += 3;
                setFont('bold', 9.5, colors.slate900);
                doc.text('Completeness and flags:', layout.margin, y);
                y += 6;
                const mcFlags = [
                    ['Instrument completeness', 'proportion of all items answered; if <50% the overall score is flagged as insufficient and visibly penalised.'],
                    ['Insufficient dimensions', 'dimensions with too few answered items are marked and their scores may be omitted from the overall aggregation.'],
                    ['Quality flags', 'automatic indicators (tooFast, straightline) appear prominently; flagged responses are recommended for review or exclusion from norms.'],
                ];
                mcFlags.forEach(c => {
                    doc.setFillColor(...colors.violet); doc.circle(layout.margin + 2, y - 1, 1.2, 'F');
                    setFont('bold', 8.5, colors.slate900);
                    doc.text(c[0] + ' \u2014 ', layout.margin + 6, y);
                    const bw = doc.getTextWidth(c[0] + ' \u2014 ');
                    setFont('normal', 8.5, colors.slate700);
                    const cl = doc.splitTextToSize(c[1], layout.contentW - 10 - bw);
                    doc.text(cl, layout.margin + 6 + bw, y);
                    y += cl.length * 4.4 + 2.5;
                });
                y += 3;
                setFont('italic', 8.5, colors.slate500);
                const mcClose = 'These conventions are applied to increase interpretability for participants and confidence for corporate stakeholders while preserving statistical conservatism where data are sparse.';
                const mcCloseL = doc.splitTextToSize(mcClose, layout.contentW);
                doc.text(mcCloseL, layout.margin, y);
                y += mcCloseL.length * 4.4 + 8;

                doc.setFillColor(...colors.slate800);
                doc.roundedRect(layout.margin, y, layout.contentW, 24, 3, 3, 'F');
                setFont('bold', 9.5, colors.cyan500);
                doc.text('Scoring algorithm', layout.margin + 5, y + 7);
                setFont('normal', 8.5, colors.slate100);
                doc.text('Bayesian shrinkage: score = (n \u00d7 raw% + K \u00d7 prior) / (n + K), where K = 3 and prior = 60%. Shrinkage applies only where n < 4; the shrinkage weight adapts to each dimension\u2019s reliability (higher \u03b1 \u2192 less pull).', layout.margin + 5, y + 13, { maxWidth: layout.contentW - 10 });
                y += 30;

                doc.setFillColor(255, 251, 235);
                doc.setDrawColor(251, 191, 36); doc.setLineWidth(0.5);
                doc.roundedRect(layout.margin, y, layout.contentW, 18, 3, 3, 'FD');
                setFont('bold', 9, colors.slate900);
                doc.text('Disclaimer:', layout.margin + 5, y + 7);
                setFont('normal', 8.5, colors.slate700);
                doc.text('This is an organizational/individual diagnostic tool, not a validated clinical or academic instrument.', layout.margin + 5, y + 13, { maxWidth: layout.contentW - 10 });
                y += 25;
                setFont('bold', 9, colors.violet);
                doc.text('For methodology enquiries or workshop facilitation: sreejith@futureowork.com', layout.margin, y);

                // --- PAGE 4: DETAILED ROSTER ---
                doc.addPage();
                addHeader();
                y = 35;
                setFont('bold', 16, colors.slate900);
                doc.text('DETAILED ROSTER', layout.margin, y);
                accentRule(layout.margin, y + 2.6, 58);
                y += 4;
                setFont('normal', 9, colors.slate500);
                doc.text('All participants included in this team aggregate report.', layout.margin, y);
                y += 10;

                // Manual table — no autoTable plugin required
                var rosterColWidths = [48, 68, 28, 22]; // Name, Email, Country, Score
                var rosterHeaders = ['Name', 'Email', 'Country', 'Score'];
                var rosterRowH = 8;
                var rosterTotalW = rosterColWidths.reduce(function(a, b) { return a + b; }, 0);

                // Header row
                doc.setFillColor(...colors.slate900);
                doc.rect(layout.margin, y, rosterTotalW, rosterRowH, 'F');
                var rhX = layout.margin;
                rosterHeaders.forEach(function(hdr, hi) {
                    setFont('bold', 8, colors.white);
                    var align = (hi === 3) ? 'center' : 'left';
                    var textX = (align === 'center') ? (rhX + rosterColWidths[hi] / 2) : (rhX + 2.5);
                    doc.text(hdr, textX, y + 5.5, { align: align });
                    rhX += rosterColWidths[hi];
                });
                y += rosterRowH;

                // Data rows
                responses.forEach(function(r, rowIdx) {
                    var isEven = rowIdx % 2 === 0;
                    doc.setFillColor(isEven ? 255 : 248, isEven ? 255 : 250, isEven ? 255 : 252);
                    doc.rect(layout.margin, y, rosterTotalW, rosterRowH, 'F');

                    // Row border
                    doc.setDrawColor(226, 232, 240);
                    doc.setLineWidth(0.2);
                    doc.rect(layout.margin, y, rosterTotalW, rosterRowH, 'S');

                    var ov = (r.overall !== null && r.overall !== undefined && !isNaN(r.overall)) ? r.overall : 0;
                    var scoreColor = ov >= 75 ? colors.teal500 : (ov >= 50 ? colors.cyan500 : colors.rose500);

                    var rowCells = [
                        { text: (r.user && r.user.name) ? String(r.user.name) : '-', bold: true, color: colors.slate900, align: 'left' },
                        { text: (r.user && r.user.email) ? String(r.user.email) : '-', bold: false, color: colors.slate600 || colors.slate700, align: 'left' },
                        { text: (r.user && r.user.country) ? String(r.user.country) : '-', bold: false, color: colors.slate700, align: 'left' },
                        { text: ov + '%', bold: true, color: scoreColor, align: 'center' }
                    ];
                    var cellX = layout.margin;
                    rowCells.forEach(function(cell, ci) {
                        setFont(cell.bold ? 'bold' : 'normal', 7.5, cell.color);
                        var maxW = rosterColWidths[ci] - 5;
                        var txt = doc.splitTextToSize(cell.text, maxW)[0] || cell.text.substring(0, 28);
                        var tx = (cell.align === 'center') ? (cellX + rosterColWidths[ci] / 2) : (cellX + 2.5);
                        doc.text(txt, tx, y + 5.5, { align: cell.align });
                        cellX += rosterColWidths[ci];
                    });

                    y += rosterRowH;

                    // New page if needed
                    if (y > layout.height - 25) {
                        doc.addPage();
                        addHeader();
                        y = 30;
                        // Re-draw header
                        doc.setFillColor(...colors.slate900);
                        doc.rect(layout.margin, y, rosterTotalW, rosterRowH, 'F');
                        var rhX2 = layout.margin;
                        rosterHeaders.forEach(function(hdr, hi) {
                            setFont('bold', 8, colors.white);
                            var align2 = (hi === 3) ? 'center' : 'left';
                            var textX2 = (align2 === 'center') ? (rhX2 + rosterColWidths[hi] / 2) : (rhX2 + 2.5);
                            doc.text(hdr, textX2, y + 5.5, { align: align2 });
                            rhX2 += rosterColWidths[hi];
                        });
                        y += rosterRowH;
                    }
                });

                // Bottom border on table
                doc.setDrawColor(...colors.slate900);
                doc.setLineWidth(0.5);
                doc.line(layout.margin, y, layout.margin + rosterTotalW, y);

                console.log('6. Adding footer...');
                addFooter();
                
                console.log('7. Saving PDF...');
                const filename = `AI_Team_Report_${organization.replace(/\s+/g,'_')}_${fmtDateFile()}.pdf`;
                self._pdfDeliver(doc, filename);
                console.log('=== Team PDF Generated Successfully ===');
                console.log('Filename:', filename);
        },

        // Both export buttons now emit the SAME canonical dataset as the Google Sheet
        // (identical columns, identical order) via buildFlatData(). Nothing the user
        // inputs can be missing from either backend file.
        _buildCanonicalCSV() { return this._buildCanonicalCSVFrom(this.state.responses); },
        _buildCanonicalCSVFrom(list) {
            if (!list || !list.length) { alert('No responses to export yet.'); return null; }
            const rows = list.map(r => this.buildFlatData(r));
            const headers = Object.keys(rows[0]);
            const fmt = (v) => {
                if (v === null || v === undefined) return '';
                if (typeof v === 'boolean') return v ? 'TRUE' : 'FALSE';
                if (typeof v === 'number') return String(v);
                return `"${String(v).replace(/"/g, '""')}"`;
            };
            let csv = headers.join(',') + '\n';
            rows.forEach(fd => { csv += headers.map(h => fmt(fd[h])).join(',') + '\n'; });
            return csv;
        },

        _downloadCSV(csv, filename) {
            const b = new Blob([csv], { type: 'text/csv' });
            const u = URL.createObjectURL(b);
            const a = document.createElement('a'); a.href = u; a.download = filename; a.click();
        },

        /* The cluster / dimension / item codebook, emitted from the live map.
           If the instrument ever changes, this changes with it, so the mapping
           document and the running instrument cannot drift apart. */
        buildCodebookCSV() {
            const head = ['Item_ID','Item_Order','Cluster_ID','Cluster_Roman','Cluster_Name',
                          'Dimension_ID','Dimension_Name','Reverse_Coded','Quality_Control',
                          'Counts_Toward_Score','Item_Text'];
            const cell = v => '"' + String(v === null || v === undefined ? '' : v).replace(/"/g, '""') + '"';
            let csv = head.join(',') + '\n';
            allQuestions.forEach((q, i) => {
                const d = dimensionsData[q.dIdx];
                const c = clusterOfDimIdx(q.dIdx);
                csv += [cell(q.qid || ('Q' + (i + 1))), cell(i + 1),
                        cell(c ? c.id : ''), cell(c ? c.roman : ''),
                        cell(c ? c.name : '(outside cluster structure)'),
                        cell(d.id || ('D' + (q.dIdx + 1))), cell(canonicalDimName(d.name)),
                        cell(q.reverse ? 'TRUE' : 'FALSE'), cell(q.qc ? 'TRUE' : 'FALSE'),
                        cell(q.qc ? 'FALSE' : 'TRUE'), cell(q.text)].join(',') + '\n';
            });
            return csv;
        },
        exportCodebookCSV() {
            this._downloadCSV(this.buildCodebookCSV(), `AIII_Codebook_${MAPPING_VERSION}_${fmtDateFile()}.csv`);
        },

        exportMasterCSV() {
            const csv = this._buildCanonicalCSV();
            if (csv) this._downloadCSV(csv, `AI_Instinct_Master_Psychometrics_${fmtDateFile()}.csv`);
        },

        exportCSV() {
            const csv = this._buildCanonicalCSV();
            if (csv) this._downloadCSV(csv, `AI_Master_Data_${fmtDateFile()}.csv`);
        }
    };

    window.onload = () => {
        app.init();
        try { app.migrateLegacyRecords(); } catch (e) { console.error('legacy migration failed', e); }
    };
    
try {

        if(tr.querySelector('.miniTrend')) return;
        const td=tr.querySelector('td');

        c.width=140;c.height=40;
        c.className='miniTrend';
        c.style.display='block';
        c.style.marginTop='6px';
        td.appendChild(c);
        try{
          if(window.app && app.getTrendData && app.drawTrend){
            const email=(tr.innerText.match(/\S+@\S+/)||[''])[0];
            const h=app.getTrendData(email||'');
            app.drawTrend(c.id= 'mt'+i,h,false);
          }
        }catch(e){}
      });
    }catch(e){}
  }
  new MutationObserver(()=>safeInject()).observe(document.body,{childList:true,subtree:true});
  window.addEventListener('load',()=>setTimeout(safeInject,300));
})();
}catch(e){}
