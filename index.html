        /* =====================================================================
           ORGANISATIONAL NODES & LICENCE PROVISIONING ENGINE (v13)
           - Nodes: unlimited-depth hierarchy (Enterprise → … → Team → …)
           - Licences: attached to exactly one node; unique tokenised survey link
           - All create/edit/delete operations are invoked ONLY from the Super
             Admin panel (renderSuperAdminView). The Diagnostic Console has no
             provisioning controls.
           ===================================================================== */
        _saveNodes() { localStorage.setItem('ai_instinct_org_nodes', JSON.stringify(this.state.orgNodes)); },
        _saveLicences() { localStorage.setItem('ai_instinct_licences', JSON.stringify(this.state.licences)); },
        _genId(prefix) {
            let s = '';
            try {
                const buf = new Uint8Array(6); crypto.getRandomValues(buf);
                s = Array.from(buf).map(b => b.toString(16).padStart(2,'0')).join('').toUpperCase();
            } catch(e) { s = Math.random().toString(36).substr(2,12).toUpperCase(); }
            return prefix + '-' + s;
        },
        genLicenceToken() {
            try {
                const buf = new Uint8Array(10); crypto.getRandomValues(buf);
                return Array.from(buf).map(b => b.toString(16).padStart(2,'0')).join('');
            } catch(e) { return (Math.random().toString(36).substr(2) + Math.random().toString(36).substr(2)).substr(0,20); }
        },

        // ---- Node model ----
        getNode(id) { return this.state.orgNodes.find(n => n.id === id) || null; },
        nodeChildren(id) { return this.state.orgNodes.filter(n => n.parentId === id); },
        // All descendant ids of a node, excluding itself (cycle-safe)
        nodeDescendants(id) {
            const out = []; const seen = {};
            const walk = (pid) => {
                this.nodeChildren(pid).forEach(c => {
                    if (seen[c.id]) return;
                    seen[c.id] = true; out.push(c.id); walk(c.id);
                });
            };
            walk(id);
            return out;
        },
        nodeSubtree(id) { return [id, ...this.nodeDescendants(id)]; },
        // Root → node ancestry chain (cycle-safe)
        nodePath(id) {
            const path = []; const seen = {};
            let n = this.getNode(id);
            while (n && !seen[n.id]) { seen[n.id] = true; path.unshift(n); n = n.parentId ? this.getNode(n.parentId) : null; }
            return path;
        },
        nodePathLabel(id) { return this.nodePath(id).map(n => n.name).join(' › '); },
        nodeDepth(id) { return Math.max(0, this.nodePath(id).length - 1); },
        // Roll-up: completed assessments in this node's entire subtree.
        // Every completed assessment therefore contributes automatically to all its parent nodes.
        nodeCompletedCount(id) {
            const subtree = this.nodeSubtree(id);
            return this.state.responses.filter(r => r.user && subtree.includes(r.user.nodeId)).length;
        },
        nodeLicenceCount(id) { return this.state.licences.filter(l => l.nodeId === id).length; },

        addOrgNodeCentral(name, type, parentId) {
            const node = this.addOrgNode(name, type, parentId);
            if (node) this.centralSaveNode(node).then(ok => { if (!ok) { this.deleteOrgNodeLocal(node.id); this.render(); } });
            return node;
        },
        deleteOrgNodeLocal(id) {
            const i = this.state.orgNodes.findIndex(n => n.id === id);
            if (i !== -1) { this.state.orgNodes.splice(i, 1); this._saveNodes(); }
        },
        addOrgNode(name, type, parentId) {
            const node = {
                id: this._genId('ND'),
                name: String(name || '').trim(),
                type: NODE_TYPES.includes(type) ? type : 'Other',
                parentId: parentId || null,
                active: true,
                createdAt: new Date().toISOString()
            };
            if (!node.name) return null;
            if (node.parentId && !this.getNode(node.parentId)) node.parentId = null;
            this.state.orgNodes.push(node);
            this._saveNodes();
            return node;
        },
        addOrgNodeFromForm() {
            const name = (document.getElementById('ln-name')?.value || '').trim();
            const type = document.getElementById('ln-type')?.value || 'Other';
            const parentId = document.getElementById('ln-parent')?.value || '';
            if (!name) { alert('Please enter a node name.'); return; }
            this.addOrgNode(name, type, parentId || null);
            this.render();
        },
        updateOrgNodeName(id, value) {
            const n = this.getNode(id);
            if (n && String(value || '').trim()) { n.name = String(value).trim(); this._saveNodes(); }
        },
        toggleOrgNodeActive(id) {
            const n = this.getNode(id);
            if (n) { n.active = !n.active; this._saveNodes(); this.render(); }
        },
        deleteOrgNode(id) {
            if (this.nodeChildren(id).length) { alert('This node has child nodes. Delete or re-home the children first.'); return; }
            if (this.nodeLicenceCount(id)) { alert('This node has licences attached. Delete those licences first.'); return; }
            if (this.state.responses.some(r => r.user && r.user.nodeId === id)) { alert('Completed assessments are attached to this node. It cannot be deleted; deactivate it instead.'); return; }
            if (!confirm('Delete this organisational node?')) return;
            this.state.orgNodes = this.state.orgNodes.filter(n => n.id !== id);
            this._saveNodes();
            this.render();
        },

        // ---- Licence model ----
        buildLicenceUrl(l) {
            const base = window.location.href.split('?')[0].split('#')[0];
            return base + '?lic=' + l.token;
        },
        // Seats consumed = unique respondent emails on this licence (a retake by the
        // same respondent never consumes a second seat — no duplicate survey records).
        licenceUsedEmails(l) {
            const set = {};
            this.state.responses.forEach(r => {
                if (r.user && r.user.licenceId === l.id && r.user.email) set[r.user.email.toLowerCase().trim()] = true;
            });
            return Object.keys(set);
        },
        licenceUsage(l) { return this.licenceUsedEmails(l).length; },
        licenceDaysToExpiry(l) {
            if (!l.validUntil) return null;
            const end = new Date(l.validUntil); end.setHours(23,59,59,999);
            return Math.ceil((end.getTime() - Date.now()) / 86400000);
        },
        licenceEffectiveStatus(l) {
            if (l.status === 'Suspended') return 'Suspended';
            const days = this.licenceDaysToExpiry(l);
            if (days !== null && days < 0) return 'Expired';
            if (l.validFrom && Date.now() < new Date(l.validFrom).setHours(0,0,0,0)) return 'Not Started';
            if (this.licenceUsage(l) >= l.seats) return 'Exhausted';
            return 'Active';
        },
        // Gate used at participant registration. Same email may re-enter (retake) without
        // consuming an extra seat; new respondents are blocked once seats are exhausted.
        canUseLicence(l, email) {
            const status = this.licenceEffectiveStatus(l);
            const emailKey = String(email || '').toLowerCase().trim();
            const alreadyCounted = emailKey && this.licenceUsedEmails(l).includes(emailKey);
            if (status === 'Suspended') return { ok:false, reason:'This assessment licence has been suspended. Please contact your administrator.' };
            if (status === 'Expired') return { ok:false, reason:'This assessment licence expired on ' + fmtDate(l.validUntil) + '. Please contact your administrator.' };
            if (status === 'Not Started') return { ok:false, reason:'This assessment licence is not yet active. It becomes valid on ' + fmtDate(l.validFrom) + '.' };
            if (status === 'Exhausted' && !alreadyCounted) return { ok:false, reason:'All licensed seats for this assessment link have been used. Please contact your administrator.' };
            return { ok:true, reason:'' };
        },
        // Derive the organisational context written onto each response from the node ancestry.
        deriveOrgContext(nodeId) {
            const path = this.nodePath(nodeId);
            const nearest = (types) => {
                for (let i = path.length - 1; i >= 0; i--) { if (types.includes(path[i].type)) return path[i].name; }
                return '';
            };
            return {
                company: path.length ? path[0].name : '',
                orgGeography: nearest(['Geography','Region']),
                orgBusinessUnit: nearest(['Business Unit']),
                orgDepartment: nearest(['Department']),
                orgTeam: nearest(['Team']),
                nodePathLabel: path.map(n => n.name).join(' › ')
            };
        },
        // ---- Assigned administrator emails (compulsory, 1–5 per licence) ----
        parseAdminEmails(raw) {
            return Array.from(new Set(String(raw || '')
                .split(/[,;\s]+/)
                .map(x => x.trim().toLowerCase())
                .filter(Boolean)));
        },
        _isEmail(x) { return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(String(x || '')); },
        // Returns { ok, emails, reason }
        validateAdminEmails(raw) {
            const emails = this.parseAdminEmails(raw);
            if (emails.length === 0) return { ok: false, emails, reason: 'At least one assigned administrator email is required.' };
            if (emails.length > 5) return { ok: false, emails, reason: 'A maximum of 5 assigned administrator emails is allowed (you entered ' + emails.length + ').' };
            const bad = emails.filter(e => !this._isEmail(e));
            if (bad.length) return { ok: false, emails, reason: 'Invalid email address(es): ' + bad.join(', ') };
            return { ok: true, emails, reason: '' };
        },
        // Read a licence's administrator emails, tolerating pre-v15 records that only
        // carried the free-text adminViewer field (emails are extracted from it).
        licenceAdminEmails(l) {
            if (!l) return [];
            if (Array.isArray(l.adminEmails) && l.adminEmails.length) return l.adminEmails;
            return this.parseAdminEmails(l.adminViewer || '').filter(e => this._isEmail(e));
        },
        addLicenceFromForm() {
            const nodeId = document.getElementById('lc-node')?.value || '';
            const type = document.getElementById('lc-type')?.value || 'Team';
            const seats = parseInt(document.getElementById('lc-seats')?.value, 10);
            const validFrom = document.getElementById('lc-from')?.value || '';
            const validUntil = document.getElementById('lc-until')?.value || '';
            const adminRaw = (document.getElementById('lc-admin')?.value || '').trim();
            const notes = (document.getElementById('lc-notes')?.value || '').trim();
            if (!nodeId || !this.getNode(nodeId)) { alert('Please select the organisational node this licence belongs to.'); return; }
            if (!seats || seats < 1) { alert('Please enter a valid seat count (minimum 1).'); return; }
            if (validFrom && validUntil && new Date(validUntil) < new Date(validFrom)) { alert('"Valid Until" cannot be earlier than "Valid From".'); return; }
            const av = this.validateAdminEmails(adminRaw);
            if (!av.ok) { alert(av.reason); return; }
            // Ops Console access requires the administrator's email domain to match the
            // company's registered domain — warn at provisioning time if any would not.
            const company = (this.nodePath(nodeId)[0] || {}).name || '';
            const regDomain = this.getOrgDomain(company);
            if (regDomain) {
                const mismatched = av.emails.filter(e => e.split('@')[1] !== regDomain);
                if (mismatched.length) {
                    const proceed = confirm('Warning: ' + mismatched.join(', ') + ' does not match the registered email domain of "' + company + '" (@' + regDomain + ').\n\nWith the current access rules, these administrators will NOT be able to access the Operations Console for this company.\n\nProvision anyway?');
                    if (!proceed) return;
                }
            }
            const lic = {
                id: this._genId('LIC'),
                token: this.genLicenceToken(),
                nodeId, type: LICENCE_TYPES.includes(type) ? type : 'Team',
                seats, validFrom, validUntil,
                status: 'Active',
                adminEmails: av.emails,
                adminViewer: av.emails.join('; '),
                notes,
                createdAt: new Date().toISOString()
            };
            // v18: the central datastore is authoritative — persist there FIRST.
            this.centralSaveLicence(lic).then(ok => {
                if (!ok) return;                       // nothing cached if the server refused
                this.state.licences.push(lic);
                this._saveLicences();
                this.render();
            });
        },
        updateLicenceFromRow(i) {
            const l = this.state.licences[i];
            if (!l) return;
            const seats = parseInt(document.getElementById('lc-seats-' + i)?.value, 10);
            const until = document.getElementById('lc-until-' + i)?.value || '';
            const status = document.getElementById('lc-status-' + i)?.value || 'Active';
            const notes = (document.getElementById('lc-notes-' + i)?.value || '').trim();
            const adminRaw = (document.getElementById('lc-admin-' + i)?.value || '').trim();
            if (!seats || seats < 1) { alert('Seat count must be at least 1.'); return; }
            const av = this.validateAdminEmails(adminRaw);
            if (!av.ok) { alert(av.reason); return; }
            l.seats = seats; l.validUntil = until; l.status = (status === 'Suspended') ? 'Suspended' : 'Active'; l.notes = notes;
            l.adminEmails = av.emails; l.adminViewer = av.emails.join('; ');
            this.centralSaveLicence(l).then(ok => {
                if (!ok) { this.centralLoad(); return; }   // reload authoritative state on refusal
                this._saveLicences();
                this.render();
            });
        },
        async deleteLicence(i) {
            const lic0 = this.state.licences[i];
            if (lic0) {
                const ok = await this.centralDeleteLicence(lic0.id, 'Deactivated by Super Admin');
                if (!ok) return;
            }
            return this._deleteLicenceLocal(i);
        },
        _deleteLicenceLocal(i) {
            const l = this.state.licences[i];
            if (!l) return;
            const used = this.licenceUsage(l);
            const msg = used > 0
                ? `This licence has ${used} completed assessment(s) recorded against it. Deleting the licence does NOT delete those records, but its survey link stops working immediately. Delete anyway?`
                : 'Delete this licence? Its survey link will stop working immediately.';
            if (!confirm(msg)) return;
            this.state.licences.splice(i, 1);
            this._saveLicences();
            this.render();
        },
        copyLicenceLink(i) {
            const l = this.state.licences[i];
            if (!l) return;
            const url = this.buildLicenceUrl(l);
            const done = () => alert('Survey link copied to clipboard:\n\n' + url);
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(url).then(done).catch(() => { this._fallbackCopy(url); done(); });
            } else { this._fallbackCopy(url); done(); }
        },
        _fallbackCopy(text) {
            try {
                const ta = document.createElement('textarea');
                ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
                document.body.appendChild(ta); ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
            } catch(e) { console.error('copy failed', e); }
        },
        // Participant entry point: ?lic=TOKEN on the survey URL selects exactly one licence/node.
        /* ================= v18 CENTRAL PROVISIONING (server authoritative) ================= */
        _centralNodeRow(n) {
            const path = this.nodePath(n.id) || [];
            return { Node_ID: n.id, Parent_Node_ID: n.parentId || '', Company_ID: (path[0] || {}).id || n.id,
                Name: n.name, Node_Type: n.type, Domain: this.getOrgDomain((path[0] || {}).name || n.name) || '',
                Active: n.active === false ? 'false' : 'true' };
        },
        _centralLicRow(l) {
            const path = this.nodePath(l.nodeId) || [];
            return { Licence_ID: l.id, Node_ID: l.nodeId, Company_ID: (path[0] || {}).id || '',
                Licence_Type: l.type, Seats_Purchased: l.seats, Valid_From: l.validFrom || '', Valid_Until: l.validUntil || '',
                Status: l.status || 'Active', Admin_Emails: this.licenceAdminEmails(l).join('; '), Notes: l.notes || '' };
        },
        // Fetch authoritative licence/node state. On failure the cache is shown READ-ONLY.
        async centralLoad(silent) {
            const r = await AIII_API.call('prov.getState', {});
            if (r && r.ok) {
                if (Array.isArray(r.nodes)) {
                    this.state.orgNodes = r.nodes.map(n => ({ id: n.Node_ID, parentId: n.Parent_Node_ID || null,
                        name: n.Name, type: n.Node_Type, active: String(n.Active) !== 'false',
                        createdAt: n.Created_At || new Date().toISOString() }));
                    this._saveNodes();
                }
                if (Array.isArray(r.licences)) {
                    const byId = {}; this.state.licences.forEach(l => byId[l.id] = l);
                    this.state.licences = r.licences.map(L => ({
                        id: L.Licence_ID, token: (byId[L.Licence_ID] || {}).token || '', nodeId: L.Node_ID,

            } else {
                this.state.central = { loaded: this.state.central.loaded, stale: true, lastSync: this.state.central.lastSync,

        // One-time migration of local provisioning into the central datastore.

        // Translates a backend failure into an instruction a non-technical operator
        // can act on, rather than a raw error string.
        _backendGuidance(r) {
            const err = String((r && r.error) || '');
            if (r && r.outdatedBackend) return 'The Apps Script code in your Google account is OLDER than this app expects.\n\nFix (about 2 minutes):\n1. Open your Google Sheet \u2192 Extensions \u2192 Apps Script\n2. Select all the old code (Ctrl+A) and delete it\n3. Paste the whole of AIII_Central_Backend_v2.gs and save\n4. Deploy \u2192 Manage deployments \u2192 pencil icon \u2192 Version: New version \u2192 Deploy\n\nDo NOT click \u201cNew deployment\u201d \u2014 that would change your web address.';
            if (/missing tab|setupsheets/i.test(err)) return 'Your Google Sheet is missing its control tabs.\n\nFix: click \u201cInitialise central tabs\u201d in Central Data Control, then sign out of Super Admin and sign back in.';
            if (/unauthorized/i.test(err)) return 'This browser holds no valid session on the server, so the request was refused.\n\nThis means sign-in succeeded on screen but failed on the server. Two usual causes:\n\n\u2022 The Google Sheet is missing its control tabs \u2014 click \u201cInitialise central tabs\u201d in Central Data Control.\n\u2022 The Apps Script is out of date \u2014 press \u201cTest backend connection\u201d, which will say so plainly.\n\nAfter either fix, sign out of Super Admin and sign back in.';
            if (/credentials/i.test(err)) return 'The server did not accept these credentials. Your Super Admin passwords must match the SA_KEY script property in Apps Script (default key: osty-2239 \u2192 password 1 = osty, password 2 = 2239).';
            return '';
        },
        // One-click initialisation/repair of the seven authoritative tabs, run from
        // here rather than the Apps Script editor. Authorised by the Super Admin

        async initialiseCentralTabs() {
            const p1 = getSaPass1(), p2 = getSaPass2();

            const btn = document.getElementById('central-setup-btn');
            if (btn) { btn.disabled = true; btn.textContent = 'Initialising\u2026'; }
            const r = await AIII_API.call('sys.setup', { key: p1 + '-' + p2 });
            if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-screwdriver-wrench mr-1"></i>Initialise central tabs'; }
            await new Promise(res => setTimeout(res, 0));
            if (!r || r.offline) { alert('Could not reach the backend. Check that the deployment is published with access set to \u201cAnyone\u201d, and that you are online.'); return; }
            if (!r.ok) { const g = this._backendGuidance(r); alert('Initialisation refused: ' + (r.error || 'unknown') + (g ? '\n\n' + g : '')); return; }
            alert('CENTRAL TABS READY\n\n' + r.tabCount + ' of 7 tabs present:\n' + (r.tabs || []).join(', ') +

                  '\n\nNow sign out of Super Admin and sign back in, so the server can issue a fresh session.');

        },
        // Connection self-test. Confirms reachability, that setupSheets has run, and
        // whether this browser currently holds a valid privileged session.
        async testBackendConnection() {
            const btn = document.getElementById('central-test-btn');
            if (btn) { btn.disabled = true; btn.textContent = 'Testing\u2026'; }
            const t0 = Date.now();
            const r = await AIII_API.call('sys.ping', {});
            const ms = Date.now() - t0;
            if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-plug-circle-check mr-1"></i>Test backend connection'; }
            const url = CONFIG.DEPLOYMENT_URL;
            if (!r || r.offline) {
                alert('BACKEND UNREACHABLE\n\nURL: ' + url + '\n\nThe app could not reach Apps Script (' + ms + ' ms).\n\nCheck: (1) the deployment is published with access set to \u201cAnyone\u201d, (2) you edited the EXISTING deployment and chose \u201cNew version\u201d, (3) you are online.');
                return;
            }
            if (!r.ok) {
                const g = this._backendGuidance(r);
                alert((r.outdatedBackend ? 'APPS SCRIPT IS OUT OF DATE' : 'BACKEND RESPONDED WITH AN ERROR')
                      + '\n\n' + (r.error || 'unknown') + '\n\nURL: ' + url + (g ? '\n\n' + g : ''));
                return;
            }
            if (r.apiLevel !== undefined && r.apiLevel < CONFIG.REQUIRED_API_LEVEL) {
                alert('APPS SCRIPT IS OUT OF DATE\n\nDeployed version: ' + (r.version || '?') + ' (level ' + r.apiLevel + ')\nThis app expects level ' + CONFIG.REQUIRED_API_LEVEL + '.\n\n' + this._backendGuidance({ outdatedBackend: true }));
                return;
            }
            const tabsOk = r.tabsReady;
            const lines = [
                'BACKEND CONNECTION OK  (' + ms + ' ms)',
                '',
                'URL: ' + url,
                'Backend version: ' + (r.version || 'unknown'),
                'Server time: ' + (r.serverTime ? fmtDateTime(r.serverTime) : '\u2014'),
                '',
                (tabsOk ? '\u2713 Authoritative tabs initialised (' + r.tabCount + '/7)'
                        : '\u26a0 Tabs NOT initialised \u2014 open Apps Script, select setupSheets and press Run once.'),
                (r.appUrlSet ? '\u2713 APP_URL script property set (invitation emails will carry a working link)'
                             : '\u26a0 APP_URL script property is not set \u2014 invitation emails will contain an incomplete link. Set it under Project Settings \u2192 Script properties.'),
                (AIII_API.session ? '\u2713 This browser holds a valid ' + AIII_API.role + ' session'
                                  : '\u26a0 No privileged session in this browser \u2014 sign in to Super Admin to enable provisioning.'),
                (r.mailQuota !== undefined ? '\u2713 Email sends remaining today: ' + r.mailQuota : '')
            ].filter(Boolean);
            alert(lines.join('\n'));
        },

        /* ================= v18 INDIVIDUAL EXPERIENCE INVITATIONS (Super Admin) ================= */
        async invRefresh(silent) {

        async invCreateFromForm() {
            const email = (document.getElementById('xinv-email')?.value || '').trim().toLowerCase();
            const name = (document.getElementById('xinv-name')?.value || '').trim();

            const send = !!document.getElementById('xinv-send')?.checked;
            if (!this._isEmail(email)) { alert('Enter a valid recipient email address. Personal (e.g. gmail.com) and work addresses are both accepted.'); return; }
            const btn = document.getElementById('xinv-create-btn');
            if (btn) { btn.disabled = true; btn.textContent = 'Creating…'; }
            const r = await AIII_API.call('inv.create', { email, name, org, role, purpose, expiry, note, send });
            if (btn) { btn.disabled = false; btn.textContent = 'Create Invitation'; }
            await new Promise(res => setTimeout(res, 0));   // let the label repaint before the modal alert
            if (!r || !r.ok) {
                const err = (r && r.error) || 'backend unreachable';
                const g = this._backendGuidance(r);
                let advice = g ? '\n\n' + g : '\n\nThe invitation must exist centrally before a link can be issued, so nothing was sent.';
                alert('Invitation not created: ' + err + advice);
                return;
            }
            const link = this.buildXInviteUrl(r.token);
            let msg = 'Invitation created centrally for ' + email + '\n\nUnique link (shown once):\n' + link;
            if (send && r.send && r.send.sent) msg += '\n\n\u2713 Email sent from the AIII Google account (' + (r.send.quotaLeft !== undefined ? r.send.quotaLeft + ' sends left today' : 'delivered') + ').';
            else if (send) msg += '\n\n\u26a0 Automated email was NOT sent (' + ((r.send && r.send.reason) || 'unavailable') + '). Use Copy Link or Open Draft — the invitation itself is safely recorded.';
            try { navigator.clipboard.writeText(link); msg += '\n\n(Link copied to clipboard.)'; } catch (e) {}
            alert(msg);
            ['xinv-email','xinv-name','xinv-org','xinv-role','xinv-expiry','xinv-note'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
            await this.invRefresh();
        },
        buildXInviteUrl(token) { return window.location.origin + window.location.pathname + '?xinv=' + token; },
        async invOp(invitationId, op) {
            let reason = '', expiry = '', send = false;
            if (op === 'revoke') { reason = prompt('Reason for revoking this invitation (recorded in the audit log):', 'No longer required'); if (reason === null) return; }
            if (op === 'extend') { expiry = prompt('New expiry date (YYYY-MM-DD), or leave blank for no expiry:', ''); if (expiry === null) return; }
            if (op === 'reissue') { if (!confirm('Issue a FRESH link for this invitation?\n\nThe previous link stops working immediately. The new link can be emailed automatically.')) return; send = confirm('Send the new link by email now?\n\nOK = send email, Cancel = just show me the link.'); }
            const r = await AIII_API.call('inv.action', { invitationId, op, reason, expiry, send });
            if (!r || !r.ok) { alert('Action failed: ' + ((r && r.error) || 'backend unreachable')); return; }
            if (op === 'reissue' && r.token) {
                const link = this.buildXInviteUrl(r.token);
                try { navigator.clipboard.writeText(link); } catch (e) {}
                alert('Fresh link issued (shown once):\n\n' + link + (r.send && r.send.sent ? '\n\n\u2713 Emailed to the recipient.' : '\n\n\u26a0 Not emailed automatically — share the link above.'));
            }
            await this.invRefresh();
        },
        invMailtoHref(inv) {
            const subject = encodeURIComponent('Your personal invitation \u2014 AI Instinct Index');
            const body = encodeURIComponent('Dear ' + (inv.Recipient_Name || 'colleague') + ',\n\nYou are personally invited to experience the AI Instinct Index.\n\nUse "Reissue link" in the AIII console to generate your single-use link, then paste it here before sending.\n\nAI Instinct Index team');
            return 'mailto:' + encodeURIComponent(inv.Recipient_Email) + '?subject=' + subject + '&body=' + body;
        },

        /* ================= v18 PARTICIPANT TOKEN RESOLUTION (state machine) ================= */
        readUrlToken() {
            try {
                const q = new URLSearchParams(window.location.search);
                const x = q.get('xinv'); if (x) return { token: x, kind: 'xinv' };
                const l = q.get('lic'); if (l) return { token: l, kind: 'lic' };
            } catch (e) {}
            return null;
        },
        resolveUrlToken() { return this.resolveTokenFromUrl(); },
        async resolveTokenFromUrl() {
            const t = this.readUrlToken();
            if (!t) return null;
            this.state.activeToken = t.token;
            const r = await AIII_API.call('flow.resolve', { token: t.token });
            if (r && r.ok) {
                this.state.tokenContext = r; this.state.tokenError = '';
                if (r.kind === 'LICENCE' && r.licenceId) {
                    const lic = this.state.licences.find(l => l.id === r.licenceId);
                    if (lic) this.state.activeLicence = lic;
                }
            } else if (r && r.offline) {
                // Backend unreachable: fall back to the local licence cache (corporate links only).
                this.state.tokenContext = null;
                this.state.tokenError = '';
                if (t.kind === 'lic') this.applyLicenceFromUrl(t.token);
            } else {
                this.state.tokenContext = null;
                this.state.tokenError = (r && r.error) || 'This link could not be verified.';
            }
            return this.state.tokenContext;
        },
        // Server-side eligibility check at the moment of registration.
        async checkAttemptEligibility(email) {
            if (!this.state.activeToken) return { ok: true };
            const r = await AIII_API.call('flow.resolve', { token: this.state.activeToken, email });
            if (r && r.offline) return { ok: true, offline: true };
            if (!r || !r.ok) return { ok: false, error: (r && r.error) || 'This link is no longer valid.' };
            this.state.tokenContext = r;
            return { ok: true };
        },

        /* ================= v18 REVOKE & REISSUE (scoped, server enforced) ================= */
        async revokeAndReissue(surveyId, label) {
            const reasons = ['Technical error', 'Wrong respondent details', 'Accidental submission', 'Authorised retest \u2014 other'];
            const pick = prompt('REVOKE & REISSUE\n\nRecord: ' + label + '\nSurvey ID: ' + surveyId +
                '\n\nThe original record is retained for audit and marked REVOKED; it stops counting toward valid completions. A fresh single-use link is issued to the SAME email. No additional seat is consumed.\n\nSelect a reason (1-4):\n' +
                reasons.map((r, i) => (i + 1) + '. ' + r).join('\n'), '1');
            if (pick === null) return;
            const idx = parseInt(pick, 10);
            let reason = reasons[idx - 1];
            if (!reason) { reason = String(pick).trim(); if (!reason) { alert('A reason is mandatory.'); return; } }
            const send = confirm('Email the fresh link to the employee now?\n\nOK = send automatically, Cancel = show me the link to share.');
            const r = await AIII_API.call('admin.revokeReissue', { surveyId, reason, send });
            if (!r || !r.ok) { alert('Revoke & reissue failed: ' + ((r && r.error) || 'backend unreachable')); return; }
            let msg = 'Revoked and reissued.\n\nOriginal attempt: ' + r.revokedAttemptId + ' (retained, marked REVOKED)\nReplacement attempt: ' + r.newAttemptId + '\nEmail (unchanged): ' + r.email + '\n\nFresh link:\n' + r.link;
            if (r.send && r.send.sent) msg += '\n\n\u2713 Emailed automatically.';
            else if (send) msg += '\n\n\u26a0 Not emailed (' + ((r.send && r.send.reason) || 'unavailable') + ') \u2014 share the link above.';
            try { navigator.clipboard.writeText(r.link); } catch (e) {}
            alert(msg);
            await this.opsRefresh();
        },

        /* ================= v18 CONFIRMED, DUPLICATE-SAFE SUBMISSION ================= */
        _newSurveyId() { return 'SV-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 10); },
        _savePending() { localStorage.setItem('aiii_pending_uploads', JSON.stringify(this.state.pendingUploads)); },
        queuePending(payload) {
            if (!this.state.pendingUploads.some(p => p.surveyId === payload.surveyId)) {
                this.state.pendingUploads.push(payload); this._savePending();
            }
        },
        // Idempotent submit: same Survey_ID never creates a second row, however many retries.
        async submitConfirmed(payload, attempts) {
            const max = attempts || 3;
            for (let i = 0; i < max; i++) {
                const r = await AIII_API.call('flow.submit', payload, { timeout: 25000 });
                if (r && r.ok) return r;
                if (r && !r.offline) return r;              // server said no — do not hammer
                await new Promise(res => setTimeout(res, 800 * Math.pow(2, i)));  // bounded backoff
            }
            return { ok: false, offline: true };
        },
        async retryPendingUploads() {
            if (!this.state.pendingUploads.length) return;
            const still = [];
            for (const p of this.state.pendingUploads) {
                const r = await this.submitConfirmed(p, 1);
                if (!(r && r.ok)) still.push(p);
            }
            const cleared = this.state.pendingUploads.length - still.length;
            this.state.pendingUploads = still; this._savePending();
            if (cleared > 0 && this.state.view === 'admin') this.render();
        },

        applyLicenceFromUrl(tokenOverride) {
            let token = tokenOverride;
            try {
                if (!token) token = new URLSearchParams(window.location.search).get('lic') || '';
            } catch(e) { token = tokenOverride || ''; }
            if (!token) return null;
            const lic = this.state.licences.find(l => l.token === token);
            if (!lic) { this.state.activeLicence = null; return null; }
            this.state.activeLicence = lic;
            return lic;
        },

        /* =====================================================================
           OPERATIONS CONSOLE (v15) — live monitoring of survey administration
           - Reads the Google Sheet via the Apps Script doGet endpoint (read-only)
           - Access control: Super Admin credentials → full portfolio; otherwise an
             assigned administrator verifies by email, granted only where that email
             is on a licence's administrator list AND its domain matches the
             company's registered email domain — scoped to those companies only.
           - All data access flows through ONE adapter (fetchOpsData) so the
             backend can later move from Google Sheets to Firebase untouched.
           ===================================================================== */
        _opsTimer: null,
        OPS_BANDS: { strong: 75, moderate: 50 },

        opsEndpointUrl() {
            const base = CONFIG.OPS_URL || CONFIG.GOOGLE_SCRIPT_URL;
            return base + '?key=' + encodeURIComponent(CONFIG.OPS_TOKEN) + '&mode=ops';
        },
        // Dual check: email listed on a licence + domain matches the company's
        // registered domain (email-only where no domain is registered).
        opsResolveAccess(emailRaw) {
            const email = String(emailRaw || '').toLowerCase().trim();
            if (!this._isEmail(email)) return { ok: false, reason: 'Please enter a valid email address.' };
            const domain = email.split('@')[1];
            const companies = {};
            const licenceIds = [];
            this.state.licences.forEach(l => {
                if (!this.licenceAdminEmails(l).includes(email)) return;
                const company = (this.nodePath(l.nodeId)[0] || {}).name || '';
                const regDomain = this.getOrgDomain(company);
                if (regDomain && regDomain !== domain) return;
                if (company) companies[company] = true;
                licenceIds.push(l.id);
            });
            if (!licenceIds.length) {
                return { ok: false, reason: 'Access denied. This email is not registered as an assigned administrator on any licence, or its domain does not match the company\u2019s registered email domain.' };
            }
            return { ok: true, viewer: { type: 'scoped', email, companies: Object.keys(companies), licenceIds } };
        },
        // v18: two-step verified sign-in. Step 1 emails a 6-digit code to the
        // assigned-administrator address; step 2 exchanges it for a scoped session.
        async opsRequestCode() {
            const email = (document.getElementById('ops-email')?.value || '').trim().toLowerCase();
            if (!this._isEmail(email)) { alert('Enter a valid email address.'); return; }
            const btn = document.getElementById('ops-code-btn');
            if (btn) { btn.disabled = true; btn.textContent = 'Sending…'; }
            const r = await AIII_API.call('auth.adminRequestCode', { email });
            if (btn) { btn.disabled = false; btn.textContent = 'Email me a sign-in code'; }
            if (r && r.offline) { alert('The verification service is unreachable. You can still use local verification below if your device already holds this licence data.'); return; }
            if (!r || !r.ok) { alert((r && r.error) || 'Could not send a code.'); return; }
            this.state.opsCodeSent = email;
            this.render();
        },
        async opsVerifyCode() {
            const email = this.state.opsCodeSent || '';
            const code = (document.getElementById('ops-code')?.value || '').trim();
            const r = await AIII_API.call('auth.adminVerifyCode', { email, code });
            if (!r || !r.ok) { alert((r && r.error) || 'Invalid or expired code.'); return; }
            AIII_API.setSession(r.session, 'COMPANY_ADMIN', r.scope || null);
            const local = this.opsResolveAccess(email);
            this.state.opsViewer = local.ok ? local.viewer
                : { type: 'scoped', email, companies: [], licenceIds: (r.scope && r.scope.licenceIds) || [] };
            this.state.opsCodeSent = '';
            this.render();
            this.opsRefresh();
        },
        opsVerifyViewer() {
            const email = document.getElementById('ops-email')?.value || '';
            const res = this.opsResolveAccess(email);
            if (!res.ok) { alert(res.reason); return; }
            this.state.opsViewer = res.viewer;
            this.render();
            this.opsRefresh();
        },
        // Full-portfolio access re-uses the masked two-password Super Admin modal,
        // but lands back in the Ops view instead of the Super Admin panel.
        opsVerifySuperAdmin() {
            if (this.state.isSuperAdmin) {
                this.state.opsViewer = { type: 'all', email: '(Super Admin)', companies: [], licenceIds: [] };
                this.render(); this.opsRefresh(); return;

        },
        forgotPasswordInfo() {
            alert('Password recovery\n\nFor security, AIII does not use email or OTP resets.\n\n• The administrator password can be changed by the Super Admin under Super Admin → Security & Passwords.\n• If you have lost the administrator password, ask your Super Admin (system owner) to set a new one.\n• Super Admin passwords can only be changed from within an authenticated Super Admin session — keep them safe.');
        },
        _readNewPassword(idPrefix, label) {

        changeAdminPassword() {
            const p = this._readNewPassword('pw-admin', 'Administrator password');
            if (p === null) return;

        // Super Admin full-rights path into the record console (no extra gate needed;

        },
        // Snapshot rows → array of objects, with viewer scope and filters applied.
        opsRows() {
            const d = this.state.opsData;
            const v = this.state.opsViewer;
            if (!d || !d.fields || !d.rows || !v) return [];
            const idx = {}; d.fields.forEach((f, i) => idx[f] = i);
            const g = (row, f) => (idx[f] === undefined ? '' : row[idx[f]]);
            const flag = x => x === true || x === 'true' || x === 'TRUE' || x === 'YES' || x === 1 || x === '1';
            let rows = d.rows.map(r => {
                const dims = [];
                for (let k = 1; k <= 11; k++) { const val = parseFloat(g(r, 'D' + k + '_final')); dims.push(isNaN(val) ? null : val); }
                return {
                    surveyId: String(g(r, 'Survey_ID') || ''),
                    attemptStatus: String(g(r, 'Attempt_Status') || 'COMPLETED_VALID'),
                    cohort: String(g(r, 'Cohort') || 'CORPORATE'),
                    name: String(g(r, 'name') || ''), email: String(g(r, 'email') || '').toLowerCase(),
                    organization: String(g(r, 'organization') || ''), country: String(g(r, 'country') || ''),
                    nodePath: String(g(r, 'Node_Path') || ''), licenceId: String(g(r, 'Licence_ID') || ''),
                    completedAt: g(r, 'assessment_completed_at') || g(r, 'timestamp') || '',
                    timeSec: parseFloat(g(r, 'total_time_seconds')) || 0,
                    overall: parseFloat(g(r, 'overall_score')),
                    flagged: flag(g(r, 'flag_too_fast')) || flag(g(r, 'flag_straightline')) || flag(g(r, 'flag_insufficient')),
                    dims
                };
            });
            if (v.type === 'scoped') {
                const co = {}; v.companies.forEach(c => co[c.toLowerCase()] = true);
                const li = {}; v.licenceIds.forEach(x => li[x] = true);
                rows = rows.filter(r => li[r.licenceId] || co[(r.organization || '').toLowerCase()]);
            }
            const f = this.state.opsFilters;
            if (f.org) rows = rows.filter(r => r.organization === f.org);
            if (f.country) rows = rows.filter(r => r.country === f.country);
            if (f.search) { const q = f.search.toLowerCase(); rows = rows.filter(r => r.name.toLowerCase().includes(q) || r.email.includes(q)); }
            if (f.from) { const t = new Date(f.from).setHours(0,0,0,0); rows = rows.filter(r => { const x = Date.parse(r.completedAt); return !isNaN(x) && x >= t; }); }
            if (f.to) { const t = new Date(f.to).setHours(23,59,59,999); rows = rows.filter(r => { const x = Date.parse(r.completedAt); return !isNaN(x) && x <= t; }); }
            if (f.band) {
                rows = rows.filter(r => {
                    if (isNaN(r.overall)) return false;
                    if (f.band === 'strong') return r.overall >= this.OPS_BANDS.strong;
                    if (f.band === 'moderate') return r.overall >= this.OPS_BANDS.moderate && r.overall < this.OPS_BANDS.strong;
                    return r.overall < this.OPS_BANDS.moderate;
                });
            }
            // v18: revoked/superseded attempts are excluded from current-valid analytics by
            // default; Super Admin can include them for audit via the toggle.
            if (!this.state.opsIncludeRevoked) rows = rows.filter(r => r.attemptStatus !== 'REVOKED' && r.attemptStatus !== 'SUPERSEDED');
            rows.sort((a, b) => (Date.parse(b.completedAt) || 0) - (Date.parse(a.completedAt) || 0));
            return rows;
        },
        // Seats in scope (denominator for completion rate), from local licence data.
        opsSeatScope() {
            const v = this.state.opsViewer;
            if (!v) return 0;
            const lics = (v.type === 'all') ? this.state.licences : this.state.licences.filter(l => v.licenceIds.includes(l.id));
            return lics.reduce((a, l) => a + (l.seats || 0), 0);
        },
        opsStats(rows) {
            const scored = rows.filter(r => !isNaN(r.overall));
            const todayKey = fmtDate(new Date());
            const today = rows.filter(r => fmtDate(new Date(r.completedAt)) === todayKey).length;
            const avg = scored.length ? scored.reduce((a, r) => a + r.overall, 0) / scored.length : null;
            const timed = rows.filter(r => r.timeSec > 0);
            const avgMin = timed.length ? (timed.reduce((a, r) => a + r.timeSec, 0) / timed.length) / 60 : null;
            const orgs = Array.from(new Set(rows.map(r => r.organization).filter(Boolean))).sort();
            const countries = Array.from(new Set(rows.map(r => r.country).filter(Boolean))).sort();
            const qualityPass = rows.length ? Math.round(rows.filter(r => !r.flagged).length / rows.length * 100) : null;
            const bands = { strong: 0, moderate: 0, emerging: 0 };
            scored.forEach(r => {
                if (r.overall >= this.OPS_BANDS.strong) bands.strong++;
                else if (r.overall >= this.OPS_BANDS.moderate) bands.moderate++;
                else bands.emerging++;
            });
            const dimAvgs = [];
            for (let k = 0; k < 11; k++) {
                const vals = rows.map(r => r.dims[k]).filter(x => x !== null);
                dimAvgs.push(vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : null);
            }
            const seats = this.opsSeatScope();
            const rate = seats ? Math.min(100, Math.round(rows.length / seats * 100)) : null;
            // Daily average for spike detection (span of observed days)
            const times = rows.map(r => Date.parse(r.completedAt)).filter(x => !isNaN(x));
            const spanDays = times.length ? Math.max(1, Math.ceil((Math.max(...times) - Math.min(...times)) / 864e5)) : 1;
            const dailyAvg = rows.length / spanDays;
            return { completed: rows.length, today, avg, avgMin, orgs, countries, qualityPass, bands, dimAvgs, seats, rate, dailyAvg };
        },
        // Local (this-device) records visible to the current ops viewer.
        opsScopedLocal(list) {
            const v = this.state.opsViewer;
            if (!v) return [];
            if (v.type === 'all') return list;
            const co = {}; v.companies.forEach(c => co[c.toLowerCase()] = true);
            const li = {}; v.licenceIds.forEach(x => li[x] = true);
            return list.filter(r => r && r.user && (li[r.user.licenceId] || co[(r.user.organization || '').toLowerCase()]));
        },
        // Filter (ALL/QUALITY/SUSPECT/RELIABILITY) + scope + date sort, for the
        // Diagnostic Console block hosted inside the Ops Console.
        opsLocalDisplayList() {
            const filtered = this.opsScopedLocal(this.filterResponses());
            if (!this.state.dateSortDir) return filtered;
            const k = r => parseRecordDate(r);
            return [...filtered].sort((a, b) => this.state.dateSortDir === 'asc' ? k(a) - k(b) : k(b) - k(a));
        },
        // Canonical CSV restricted to the viewer's scope (Master CSV remains Super Admin only).
        exportOpsCSV() {
            const rows = this.opsScopedLocal(this.state.responses);
            const csv = this._buildCanonicalCSVFrom(rows);
            if (csv) this._downloadCSV(csv, `AI_Master_Data_${fmtDateFile()}.csv`);
        },
        // Company-wise live Cronbach's alpha from local answer vectors.
        opsCompanyAlphas(company) {
            // Strict email-domain restriction: when the company has a registered domain,
            // only records whose respondent email carries that exact domain are included.
            // (Name-match fallback applies only where no domain is registered.)
            const regDomain = this.getOrgDomain(company);
            const recs = this.state.responses.filter(r => {
                if (!r || !r.user) return false;
                if (regDomain) {
                    const dom = String(r.user.email || '').toLowerCase().split('@')[1] || '';
                    return dom === regDomain;
                }
                return (r.user.organization || '') === company;
            });
            if (recs.length < 2) return { n: recs.length, alphas: null };
            const alphas = dimensionsData.map((d, dIdx) => {
                try {
                    const a = this.computeCronbachAlphaForDimension(dIdx, recs);
                    return (a === null || isNaN(a)) ? null : Number(a.toFixed(3));
                } catch (e) { return null; }
            });
            return { n: recs.length, alphas };
        },
        opsAlerts(st) {
            const alerts = [];
            if (st.seats > 0 && st.rate !== null && st.rate < 40) alerts.push({ tone: 'amber', text: 'Completion rate is ' + st.rate + '% of licensed seats — below the 40% attention threshold.' });
            const dimNames = dimensionsData.slice(0, 11).map(d => d.name);
            st.dimAvgs.forEach((a, i) => { if (a !== null && a < 50) alerts.push({ tone: 'rose', text: 'Dimension average below 50%: ' + dimNames[i] + ' (' + Math.round(a) + '%).' }); });
            if (st.today >= 10 && st.today > 2 * st.dailyAvg) alerts.push({ tone: 'teal', text: 'Response spike today: ' + st.today + ' completions (daily average ' + st.dailyAvg.toFixed(1) + ').' });
            return alerts;
        },
        // Companies that currently hold a licence (node licences and legacy quotas), each with the
        // email domain it was provisioned for. This feeds the registration page dropdown directly
        // from the Super Admin provisioning data — no manual duplication anywhere.
        getLicensedCompanies() {
            const map = {};
            const addCo = (name, domain) => {
                const key = String(name || '').trim();
                if (!key) return;
                if (!map[key]) map[key] = { name: key, domain: '' };
                const d = this._cleanDomain(domain || '');
                if (d && !map[key].domain) map[key].domain = d;
            };
            this.state.licences.forEach(l => {
                const path = this.nodePath(l.nodeId);
                const company = path.length ? path[0].name : '';
                addCo(company, this.getOrgDomain(company));
            });
            this.state.quotas.forEach(q => addCo(q.organization, q.domain || this.getOrgDomain(q.organization)));
            return Object.values(map).sort((a, b) => a.name.localeCompare(b.name));
        },
        // ---- Licence CSV export (Super Admin only) ----
        _csvCell(v) { return '"' + String(v === null || v === undefined ? '' : v).replace(/"/g, '""') + '"'; },
        // nodeId = null → entire portfolio; otherwise the node AND every node beneath it (roll-up
        // scope), so exporting a Business Unit automatically includes its departments and teams.
        buildLicenceCsv(nodeId) {
            const scope = nodeId ? this.nodeSubtree(nodeId) : null;
            const lics = this.state.licences.filter(l => !scope || scope.includes(l.nodeId));
            const headers = ['Licence_ID','Company','Node_Path','Node_Type','Licence_Type','Seats_Purchased','Seats_Used','Seats_Remaining','Completion_Pct','Valid_From','Valid_Until','Status','Days_To_Expiry','Assigned_Administrator','Notes','Survey_Link','Created'];
            const rows = lics.map(l => {
                const used = this.licenceUsage(l);
                const path = this.nodePath(l.nodeId);
                const node = this.getNode(l.nodeId);
                const days = this.licenceDaysToExpiry(l);
                return [
                    l.id,
                    path.length ? path[0].name : '',
                    this.nodePathLabel(l.nodeId),
                    node ? node.type : '',
                    l.type,
                    l.seats,
                    used,
                    Math.max(0, l.seats - used),
                    (l.seats ? Math.round((used / l.seats) * 100) : 0) + '%',
                    l.validFrom ? fmtDate(l.validFrom) : '',
                    l.validUntil ? fmtDate(l.validUntil) : '',
                    this.licenceEffectiveStatus(l),
                    days === null ? '' : days,
                    this.licenceAdminEmails(l).join('; ') || l.adminViewer || '',
                    l.notes || '',
                    this.buildLicenceUrl(l),
                    l.createdAt ? fmtDateTime(l.createdAt) : ''
                ];
            });
            return { csv: [headers, ...rows].map(r => r.map(c => this._csvCell(c)).join(',')).join('\n'), count: rows.length };
        },
        downloadLicenceCsv() {
            const sel = document.getElementById('lc-export-node');
            const nodeId = (sel && sel.value) ? sel.value : null;
            if (nodeId && !this.getNode(nodeId)) { alert('The selected node no longer exists.'); return; }
            const { csv, count } = this.buildLicenceCsv(nodeId);
            if (count === 0) { alert(nodeId ? 'No licences exist under the selected node.' : 'No licences to export yet.'); return; }
            const scopeName = nodeId ? this.getNode(nodeId).name.replace(/[^A-Za-z0-9]+/g, '_') : 'All_Nodes';
            this._downloadCSV(csv, `AIII_Licences_${scopeName}_${fmtDateFile()}.csv`);
        },

            this.state.responses.splice(index, 1);

            if (!record) return;
            
            delete record.deletedAt;
            this.state.responses.push(record);
            this.state.trash.splice(index, 1);
            
            localStorage.setItem('ai_instinct_v8', JSON.stringify(this.state.responses));
            localStorage.setItem('ai_instinct_trash', JSON.stringify(this.state.trash));

            this.state.trash = this.state.trash.filter(r => {

            // Include manually added orgs

            this.state.responses.forEach(r => {
                if (r.user && r.user.organization) {

        getQualityMetrics() {
            const total = this.state.responses.length;
            if (total === 0) return { passRate: 0, passed: 0, total: 0 };
            
            const passed = this.state.responses.filter(r => {
                if (!r.quality) return false;
                return !r.quality.tooFast && !r.quality.straightline && !r.quality.insufficientOverall;
            }).length;
            
            return {
                passRate: Math.round((passed / total) * 100),
                passed,
                total
            };
        },

        filterResponses() {
            const filter = this.state.adminFilter;
            if (filter === 'ALL') return this.state.responses;
            
            return this.state.responses.filter(r => {
                if (!r.quality) return filter === 'ALL';
                
                switch(filter) {
                    case 'QUALITY':
                        return !r.quality.tooFast && !r.quality.straightline && !r.quality.insufficientOverall;
                    case 'SUSPECT':
                        return r.quality.tooFast || r.quality.straightline || r.quality.insufficientOverall;
                    case 'RELIABILITY':
                        return r.alphas && r.alphas.some(a => a !== null && a > 0.7);
                    default:
                        return true;
                }
            });
        },

                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
            else {

                    }

        recordAns(v) {
            if (this.state.isTransitioning) {
                console.warn('⚠️ Blocked: Already transitioning');
                return;
            }
            
            const currentQuestionIndex = this.state.currentIdx;
            const totalQuestions = allQuestions.length;
            const lastQuestionIndex = totalQuestions - 1;
            const isLastQuestion = (currentQuestionIndex === lastQuestionIndex);
            
            if (!this.state.answerTimes) this.state.answerTimes = new Array(totalQuestions).fill(null);
            this.state.answerTimes[currentQuestionIndex] = Date.now();
            this.state.answers[currentQuestionIndex] = v;
            
            // Visual selection: light up exactly one control — a 1-5 button, or the
            // Not Sure button — using the same 'selected' treatment for both.
            [1,2,3,4,5].forEach(i => {
                const b = document.getElementById(`btn-${i}`);
                if (b) b.classList.remove('selected');
            });
            const nsBtn = document.getElementById('not-sure-btn');
            if (nsBtn) nsBtn.classList.remove('selected');
            if (v === -1) {
                if (nsBtn) nsBtn.classList.add('selected');
            } else {
                const btn = document.getElementById(`btn-${v}`);
                if (btn) btn.classList.add('selected');
            }
            
            this.state.isTransitioning = true;
            
            if (isLastQuestion) {
                const allAnswered = this.state.answers.every(ans => ans !== null);
                
                if (!allAnswered) {
                    const firstUnanswered = this.state.answers.findIndex(ans => ans === null);
                    alert(`Please answer all questions before submitting. Question ${firstUnanswered + 1} is unanswered.`);
                    this.state.isTransitioning = false;
                    return;
                }
                
                const inner = document.getElementById('survey-inner');
                if (inner) inner.classList.add('fade-out');
                
                setTimeout(() => {
                    this.state.isTransitioning = false;
                    this.navigate('feedback');
                }, 250);
                
            } else {
                const inner = document.getElementById('survey-inner');
                if (inner) inner.classList.add('fade-out');
                
                setTimeout(() => {
                    this.state.currentIdx++;
                    this.render();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    setTimeout(() => {
                        const newInner = document.getElementById('survey-inner');
                        if (newInner) newInner.classList.remove('fade-out');
                        this.state.isTransitioning = false;
                    }, 50);
                }, 250);
            }
        },

        prev() { 
            if (this.state.currentIdx > 0 && !this.state.isTransitioning) {
                let prevIdx = this.state.currentIdx - 1;
                while (prevIdx >= 0 && this.state.answers[prevIdx] === null) {
                    prevIdx--;
                }
                
                if (prevIdx >= 0) {
                    this.state.isTransitioning = true;
                    const inner = document.getElementById('survey-inner');
                    if (inner) inner.classList.add('fade-out');
                    
                    setTimeout(() => {
                        this.state.currentIdx = prevIdx; 
                        this.render(); 
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                        
                        setTimeout(() => {
                            const newInner = document.getElementById('survey-inner');
                            if (newInner) newInner.classList.remove('fade-out');
                            this.state.isTransitioning = false;
                        }, 50);
                    }, 250);
                }
            }
