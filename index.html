<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AI Instinct Index | 11 Dimensions Behavioral Diagnostic</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600;800&display=swap');
        :root {
            --brand-cyan: #00f0ff;
            --brand-teal: #2dd4bf;
            --deep-slate: #0f172a;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
            background: radial-gradient(circle at 50% -20%, #1e293b 0%, #0f172a 100%);
            color: #f1f5f9;
            min-height: 100vh;
        }
        .serif { font-family: 'Libre Baskerville', serif; }
        .glass-card {
            background: rgba(30,41,59,0.75);
            border: 1px solid rgba(255,255,255,0.06);
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.35);
        }
        .title-ai { color: #fff; }
        .title-instinct { color: var(--brand-cyan); }
        .title-index { color: var(--brand-teal); }
        
        .tm-mark { 
            font-size: 0.5em; 
            vertical-align: super; 
            margin-left: -2px; 
            margin-right: 2px;
            color: var(--brand-teal); 
            font-weight: 700;
            position: relative;
            top: -0.2em;
        }

        .likert-btn {
            background: rgba(15,23,42,0.6);
            border: 2px solid rgba(255,255,255,0.04);
            transition: transform .1s ease, background .1s, box-shadow .1s;
            min-height: 60px; /* Smaller default for mobile stack */
            display:flex;
            align-items:center;
            justify-content:center;
            cursor: pointer;
        }
        @media (min-width: 640px) {
            .likert-btn { min-height: 100px; } /* Larger on desktop */
        }
        .likert-btn:active { transform: scale(0.96); }
        .likert-btn.selected {
            background: var(--brand-cyan);
            border-color: var(--brand-cyan);
            color: #000;
            transform: scale(1.02);
            box-shadow: 0 14px 30px rgba(0,240,255,0.18);
        }
        
        /* Smooth Fade Animation Styles - No Shaking */
        #survey-content { 
            overflow: hidden; 
            position: relative;
            /* Height handled by min-height in container for responsiveness */
            display: flex;
            flex-direction: column;
        }
        #survey-inner { 
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            padding-top: 1rem;
            opacity: 1;
            transition: opacity 0.25s ease-in-out;
        }
        
        #survey-inner.fade-out {
            opacity: 0;
        }

        .not-sure-btn {
            margin-top: 1rem; display:inline-block; padding: 0.6rem 1.2rem; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03);
            color: #e6f7f6; font-weight: 700; letter-spacing: 0.06em; font-size: 0.75rem;
            transition: background .22s ease, transform .16s ease, box-shadow .18s; cursor: pointer;
        }
        .not-sure-btn.flash,
        .not-sure-btn.selected {
            background: var(--brand-teal); color: #042018; border-color: var(--brand-teal);
            transform: scale(1.03); box-shadow: 0 12px 28px rgba(45,212,191,0.18);
        }
        .pips-container { display:flex; flex-wrap:wrap; gap:4px; justify-content:center; margin-bottom:1.5rem; }
        .pip { width:6px; height:6px; border-radius:999px; background:#334155; transition:all .18s; cursor: pointer; position: relative; }
        .pip:hover { background: #94a3b8; transform:scale(1.2); }
        .pip:hover::after { content: attr(data-question); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: rgba(0,240,255,0.95); color: #000; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; white-space: nowrap; margin-bottom: 6px; box-shadow: 0 4px 12px rgba(0,240,255,0.4); z-index: 100; pointer-events: none; }
        .pip:hover::before { content: ''; position: absolute; bottom: calc(100% - 4px); left: 50%; transform: translateX(-50%); border: 4px solid transparent; border-top-color: rgba(0,240,255,0.95); z-index: 100; pointer-events: none; }
        .pip.active { background:var(--brand-cyan); transform:scale(1.5); box-shadow:0 0 8px var(--brand-cyan); }
        .pip.completed { background:var(--brand-teal); opacity:0.8; }
        .pip.notsure { background: #ef4444; opacity: 0.95; }
        .modal-overlay { position:fixed; inset:0; background:rgba(15,23,42,0.9); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; z-index:1000; padding:1rem; }

        /* === Mobile & touch-device refinements (no effect on desktop rendering) === */
        button, .pip, select, input[type="checkbox"] { touch-action: manipulation; } /* removes 300ms tap delay / accidental double-tap zoom */
        @media (pointer: coarse) {
            .pip { width:10px; height:10px; }               /* larger progress-dot tap targets on touch screens */
            .nav-icon-btn { width:44px; height:44px; }      /* Apple/Android minimum recommended tap size */
            .pip:hover::after, .pip:hover::before { display:none; } /* hover tooltips are meaningless on touch */
        }
        @media (max-width: 640px) {
            input, select, textarea { font-size:16px !important; } /* prevents iOS Safari auto-zoom on focus */
            .glass-card { border-radius:1.25rem; }
        }
        
        #chart-buffer { position:absolute; left:-9999px; visibility:hidden; width: 800px; height: 800px; }
        #trend-buffer { position:absolute; left:-9999px; visibility:hidden; width: 800px; height: 400px; }

        /* Enhanced Navigation Buttons */
        .nav-icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--brand-cyan);
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .nav-icon-btn:hover {
            background: rgba(0,240,255,0.15);
            border-color: var(--brand-cyan);
            transform: scale(1.1);
        }
        .nav-icon-btn.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
    </style>
</head>

    /* =====================================================================
       v18 CENTRAL BACKEND CLIENT
       Every privileged decision (provisioning, invitations, revoke/reissue,
       scoped ops data) is taken by Apps Script against Google Sheets. This
       client only carries a short-lived server-issued session token; it holds
       no privileged secret of its own.
       ===================================================================== */
    const AIII_API = {
        session: sessionStorage.getItem('aiii_session') || '',
        role: sessionStorage.getItem('aiii_role') || '',
        scope: JSON.parse(sessionStorage.getItem('aiii_scope') || 'null'),
        online: true,
        setSession(tok, role, scope) {
            this.session = tok || ''; this.role = role || ''; this.scope = scope || null;
            if (tok) { sessionStorage.setItem('aiii_session', tok); sessionStorage.setItem('aiii_role', role || ''); sessionStorage.setItem('aiii_scope', JSON.stringify(scope || null)); }
            else { sessionStorage.removeItem('aiii_session'); sessionStorage.removeItem('aiii_role'); sessionStorage.removeItem('aiii_scope'); }
        },
        clear() { this.setSession('', '', null); },
        async call(action, payload, opts) {
            const body = JSON.stringify({ action, session: this.session, payload: payload || {} });
            const url = CONFIG.API_URL;
            const timeoutMs = (opts && opts.timeout) || 20000;
            const ctrl = (typeof AbortController !== 'undefined') ? new AbortController() : null;
            const timer = ctrl ? setTimeout(() => ctrl.abort(), timeoutMs) : null;
            try {
                const res = await fetch(url, {
                    method: 'POST', cache: 'no-cache',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body, signal: ctrl ? ctrl.signal : undefined
                });
                if (timer) clearTimeout(timer);
                const data = await res.json();
                this.online = true;
                // "unknown action" means the deployed Apps Script predates this build.
                if (data && data.ok === false && /unknown action/i.test(String(data.error || ''))) data.outdatedBackend = true;
                return data;
            } catch (e) {
                if (timer) clearTimeout(timer);
                this.online = false;
                return { ok: false, error: 'offline', offline: true, detail: String(e && e.message || e) };
            }
        }
    };

    // === GLOBAL DATE/TIME STANDARD (v13) ===
    // Single source of truth for every human-facing date/time: on-screen, PDF and CSV/Excel.
    // Format: DD Mmm YYYY (day, month name, year) and 24-hour HH:MM.
    const AIII_MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    function fmtDate(d) {
        const dt = (d instanceof Date) ? d : new Date(d);
        if (!d || isNaN(dt.getTime())) return '—';
        return String(dt.getDate()).padStart(2,'0') + ' ' + AIII_MONTHS[dt.getMonth()] + ' ' + dt.getFullYear();
    }
    function fmtDateTime(d) {
        const dt = (d instanceof Date) ? d : new Date(d);
        if (!d || isNaN(dt.getTime())) return '—';
        return fmtDate(dt) + ' ' + String(dt.getHours()).padStart(2,'0') + ':' + String(dt.getMinutes()).padStart(2,'0');
    }
    // Filename-safe variant of the same standard (no spaces): 17Jul2026
    function fmtDateFile(d) {
        const dt = (d instanceof Date) ? d : new Date(d || Date.now());
        return String(dt.getDate()).padStart(2,'0') + AIII_MONTHS[dt.getMonth()] + dt.getFullYear();
    }
    // Resolve the moment a record was captured, as milliseconds, honouring the LOCAL system clock.
    // Prefers the ISO instants written at capture time. Falls back to legacy locale "timestamp"
    // strings from pre-v13 records, parsing them DAY-FIRST (en-GB style "17/07/2026, 14:32:15")
    // so they are never misread as month-first — the cause of wrong/blank console dates.
    function parseRecordDate(r) {
        if (!r) return 0;
        const iso = r.completedAtIso || r.startedAtIso;
        if (iso) { const t = Date.parse(iso); if (!isNaN(t)) return t; }
        const ts = String(r.timestamp || '');
        if (!ts) return 0;
        const m = ts.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})[,\s]+(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(am|pm)?/i);
        if (m) {
            let h = parseInt(m[4], 10);
            const ap = (m[7] || '').toLowerCase();
            if (ap === 'pm' && h < 12) h += 12;
            if (ap === 'am' && h === 12) h = 0;
            const t = new Date(parseInt(m[3],10), parseInt(m[2],10) - 1, parseInt(m[1],10), h, parseInt(m[5],10), parseInt(m[6] || '0', 10)).getTime();
            if (!isNaN(t)) return t;
        }
        const t2 = Date.parse(ts);
        return isNaN(t2) ? 0 : t2;
    }

            // Email-domain locking: when the selected (or licensed) company has a registered

                this.state.regDomainLock = domain || '';
                if (!emailInput || !domainSuffix) return;

                    domainSuffix.classList.remove('hidden');

                    domainSuffix.classList.add('hidden');
                    domainSuffix.classList.remove('flex');

                        if (isOther) orgOther.setAttribute('required', 'required'); else orgOther.removeAttribute('required');

                    applyDomainLock((isOther || !opt || !orgSelect.value) ? '' : (opt.getAttribute('data-domain') || ''));

                orgSelect.addEventListener('change', syncFromSelect);

                        const domain = email.split('@')[1].toLowerCase();
                        const match = this.getLicensedCompanies().find(c => c.domain && c.domain === domain);
                        if (match && (!orgSelect.value || orgSelect.value === '__other__')) {

                    const name = (fd.get('name') || '').toString().trim();
                    let email = (fd.get('email') || '').toString().trim();
                    let organization = (fd.get('organization') || '').toString().trim();
                    if (organization === '__other__') organization = (fd.get('organizationOther') || '').toString().trim();
                    if (!organization) { alert('Please select or enter your company name.'); return; }
                    const domainLock = this.state.regDomainLock || '';
                    if (domainLock) {
                        if (!email || email.includes('@') || /\s/.test(email)) {
                            alert('Please enter only the part of your work email before @' + domainLock + ' — the domain is added automatically.');
                            return;
                        }
                        email = email + '@' + domainLock;
                    }
                    if (!email.includes('@') || !email.split('@')[1]) { alert('Please enter a valid work email address.'); return; }

                    const gender = (fd.get('gender') || 'Prefer not to say').toString();
                    const managerEmail = (fd.get('managerEmail') || '').toString().trim().toLowerCase();
                    const consentChecked = fd.get('consent') !== null;
                    
                    if (!name || !email || !organization || !country) { 
                        alert('Please fill in all required fields'); 
                        return; 
                    }
                    if (!roleType || !roleLevel || !department || !ageBand || !tenureBand || !aiExperience) {
                        alert('Please complete the "About Your Role" selections. "Prefer not to say" is available where offered.');
                        return;
                    }
                    if (!managerEmail) {
                        alert("Manager's Email is required. Please enter your direct manager's correct corporate email address — it is essential for team-level analysis.");
                        return;
                    }
                    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(managerEmail)) {
                        alert("Manager's Email doesn't look like a valid email address. Please double-check and enter your manager's correct corporate email.");
                        return;
                    }
                    if (!consentChecked) {
                        alert('Please read the "Before You Begin" note and tick the consent box to continue.');
                        return;
                    }
                    
                    // v18: explicit attempt-state machine, enforced server-side.
                    if (this.state.activeToken) {
                        const elig = await this.checkAttemptEligibility(email);
                        if (!elig.ok) { alert(elig.error); return; }
                    }
                    const emailDomain = email.split('@')[1];
                    const lic = this.state.activeLicence;
                    if (lic) {
                        // Licensed link: validate seats, validity window and status against the licence.
                        const gate = app.canUseLicence(lic, email);
                        if (!gate.ok) { alert(gate.reason); return; }
                    } else if (!app.checkQuota(emailDomain, organization)) {
                        alert('Assessment quota has been exceeded for your organization. Please contact your administrator.');
                        return;
                    }
                    
                    const employeeId = (fd.get('employeeId') || '').toString().trim();
                    const licCtx = lic ? app.deriveOrgContext(lic.nodeId) : null;
                    this.state.user = {
                        name, email,
                        organization: lic ? (licCtx.company || organization) : organization,
                        country, roleType, roleLevel, department, ageBand, tenureBand, aiExperience, gender, managerEmail,
                        consent: true, consentTimestamp: new Date().toISOString(),
                        // v13 organisational-node context (empty strings on the legacy open flow)
                        nodeId: lic ? lic.nodeId : '',
                        licenceId: lic ? lic.id : '',
                        employeeId: employeeId,
                        orgGeography: licCtx ? licCtx.orgGeography : '',
                        orgBusinessUnit: licCtx ? licCtx.orgBusinessUnit : '',
                        orgDepartment: licCtx ? licCtx.orgDepartment : '',
                        orgTeam: licCtx ? licCtx.orgTeam : '',
                        nodePathLabel: licCtx ? licCtx.nodePathLabel : ''
                    };
                    this.state.assessmentStartedAtMs = Date.now();
                    this.state.assessmentStartedAtIso = new Date().toISOString();
                    this.state.viewingHistory = false;
                    if(!this.state.answers.length) this.state.answers = new Array(allQuestions.length).fill(null);
                    this.navigate('survey');
                });
            }
        },

                let isClickable = false;
                if (this.state.answers[i] !== null) {
                    isClickable = true;
                } else {
                    let allPreviousAnswered = true;
                    for (let j = 0; j < i; j++) {
                        if (this.state.answers[j] === null) {
                            allPreviousAnswered = false;
                            break;
                        }
                    }
                    isClickable = allPreviousAnswered;
                }
                
                if (!isClickable) classes += ' opacity-30';
                else classes += ' cursor-pointer';
                
                if (i === this.state.currentIdx) classes += ' active';
                else if (this.state.answers[i] !== null && this.state.answers[i] > 0) classes += ' completed';
                else if (this.state.answers[i] === -1) classes += ' notsure';
                
                const onclick = isClickable ? `onclick="app.jumpTo(${i})"` : '';
                return `<div ${onclick} title="Question ${i+1}" data-question="Q${i+1}" class="${classes}"></div>`;
            }).join('');

            let hasPreviousAnswered = false;
            for (let i = this.state.currentIdx - 1; i >= 0; i--) {
                if (this.state.answers[i] !== null) {
                    hasPreviousAnswered = true;
                    break;
                }
            }

            const isCurrentAnswered = this.state.answers[this.state.currentIdx] !== null;

            p.innerHTML = `

                                        <th class="px-4 py-4">Organization (Editable)</th>

                                            if (flags.length === 0) {
                                                qualityHtml = '<span class="text-teal-400">✓ Pass</span>';
                                            } else {
                                                qualityHtml = flags.join('<br>');
                                            }
                                        }
                                        
                                        return `
                                        <tr class="hover:bg-white/5 transition">
                                            <td class="px-4 py-4">
                                                <div class="font-bold text-slate-200 text-sm">${r.user.name}</div>
                                                <div class="text-[10px] font-mono text-slate-500">${r.user.email}</div>
                                                <div class="text-[9px] text-slate-600 mt-1">v2.0.0 · ${r.id.substring(0,8)}</div>
                                            </td>
                                            <td class="px-4 py-4 text-xs text-slate-400 whitespace-nowrap">${dateStr}</td>
                                            <td class="px-4 py-4">
                                                <input type="text" value="${r.user.organization || ''}" onchange="app.updateOrganization(${actualIndex}, this.value)" class="bg-slate-900/50 border border-white/10 rounded px-3 py-1.5 text-sm text-white outline-none focus:border-cyan-500 w-full">
                                            </td>
                                            <td class="px-4 py-4 text-center">
                                                <span class="text-2xl font-black ${r.overall >= 75 ? 'text-teal-400' : (r.overall >= 50 ? 'text-cyan-400' : 'text-rose-400')}">${r.overall}%</span>

                                            <td class="px-4 py-4 text-center text-xs">
                                                ${qualityHtml}
                                            </td>
                                            <td class="px-4 py-4 text-right">
                                                <div class="flex items-center justify-end gap-2">
                                                    <button onclick="app.adminIndivDownload(${actualIndex})" class="text-slate-400 hover:text-cyan-400 transition" title="Download PDF">
                                                        <i class="fa-solid fa-file-pdf text-lg"></i>
                                                    </button>
                                                    <button onclick="app.retake(${actualIndex})" class="text-slate-400 hover:text-amber-400 transition" title="Retake Assessment">
                                                        <i class="fa-solid fa-rotate-right text-lg"></i>
                                                    </button>
                                                    ${(this.state.adminView === 'ops' && r.surveyId) ? `<button onclick="app.revokeAndReissue('${r.surveyId}', '${(r.user.name||'').replace(/'/g,"")}')" class="text-amber-400 hover:text-amber-300 transition" title="Revoke &amp; Reissue (authorised retake)"><i class="fa-solid fa-rotate-left text-xs"></i></button>` : ''}
                                                    <button onclick="app.moveToTrash(${actualIndex})" class="text-slate-400 hover:text-red-400 transition" title="Move to Trash">
                                                        <i class="fa-solid fa-trash text-lg"></i>
                                                    </button>
                                                </div>

                                        </tr>

                                </tbody>
                            </table>
                            ${list.length === 0 ? `
                            <div class="text-center py-12 text-slate-500">
                                <i class="fa-solid fa-inbox text-4xl mb-4 opacity-50"></i>
                                <p>No records found matching the current filter.</p>
                            </div>
                            ` : ''}
                        </div>`;
        },

        renderSuperAdminView() {
            if (!this.state.isSuperAdmin) {
                return `<div class="glass-card p-8 rounded-2xl text-center text-slate-400 text-sm">Super Admin authentication required.</div>`;
            }

            /* ---------- Seat Dashboard aggregates ---------- */
            const licStats = this.state.licences.map(l => ({
                l, used: this.licenceUsage(l), status: this.licenceEffectiveStatus(l), days: this.licenceDaysToExpiry(l)
            }));
            const seatsPurchased = licStats.reduce((a, s) => a + (s.l.seats || 0), 0);
            const seatsUsed = licStats.reduce((a, s) => a + s.used, 0);
            const seatsRemaining = Math.max(0, seatsPurchased - seatsUsed);
            const expiringSoon = licStats.filter(s => s.status !== 'Expired' && s.days !== null && s.days >= 0 && s.days <= 30).length;
            const expiredCount = licStats.filter(s => s.status === 'Expired').length;
            const overallCompletion = seatsPurchased ? Math.round((seatsUsed / seatsPurchased) * 100) : 0;
            const organizations = this.getOrganizations();

            const dashCard = (label, value, icon, color, sub) => `
                <div class="glass-card p-5 rounded-2xl">
                    <div class="flex justify-between items-start mb-1">
                        <div class="text-[9px] text-slate-500 uppercase tracking-wider">${label}</div>
                        <i class="fa-solid ${icon} ${color} text-lg"></i>
                    </div>
                    <div class="text-3xl font-black text-white">${value}</div>
                    ${sub ? `<div class="text-[9px] text-slate-500 mt-1">${sub}</div>` : ''}
                </div>`;

            /* ---------- Organisation Structure tree ---------- */
            const roots = this.state.orgNodes.filter(n => !n.parentId || !this.getNode(n.parentId));
            const renderNodeRow = (n, depth) => {
                const completed = this.nodeCompletedCount(n.id);
                const licCount = this.nodeLicenceCount(n.id);
                const row = `
                    <div class="flex flex-wrap items-center gap-2 py-2 border-b border-white/5 hover:bg-white/5 transition ${n.active ? '' : 'opacity-50'}" style="padding-left:${depth * 22}px">
                        <i class="fa-solid ${depth === 0 ? 'fa-building' : 'fa-turn-up fa-rotate-90'} text-slate-600 text-xs"></i>
                        <input type="text" value="${n.name}" onchange="app.updateOrgNodeName('${n.id}', this.value)" class="bg-transparent border border-transparent hover:border-white/10 focus:border-violet-500 rounded px-2 py-1 text-sm text-white outline-none w-48">
                        <span class="text-[9px] font-bold uppercase tracking-wider text-violet-400 bg-violet-500/10 px-2 py-0.5 rounded">${n.type}</span>
                        <span class="text-[9px] text-slate-500 font-mono">${n.id}</span>
                        <span class="text-[10px] text-cyan-400 font-bold ml-auto" title="Completed assessments in this node and all child nodes">${completed} completed</span>
                        <span class="text-[10px] text-slate-400" title="Licences attached directly to this node">${licCount} licence${licCount === 1 ? '' : 's'}</span>
                        <button onclick="app.toggleOrgNodeActive('${n.id}')" class="text-[9px] font-bold uppercase px-2 py-1 rounded ${n.active ? 'bg-slate-800 text-teal-400' : 'bg-slate-800 text-slate-500'}">${n.active ? 'Active' : 'Inactive'}</button>
                        <button onclick="app.deleteOrgNode('${n.id}')" class="text-rose-400 hover:text-rose-300 transition px-1" title="Delete node"><i class="fa-solid fa-trash text-xs"></i></button>
                    </div>`;
                return row + this.nodeChildren(n.id).map(c => renderNodeRow(c, depth + 1)).join('');
            };
            const treeHtml = roots.map(r => renderNodeRow(r, 0)).join('');
            const activeNodes = this.state.orgNodes.filter(n => n.active);
            const nodeOptions = activeNodes.map(n => `<option value="${n.id}">${this.nodePathLabel(n.id)}</option>`).join('');

            /* ---------- Licence Management rows (with search + expiry alerts) ---------- */
            const q = (this.state.licenceSearch || '').toLowerCase();
            const visible = licStats.filter(({ l }) => {
                if (!q) return true;
                const hay = [l.id, l.token, l.type, l.notes || '', l.adminViewer || '', this.nodePathLabel(l.nodeId)].join(' ').toLowerCase();
                return hay.includes(q);
            });
            const statusPill = (status, days) => {
                const map = {
                    'Active':   'bg-teal-500/15 text-teal-400',
                    'Expired':  'bg-rose-500/15 text-rose-400',
                    'Exhausted':'bg-amber-500/15 text-amber-400',
                    'Suspended':'bg-slate-500/20 text-slate-400',
                    'Not Started':'bg-cyan-500/15 text-cyan-400'
                };
                let extra = '';
                if (status !== 'Expired' && days !== null && days >= 0 && days <= 30) {
                    extra = `<span class="block text-[8px] text-amber-400 mt-1"><i class="fa-solid fa-triangle-exclamation mr-1"></i>expires in ${days}d</span>`;
                }
                return `<span class="text-[9px] font-bold uppercase px-2 py-1 rounded ${map[status] || 'bg-slate-500/20 text-slate-400'}">${status}</span>${extra}`;
            };
            const licRows = visible.map(({ l, used, status, days }) => {
                const i = this.state.licences.indexOf(l);
                const remaining = Math.max(0, l.seats - used);
                const completion = l.seats ? Math.round((used / l.seats) * 100) : 0;
                return `

                            <div class="text-[9px] text-violet-400 uppercase font-bold mt-1">${l.type}</div>
                        </td>
                        <td class="px-3 py-3 text-xs text-slate-300">${this.nodePathLabel(l.nodeId) || '<span class="text-rose-400">node deleted</span>'}
                            <input id="lc-admin-${i}" type="text" value="${this.licenceAdminEmails(l).join(', ')}" placeholder="Admin email(s), 1–5 required" title="Assigned administrator email(s) — gate access to the Operations Console" class="mt-1 w-full bg-slate-900/50 border border-white/10 rounded px-2 py-1 text-[10px] text-cyan-300 font-mono outline-none focus:border-violet-500">
                        </td>
                        <td class="px-3 py-3 text-center whitespace-nowrap">
                            <input id="lc-seats-${i}" type="number" min="1" value="${l.seats}" class="bg-slate-900/50 border border-white/10 rounded px-2 py-1 text-sm text-white outline-none focus:border-violet-500 w-20 text-center">
                            <div class="text-[9px] text-slate-400 mt-1">Used ${used} · Rem ${remaining}</div>
                            <div class="text-[9px] ${completion >= 100 ? 'text-amber-400' : 'text-teal-400'}">${completion}% complete</div>
                        </td>
                        <td class="px-3 py-3 text-center whitespace-nowrap">
                            <div class="text-[10px] text-slate-400">${l.validFrom ? fmtDate(l.validFrom) : '—'} →</div>
                            <input id="lc-until-${i}" type="date" value="${l.validUntil || ''}" class="bg-slate-900/50 border border-white/10 rounded px-2 py-1 text-[10px] text-white outline-none focus:border-violet-500 mt-1">
                        </td>
                        <td class="px-3 py-3 text-center">
                            ${statusPill(status, days)}

                            </select>
                        </td>
                        <td class="px-3 py-3">
                            <input id="lc-notes-${i}" type="text" value="${(l.notes || '').replace(/"/g, '&quot;')}" placeholder="Notes" class="bg-slate-900/50 border border-white/10 rounded px-2 py-1 text-[10px] text-white outline-none focus:border-violet-500 w-32">
                        </td>
                        <td class="px-3 py-3 text-right whitespace-nowrap">
                            <button onclick="app.copyLicenceLink(${i})" class="bg-cyan-700 hover:bg-cyan-600 text-white px-3 py-1.5 rounded-lg text-[9px] font-bold uppercase transition" title="Copy the unique survey link for this licence"><i class="fa-solid fa-link mr-1"></i>Link</button>
                            <button onclick="app.updateLicenceFromRow(${i})" class="bg-violet-600 hover:bg-violet-500 text-white px-3 py-1.5 rounded-lg text-[9px] font-bold uppercase transition ml-1">Save</button>
                            <button onclick="app.deleteLicence(${i})" class="bg-slate-800 hover:bg-red-500/20 text-red-400 px-2.5 py-1.5 rounded-lg text-[9px] font-bold uppercase transition ml-1">Del</button>
                        </td>
                    </tr>`;
            }).join('');

            /* ---------- Legacy domain quotas (pre-node licensing, retained for backward compatibility) ---------- */
            const quotaRows = this.state.quotas.map((qq, i) => {
                const used = this.getQuotaUsage(qq.domain, qq.organization);
                return `
                    <tr class="hover:bg-white/5 transition">
                        <td class="px-4 py-3"><input id="sa-org-${i}" type="text" value="${qq.organization || ''}" class="bg-slate-900/50 border border-white/10 rounded px-3 py-1.5 text-sm text-white outline-none focus:border-violet-500 w-full"></td>
                        <td class="px-4 py-3"><input id="sa-domain-${i}" type="text" value="${qq.domain || ''}" class="bg-slate-900/50 border border-white/10 rounded px-3 py-1.5 text-sm text-white outline-none focus:border-violet-500 w-full font-mono"></td>
                        <td class="px-4 py-3 text-center"><input id="sa-limit-${i}" type="number" min="1" value="${qq.limit || 1}" class="bg-slate-900/50 border border-white/10 rounded px-3 py-1.5 text-sm text-white outline-none focus:border-violet-500 w-24 text-center"></td>
                        <td class="px-4 py-3 text-center text-slate-300">${used}</td>
                        <td class="px-4 py-3 text-right whitespace-nowrap">
                            <button onclick="app.updateQuotaFromRow(${i})" class="bg-violet-600 hover:bg-violet-500 text-white px-4 py-1.5 rounded-lg text-[10px] font-bold uppercase transition mr-2">Save</button>
                            <button onclick="if(confirm('Delete this quota?')) { app.deleteQuota(${i}); app.render(); }" class="bg-slate-800 hover:bg-red-500/20 text-red-400 px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase transition">Delete</button>
                        </td>
                    </tr>`;
            }).join('');

            return `
                <div class="mt-8 space-y-8">

                            ${dashCard('Seats Used', seatsUsed, 'fa-user-check', 'text-teal-400', overallCompletion + '% completion')}
                            ${dashCard('Seats Remaining', seatsRemaining, 'fa-hourglass-half', 'text-slate-400', '')}
                            ${dashCard('Expiring ≤ 30d', expiringSoon, 'fa-triangle-exclamation', 'text-amber-400', '')}
                            ${dashCard('Expired', expiredCount, 'fa-circle-xmark', 'text-rose-400', '')}

                    </div>

                    <!-- CENTRAL DATA CONTROL (v18) -->
                    ${(() => {

                        const tone = c.stale ? 'amber' : (c.loaded ? 'teal' : 'slate');

                        return `
                    <div class="glass-card p-6 md:p-8 rounded-2xl border border-${tone}-500/20">

                            <div class="text-[10px] text-slate-400 uppercase tracking-wider"><i class="fa-solid fa-database text-${tone}-400 mr-2"></i>Central Data Control \u2014 Google Sheets system of record</div>
                            <span class="px-2 py-1 rounded text-[9px] font-bold uppercase bg-${tone}-500/20 text-${tone}-300">${label}</span>
                        </div>
                        <p class="text-[9px] text-slate-500 mb-4">Licences, organisational nodes, invitations and attempt eligibility are owned by the central datastore. This device holds a cache only. If the backend is unreachable the cache is shown read-only and provisioning changes are refused rather than silently saved locally.</p>
                        ${c.error ? (() => {
                            const outdated = /unknown action/i.test(c.error);
                            const needsSetup = /missing tab|setupsheets/i.test(c.error);
                            const unauthorized = /unauthorized|credentials/i.test(c.error);
                            return `<div class="bg-amber-500/10 border border-amber-500/30 rounded-xl px-4 py-3 text-[10px] text-amber-300 mb-3">
                                <div class="font-bold mb-1"><i class="fa-solid fa-triangle-exclamation mr-2"></i>Central sync issue: ${c.error}</div>
                                ${outdated ? `<div class="text-amber-200/80 leading-relaxed">The Apps Script code in your Google account is <span class="text-white font-bold">older than this app expects</span>. Open your Sheet → Extensions → Apps Script, replace all the code with the latest <span class="font-mono">AIII_Central_Backend_v2.gs</span>, then Deploy → Manage deployments → pencil → <span class="text-white font-bold">New version</span> → Deploy. Your web address does not change.</div>`
                                : needsSetup ? `<div class="text-amber-200/80 leading-relaxed">Your Google Sheet has not yet been given its seven control tabs, so the server cannot record anything — which also means it cannot issue you a session. That is why provisioning is read-only and invitations are refused. <span class="text-white font-bold">Click “Initialise central tabs” below, then sign out of Super Admin and sign back in.</span></div>`
                                : unauthorized ? `<div class="text-amber-200/80 leading-relaxed">The server did not accept these credentials. Your Super Admin passwords on this device must match the <span class="font-mono">SA_KEY</span> script property in Apps Script (the app sends password&nbsp;1 + “-” + password&nbsp;2).</div>`
                                : `<div class="text-amber-200/80 leading-relaxed">Displayed provisioning data may be out of date. Use “Test backend connection” for a full diagnosis.</div>`}
                            </div>`;
                        })() : ''}
                        <div class="flex flex-wrap gap-3 items-center">
                            <button onclick="app.centralLoad()" class="bg-teal-600 hover:bg-teal-500 text-white px-5 py-2.5 rounded-xl text-xs font-bold uppercase transition"><i class="fa-solid fa-rotate mr-1"></i>Sync from central</button>
                            <button onclick="app.centralMigrate()" class="bg-violet-600 hover:bg-violet-500 text-white px-5 py-2.5 rounded-xl text-xs font-bold uppercase transition"><i class="fa-solid fa-cloud-arrow-up mr-1"></i>Migrate local provisioning \u2192 central</button>
                            <button id="central-setup-btn" onclick="app.initialiseCentralTabs()" class="bg-amber-600 hover:bg-amber-500 text-white px-5 py-2.5 rounded-xl text-xs font-bold uppercase transition"><i class="fa-solid fa-screwdriver-wrench mr-1"></i>Initialise central tabs</button>
                            <button id="central-test-btn" onclick="app.testBackendConnection()" class="bg-slate-800 hover:bg-slate-700 text-cyan-300 px-5 py-2.5 rounded-xl text-xs font-bold uppercase transition"><i class="fa-solid fa-plug-circle-check mr-1"></i>Test backend connection</button>
                            <span class="text-[9px] text-slate-500">Last sync: ${c.lastSync ? fmtDateTime(c.lastSync) : '\u2014'}</span>
                        </div>
                        <div class="mt-3 pt-3 border-t border-white/5">
                            <div class="text-[8px] text-slate-600 uppercase tracking-wider mb-1">Connected deployment</div>
                            <div class="text-[9px] text-slate-500 font-mono break-all">${CONFIG.DEPLOYMENT_URL}</div>
                        </div>
                    </div>`;
                    })()}

                    <!-- INDIVIDUAL EXPERIENCE INVITATIONS (v18) -->
                    <div class="glass-card p-6 md:p-8 rounded-2xl border border-cyan-500/20">
                        <div class="flex flex-wrap items-center justify-between gap-3 mb-1">
                            <div class="text-[10px] text-slate-400 uppercase tracking-wider"><i class="fa-solid fa-envelope-open-text text-cyan-400 mr-2"></i>Individual Experience Invitations \u2014 prospects &amp; decision makers</div>
                            <button onclick="app.invRefresh()" class="text-[9px] text-slate-500 hover:text-cyan-400 uppercase tracking-wider transition"><i class="fa-solid fa-rotate mr-1"></i>Refresh</button>
                        </div>
                        <p class="text-[9px] text-slate-500 mb-4">Centrally tracked, single-use invitations for named individuals at <span class="text-slate-300">any</span> email address \u2014 personal or work. Invitees need no registered company, no work domain and no licence: they experience AIII before a purchase decision. Their responses are tagged <span class="text-cyan-300 font-mono">EXPERIENCE_INVITE</span> and are excluded from corporate licence usage and validation samples unless deliberately included.</p>
                        <div class="grid md:grid-cols-6 gap-3 mb-3">

                            <input type="text" id="xinv-name" placeholder="Recipient name" class="bg-slate-950/50 border border-white/10 rounded-xl px-3 py-2 text-white text-xs outline-none focus:border-cyan-500">
                            <input type="text" id="xinv-org" placeholder="Organisation (optional)" class="bg-slate-950/50 border border-white/10 rounded-xl px-3 py-2 text-white text-xs outline-none focus:border-cyan-500">
                            <input type="text" id="xinv-role" placeholder="Role / title (optional)" class="bg-slate-950/50 border border-white/10 rounded-xl px-3 py-2 text-white text-xs outline-none focus:border-cyan-500">
                            <select id="xinv-purpose" class="bg-slate-950/50 border border-white/10 rounded-xl px-3 py-2 text-white text-xs outline-none focus:border-cyan-500">
                                <option>Prospect Demo</option><option>Decision Maker Experience</option><option>Partner Evaluation</option><option>Internal Review</option>
                            </select>
                        </div>
                        <div class="grid md:grid-cols-6 gap-3 mb-4 items-center">
                            <input type="date" id="xinv-expiry" title="Expiry (optional)" class="bg-slate-950/50 border border-white/10 rounded-xl px-3 py-2 text-white text-xs outline-none focus:border-cyan-500">
                            <input type="text" id="xinv-note" placeholder="Note (optional)" class="md:col-span-3 bg-slate-950/50 border border-white/10 rounded-xl px-3 py-2 text-white text-xs outline-none focus:border-cyan-500">
                            <label class="flex items-center gap-2 text-[10px] text-slate-400"><input type="checkbox" id="xinv-send" checked class="w-4 h-4 accent-cyan-500">Email it now</label>
                            <button id="xinv-create-btn" onclick="app.invCreateFromForm()" class="bg-cyan-600 hover:bg-cyan-500 text-white px-4 py-2 rounded-xl font-bold text-xs uppercase transition">Create Invitation</button>
                        </div>
                        ${(this.state.invitations && this.state.invitations.length) ? `

                        <div class="mt-6"><button onclick="app.state.adminView='responses'; app.render();" class="text-[10px] text-slate-500 hover:text-slate-300 uppercase tracking-wider transition"><i class="fa-solid fa-arrow-left mr-1"></i>Back to Diagnostic Console</button></div>
                    </div>
                </div>`;
            }

            /* ---------- DASHBOARD ---------- */
            const rows = this.opsRows();
            const st = this.opsStats(rows);
            const alerts = this.opsAlerts(st);
            const dimNames = dimensionsData.slice(0, 11).map(d => d.name.replace(/^Dimension \d+:\s*/,''));
            const err = this.state.opsError;
            const stamp = this.state.opsLastFetch ? fmtDateTime(this.state.opsLastFetch) : '&mdash;';
            const fmtPct = x => (x === null || isNaN(x)) ? '&mdash;' : Math.round(x) + '%';
            const bandOf = x => x >= this.OPS_BANDS.strong ? ['Strong','text-teal-400'] : (x >= this.OPS_BANDS.moderate ? ['Moderate','text-cyan-400'] : ['Emerging','text-rose-400']);

            const kpi = (label, value, sub, color) => `

                    ${sub ? `<div class="text-[9px] text-slate-500 mt-0.5">${sub}</div>` : ''}
                </div>`;

            const dimBars = dimNames.map((n, i) => {
                const a = st.dimAvgs[i];
                const w = (a === null) ? 0 : Math.max(2, Math.min(100, a));
                const col = (a === null) ? 'bg-slate-700' : (a >= 75 ? 'bg-teal-500' : (a >= 50 ? 'bg-cyan-500' : 'bg-rose-500'));
                return `
                    <div class="flex items-center gap-2 py-1">
                        <div class="w-44 text-[9px] text-slate-400 truncate" title="${n}">${n}</div>
                        <div class="flex-1 bg-slate-900/70 rounded-full h-2.5 overflow-hidden"><div class="${col} h-full rounded-full" style="width:${w}%"></div></div>
                        <div class="w-10 text-right text-[10px] font-bold ${a === null ? 'text-slate-600' : 'text-slate-200'}">${a === null ? 'NA' : Math.round(a) + '%'}</div>
                    </div>`;
            }).join('');

            const ranked = st.dimAvgs.map((a, i) => ({ a, n: dimNames[i] })).filter(x => x.a !== null).sort((x, y) => y.a - x.a);
            const hiLo = ranked.length ? `
                <div class="flex flex-wrap gap-4 mt-3 text-[9px]">
                    <span class="text-teal-400"><i class="fa-solid fa-arrow-trend-up mr-1"></i>Strongest: ${ranked[0].n} (${Math.round(ranked[0].a)}%)</span>
                    <span class="text-rose-400"><i class="fa-solid fa-arrow-trend-down mr-1"></i>Weakest: ${ranked[ranked.length-1].n} (${Math.round(ranked[ranked.length-1].a)}%)</span>
                </div>` : '';

            /* Organisation analytics */
            const orgMap = {};
            rows.forEach(r => {
                const o = r.organization || '(unspecified)';
                if (!orgMap[o]) orgMap[o] = { n: 0, sum: 0, scored: 0, s: 0, m: 0, e: 0 };
                const m = orgMap[o]; m.n++;
                if (!isNaN(r.overall)) {
                    m.scored++; m.sum += r.overall;
                    if (r.overall >= this.OPS_BANDS.strong) m.s++; else if (r.overall >= this.OPS_BANDS.moderate) m.m++; else m.e++;
                }
            });
            const orgSeats = {};
            const seatLics = (v.type === 'all') ? this.state.licences : this.state.licences.filter(l => v.licenceIds.includes(l.id));
            seatLics.forEach(l => {
                const c = (this.nodePath(l.nodeId)[0] || {}).name || '(unspecified)';
                orgSeats[c] = (orgSeats[c] || 0) + (l.seats || 0);
            });
            const orgRows = Object.keys(orgMap).sort().map(o => {
                const m = orgMap[o];
                const avg = m.scored ? m.sum / m.scored : null;
                const seats = orgSeats[o] || 0;
                const rate = seats ? Math.min(100, Math.round(m.n / seats * 100)) : null;
                return `
                    <tr class="hover:bg-white/5 transition">
                        <td class="px-3 py-2.5 text-xs text-slate-200 font-bold">${o}</td>
                        <td class="px-3 py-2.5 text-center text-xs text-slate-300">${m.n}${seats ? `<span class="text-slate-600"> / ${seats}</span>` : ''}</td>
                        <td class="px-3 py-2.5 text-center text-xs ${rate === null ? 'text-slate-600' : (rate < 40 ? 'text-amber-400' : 'text-slate-300')}">${rate === null ? '&mdash;' : rate + '%'}</td>
                        <td class="px-3 py-2.5 text-center text-sm font-black ${avg === null ? 'text-slate-600' : bandOf(avg)[1]}">${fmtPct(avg)}</td>
                        <td class="px-3 py-2.5 text-center text-[10px]"><span class="text-teal-400">${m.s}</span> · <span class="text-cyan-400">${m.m}</span> · <span class="text-rose-400">${m.e}</span></td>
                    </tr>`;
            }).join('');

            /* Live feed */
            const feed = rows.slice(0, 12).map(r => `
                <div class="flex items-center gap-3 py-2 border-b border-white/5">

                        <div class="text-[9px] text-slate-500">${(() => { const t = Date.parse(r.completedAt); return isNaN(t) ? '' : fmtDateTime(new Date(t)); })()}${r.flagged ? ' · <span class="text-amber-400">quality flag</span>' : ''}</div>
                    </div>
                    <div class="text-sm font-black ${isNaN(r.overall) ? 'text-slate-600' : bandOf(r.overall)[1]}">${isNaN(r.overall) ? '&mdash;' : Math.round(r.overall) + '%'}</div>
                </div>`).join('');

            const orgOptions = st.orgs.map(o => `<option value="${o}" ${this.state.opsFilters.org === o ? 'selected' : ''}>${o}</option>`).join('');
            const countryOptions = st.countries.map(c => `<option value="${c}" ${this.state.opsFilters.country === c ? 'selected' : ''}>${c}</option>`).join('');

            return `
                <div class="mt-8 space-y-6">
                    <div class="flex flex-wrap items-center justify-between gap-3">
                        <div>
                            <h3 class="text-lg font-bold uppercase tracking-tight text-teal-400"><i class="fa-solid fa-satellite-dish mr-2"></i>Operations Console <span class="text-[9px] text-slate-500 font-normal normal-case ml-2">read-only · near real-time</span></h3>
                            <div class="text-[9px] text-slate-500 mt-1">
                                ${v.type === 'all' ? '<span class="text-violet-400 font-bold uppercase">Full portfolio</span>' : `<span class="text-teal-400 font-bold uppercase">Scoped</span> · ${v.email} · ${v.companies.join(', ')}`}
                                <button onclick="app.opsSignOutViewer()" class="ml-2 text-slate-500 hover:text-rose-400 transition underline">switch viewer</button>
                            </div>
                        </div>
                        <div class="flex flex-wrap items-center gap-2">
                            <span class="text-[9px] text-slate-500">Last refreshed: <span class="text-slate-300">${stamp}</span></span>
                            ${this.state.opsData && this.state.opsData.counts ? `<span class="text-[9px] px-2 py-1 rounded bg-teal-500/15 text-teal-300 font-bold">VALID ${this.state.opsData.counts.valid}</span><span class="text-[9px] px-2 py-1 rounded bg-rose-500/15 text-rose-300 font-bold">REVOKED ${this.state.opsData.counts.revoked}</span><span class="text-[9px] px-2 py-1 rounded bg-cyan-500/15 text-cyan-300 font-bold">EXPERIENCE ${this.state.opsData.counts.experience}</span>` : ''}
                            <button onclick="app.state.opsIncludeRevoked=!app.state.opsIncludeRevoked; app.render();" class="px-3 py-2 rounded-xl text-[9px] font-bold uppercase transition ${this.state.opsIncludeRevoked ? 'bg-rose-600/20 text-rose-300 border border-rose-500/30' : 'bg-slate-800 text-slate-500'}" title="Include revoked/superseded attempts (audit view)">Audit ${this.state.opsIncludeRevoked ? 'ON' : 'OFF'}</button>
                            <button onclick="app.opsToggleAuto()" class="px-3 py-2 rounded-xl text-[9px] font-bold uppercase transition ${this.state.opsAutoRefresh ? 'bg-teal-600/20 text-teal-400 border border-teal-500/30' : 'bg-slate-800 text-slate-500'}">Auto 30s ${this.state.opsAutoRefresh ? 'ON' : 'OFF'}</button>
                            <button onclick="app.opsRefresh()" ${this.state.opsLoading ? 'disabled' : ''} class="bg-teal-600 hover:bg-teal-500 text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase transition">${this.state.opsLoading ? '<i class="fa-solid fa-spinner fa-spin mr-1"></i>Loading' : '<i class="fa-solid fa-rotate mr-1"></i>Refresh'}</button>
                            <button onclick="app.state.adminView='responses'; app.render();" class="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase transition"><i class="fa-solid fa-arrow-left mr-1"></i>Back</button>
                        </div>
                    </div>

                    ${err ? `<div class="bg-rose-500/10 border border-rose-500/30 rounded-xl px-4 py-3 text-xs text-rose-300"><i class="fa-solid fa-triangle-exclamation mr-2"></i>Live feed unavailable: ${err} <button onclick="app.opsRefresh()" class="underline ml-2">retry</button></div>` : ''}
                    ${!err && this.state.opsData && this.state.opsData.missingFields && this.state.opsData.missingFields.length ? `<div class="bg-amber-500/10 border border-amber-500/30 rounded-xl px-4 py-3 text-[10px] text-amber-300">Endpoint note: some expected columns were not found in the Sheet (${this.state.opsData.missingFields.join(', ')}). Affected metrics show as &mdash;.</div>` : ''}
                    ${alerts.map(a => `<div class="bg-${a.tone}-500/10 border border-${a.tone}-500/30 rounded-xl px-4 py-3 text-[10px] text-${a.tone}-300"><i class="fa-solid fa-bell mr-2"></i>${a.text}</div>`).join('')}

                    <!-- KPIs -->
                    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-3">
                        ${kpi('Completed', st.completed, v.type === 'all' ? 'entire portfolio' : 'in your scope', 'text-white')}
                        ${kpi('Seats (invited)', st.seats || '&mdash;', 'licensed seats', 'text-cyan-400')}
                        ${kpi('Completion rate', st.rate === null ? '&mdash;' : st.rate + '%', 'completed / seats', st.rate !== null && st.rate < 40 ? 'text-amber-400' : 'text-teal-400')}
                        ${kpi('Today', st.today, fmtDate(new Date()), 'text-white')}
                        ${kpi('Avg AIII score', fmtPct(st.avg), '', st.avg === null ? 'text-slate-500' : bandOf(st.avg)[1])}
                        ${kpi('Avg time', st.avgMin === null ? '&mdash;' : st.avgMin.toFixed(1) + 'm', 'per assessment', 'text-white')}
                        ${kpi('Organisations', st.orgs.length, '', 'text-white')}
                        ${kpi('Quality pass', st.qualityPass === null ? '&mdash;' : st.qualityPass + '%', 'unflagged records', 'text-white')}
                    </div>

                    <!-- FILTERS -->
                    <div class="glass-card p-4 rounded-2xl flex flex-wrap items-end gap-2">
                        <div><label class="text-[8px] text-slate-500 uppercase tracking-wider">Organisation</label>
                            <select onchange="app.opsSetFilter('org', this.value)" class="block bg-slate-950/50 border border-white/10 rounded-xl px-3 py-2 text-white text-xs outline-none"><option value="">All</option>${orgOptions}</select></div>
                        <div><label class="text-[8px] text-slate-500 uppercase tracking-wider">Country</label>
                            <select onchange="app.opsSetFilter('country', this.value)" class="block bg-slate-950/50 border border-white/10 rounded-xl px-3 py-2 text-white text-xs outline-none"><option value="">All</option>${countryOptions}</select></div>
                        <div><label class="text-[8px] text-slate-500 uppercase tracking-wider">From</label>
                            <input type="date" value="${this.state.opsFilters.from}" onchange="app.opsSetFilter('from', this.value)" class="block bg-slate-950/50 border border-white/10 rounded-xl px-3 py-2 text-white text-xs outline-none"></div>
                        <div><label class="text-[8px] text-slate-500 uppercase tracking-wider">To</label>
                            <input type="date" value="${this.state.opsFilters.to}" onchange="app.opsSetFilter('to', this.value)" class="block bg-slate-950/50 border border-white/10 rounded-xl px-3 py-2 text-white text-xs outline-none"></div>
                        <div><label class="text-[8px] text-slate-500 uppercase tracking-wider">Score band</label>
                            <select onchange="app.opsSetFilter('band', this.value)" class="block bg-slate-950/50 border border-white/10 rounded-xl px-3 py-2 text-white text-xs outline-none">
                                <option value="">All</option>
                                <option value="strong" ${this.state.opsFilters.band === 'strong' ? 'selected' : ''}>Strong (\u226575%)</option>
                                <option value="moderate" ${this.state.opsFilters.band === 'moderate' ? 'selected' : ''}>Moderate (50\u201374%)</option>
                                <option value="emerging" ${this.state.opsFilters.band === 'emerging' ? 'selected' : ''}>Emerging (<50%)</option>
                            </select></div>
                        <div class="flex-1 min-w-[160px]"><label class="text-[8px] text-slate-500 uppercase tracking-wider">Respondent</label>
                            <input type="text" value="${this.state.opsFilters.search}" placeholder="Name or email\u2026 (Enter)" onchange="app.opsSetFilter('search', this.value)" class="block w-full bg-slate-950/50 border border-white/10 rounded-xl px-3 py-2 text-white text-xs outline-none"></div>
                    </div>

                    <div class="grid lg:grid-cols-2 gap-6">
                        <!-- DIMENSION ANALYTICS -->
                        <div class="glass-card p-6 rounded-2xl">
                            <div class="text-[10px] text-slate-400 uppercase tracking-wider mb-3"><i class="fa-solid fa-chart-bar text-teal-400 mr-2"></i>Dimension Averages (11D)</div>
                            ${rows.length ? dimBars + hiLo : '<div class="text-center py-8 text-slate-500 text-xs">No completions in the current scope/filters yet.</div>'}
                        </div>
                        <!-- LIVE FEED -->
                        <div class="glass-card p-6 rounded-2xl">
                            <div class="text-[10px] text-slate-400 uppercase tracking-wider mb-2"><i class="fa-solid fa-tower-broadcast text-teal-400 mr-2"></i>Latest Completions</div>
                            ${feed || '<div class="text-center py-8 text-slate-500 text-xs">Completions will appear here as they arrive.</div>'}
                        </div>
                    </div>

                    <!-- ORGANISATION ANALYTICS -->
                    <div class="glass-card p-6 rounded-2xl">
                        <div class="text-[10px] text-slate-400 uppercase tracking-wider mb-3"><i class="fa-solid fa-building text-teal-400 mr-2"></i>Organisation Analytics</div>
                        <div class="overflow-x-auto">
                            <table class="w-full min-w-[560px] text-left">
                                <thead class="bg-slate-900/80 text-[9px] uppercase font-bold text-slate-400 tracking-wider">
                                    <tr><th class="px-3 py-2.5">Organisation</th><th class="px-3 py-2.5 text-center">Completed / Seats</th><th class="px-3 py-2.5 text-center">Rate</th><th class="px-3 py-2.5 text-center">Avg Score</th><th class="px-3 py-2.5 text-center" title="Strong · Moderate · Emerging">S · M · E</th></tr>
                                </thead>
                                <tbody class="divide-y divide-white/5">${orgRows || '<tr><td colspan="5" class="px-3 py-6 text-center text-slate-500 text-xs">No data in scope yet.</td></tr>'}</tbody>
                            </table>
                        </div>
                    </div>

                    <!-- COMPANY-WISE LIVE RELIABILITY -->
                    ${(() => {
                        const alphaCompanies = (v.type === 'scoped') ? v.companies : this.getOrganizations();
                        if (!alphaCompanies.length) return '';
                        const sel = this.state.opsAlphaCompany && alphaCompanies.includes(this.state.opsAlphaCompany) ? this.state.opsAlphaCompany : alphaCompanies[0];
                        const ca = this.opsCompanyAlphas(sel);
                        return `
                        <div class="glass-card p-6 rounded-2xl">
                            <div class="flex flex-wrap items-center justify-between gap-2 mb-1">
                                <div class="text-[10px] text-slate-400 uppercase tracking-wider"><i class="fa-solid fa-chart-bar text-cyan-400 mr-2"></i>Live Reliability — Cronbach's α (per dimension) · company-wise</div>
                                <select onchange="app.state.opsAlphaCompany=this.value; app.render();" class="bg-slate-950/50 border border-white/10 rounded-xl px-3 py-2 text-white text-xs outline-none focus:border-teal-500">
                                    ${alphaCompanies.map(c => `<option value="${c}" ${c === sel ? 'selected' : ''}>${c}</option>`).join('')}
                                </select>
                            </div>
                            ${ca.alphas ? `
                            <div class="text-[9px] text-slate-500 mb-2">Computed live from ${ca.n} assessments for ${sel} · target α ≥ 0.70</div>
                            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-2">
                                ${dimensionsData.map((d, i) => {
                                    const a = ca.alphas[i];
                                    const color = (a === null) ? 'text-slate-500' : (a >= 0.70 ? 'text-teal-400' : (a >= 0.50 ? 'text-amber-400' : 'text-rose-400'));
                                    return `<div class="bg-slate-900/50 border border-white/5 rounded-xl px-3 py-2.5">
                                        <div class="text-[8px] text-slate-500 uppercase tracking-wider truncate" title="${d.name}">D${i + 1} · ${d.name}</div>
                                        <div class="text-lg font-black ${color}">${a === null ? 'NA' : a.toFixed(3)}</div>
                                    </div>`;
                                }).join('')}
                            </div>` : `
                            <p class="text-[10px] text-slate-500 mt-2">Cronbach's α for ${sel} requires a minimum of 2 completed assessments on this device (currently ${ca.n}). It activates automatically once the criterion is met.</p>`}
                        </div>`;
                    })()}

                    <!-- RECORD MANAGEMENT: THE DIAGNOSTIC CONSOLE, ACCESS-SCOPED -->
                    ${this.renderDiagnosticBlock(this.opsLocalDisplayList(), { scope: v.type === 'all' ? 'full' : 'scoped', companies: v.companies || [] })}

                    <p class="text-[9px] text-slate-600 text-center">Live monitoring is read-only · record management operates on this device's stored records · scope and access enforced per assigned-administrator licence records${v.type === 'scoped' ? ' · you see only your organisations' : ''}.</p>
                </div>`;
        },


        addOrganization() {
            const input = document.getElementById('new-org-name');
            const domainInput = document.getElementById('new-org-domain');
            const org = input.value.trim();
            const domain = domainInput ? this._cleanDomain(domainInput.value) : '';
            if (!org) return;
            
            if (!this.state.orgList.includes(org)) {
                this.state.orgList.push(org);
                localStorage.setItem('ai_instinct_orgs', JSON.stringify(this.state.orgList));
                if (domain) this.setOrgDomain(org, domain);
                input.value = '';
                if (domainInput) domainInput.value = '';
                this.render();
            } else {
                // Organization already registered — treat a supplied domain as an update, not an error.
                if (domain) { this.setOrgDomain(org, domain); this.render(); }
                else alert(`Organization "${org}" already exists.`);
                input.value = '';
                if (domainInput) domainInput.value = '';
            }
        },

        // Email domain registry: licences/quotas are provisioned for a company on the basis
        // of its email domain, so the registry keeps name → domain in one place.
        _cleanDomain(v) {
            return String(v || '').trim().toLowerCase().replace(/^@/, '').replace(/^https?:\/\//, '').replace(/^www\./, '').split('/')[0];
        },
        getOrgDomain(org) { return this.state.orgDomains[org] || ''; },
        setOrgDomain(org, domain) {
            const d = this._cleanDomain(domain);
            if (!org) return;
            if (d) this.state.orgDomains[org] = d; else delete this.state.orgDomains[org];
            localStorage.setItem('ai_instinct_org_domains', JSON.stringify(this.state.orgDomains));
        },

        getOrgProfile(org) {
            if (!org) return null;
            return this.state.orgProfiles[org] || null;
        },

        saveOrgProfileFromForm() {
            const orgSel = document.getElementById('orgprofile-org');
            const sizeSel = document.getElementById('orgprofile-size');
            const indSel = document.getElementById('orgprofile-industry');
            const domInput = document.getElementById('orgprofile-domain');
            if (!orgSel || !orgSel.value) { alert('Please select an organization.'); return; }
            const domainGiven = domInput && domInput.value.trim();

            if (domainGiven) this.setOrgDomain(orgSel.value, domInput.value);

        checkQuota(emailDomain, organization) {

        addQuota(organization, domain, limit) {

        deleteQuota(index) {
